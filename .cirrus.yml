build_ios_task:
  name: buildFutoNotesIOS
  macos_instance:
    image: ghcr.io/cirruslabs/macos-sequoia-xcode:26.2
  buildFutoNotesIOS_script:
    # Fetch secure files
    - curl --silent "https://gitlab.com/gitlab-org/incubation-engineering/mobile-devops/download-secure-files/-/raw/main/installer" | bash

    # Install signing certificate
    - security unlock-keychain -p "admin" ~/Library/Keychains/login.keychain
    - security import ./.secure_files/Certificates.p12 -k ~/Library/Keychains/login.keychain -P "$IOS_CERT_PASSWORD" -T /usr/bin/codesign
    - "security set-key-partition-list -S apple-tool:,apple: -s -k admin ~/Library/Keychains/login.keychain"

    # Install provisioning profile
    - mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
    - PROFILE_PATH=$(ls .secure_files/*.mobileprovision | head -1)
    - PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" /dev/stdin <<< $(/usr/bin/security cms -D -i "$PROFILE_PATH"))
    - cp "$PROFILE_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/${PROFILE_UUID}.mobileprovision

    # Update Node to required version
    - brew install nvm
    - export NVM_DIR="$HOME/.nvm"
    - source $(brew --prefix nvm)/nvm.sh
    - nvm install 20
    - nvm use 20
    - node --version

    # Derive version from git tag
    - VERSION_NAME="${CI_COMMIT_TAG#v}"
    - IFS='.' read -r major minor patch <<< "$VERSION_NAME"
    - VERSION_CODE=$((major * 10000 + minor * 100 + patch))
    - echo "Building iOS version $VERSION_NAME (build $VERSION_CODE)"

    # Install dependencies and build web assets
    - npm ci
    - npm run build
    - npx cap sync ios

    # Build archive
    - cd ios
    - |
      xcodebuild -project App/App.xcodeproj \
        -scheme App \
        -configuration Release \
        -archivePath build/App.xcarchive \
        archive \
        MARKETING_VERSION="$VERSION_NAME" \
        CURRENT_PROJECT_VERSION="$VERSION_CODE" \
        CODE_SIGN_STYLE=Manual \
        DEVELOPMENT_TEAM=2W7AC6T8T5 \
        CODE_SIGN_IDENTITY="Apple Distribution" \
        PROVISIONING_PROFILE_SPECIFIER="FUTO Notes App Store" \
        -quiet 2>&1 | tee ../xcodebuild-archive.log || (tail -100 ../xcodebuild-archive.log && exit 1)

    # Export IPA
    - |
      xcodebuild -exportArchive \
        -archivePath build/App.xcarchive \
        -exportPath build/ipa \
        -exportOptionsPlist ../ExportOptions.plist \
        -quiet 2>&1 | tee ../xcodebuild-export.log || (tail -100 ../xcodebuild-export.log && exit 1)

    # Upload to TestFlight
    - mkdir -p ~/.private_keys
    - cp ../.secure_files/AuthKey*.p8 ~/.private_keys/
    - xcrun altool --upload-app
        --type ios
        --file build/ipa/App.ipa
        --apiKey "$ASC_KEY_ID"
        --apiIssuer "$ASC_ISSUER_ID"

    # Copy IPA to artifacts location
    - cp build/ipa/*.ipa ../
  binary_artifacts:
    path: "*.ipa"
  logs_artifacts:
    path: "xcodebuild-*.log"
