build_ios_task:
  name: buildFutoNotesIOS
  macos_instance:
    image: ghcr.io/cirruslabs/macos-sequoia-xcode:26.2
  buildFutoNotesIOS_script:
    # Fetch secure files (certificates, provisioning profiles, API keys)
    - curl --silent "https://gitlab.com/gitlab-org/incubation-engineering/mobile-devops/download-secure-files/-/raw/main/installer" | bash

    # Install signing certificate
    - security unlock-keychain -p "admin" ~/Library/Keychains/login.keychain
    - security import ./.secure_files/Certificates.p12 -k ~/Library/Keychains/login.keychain -P "$IOS_CERT_PASSWORD" -T /usr/bin/codesign
    - "security set-key-partition-list -S apple-tool:,apple: -s -k admin ~/Library/Keychains/login.keychain"

    # Install provisioning profile
    - mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
    - PROFILE_PATH=$(ls .secure_files/*.mobileprovision | head -1)
    - PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" /dev/stdin <<< $(/usr/bin/security cms -D -i "$PROFILE_PATH"))
    - cp "$PROFILE_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/${PROFILE_UUID}.mobileprovision

    # Install Node
    - brew install nvm
    - export NVM_DIR="$HOME/.nvm"
    - source $(brew --prefix nvm)/nvm.sh
    - nvm install 22
    - nvm use 22
    - node --version

    # Install Rust with iOS target
    - curl https://sh.rustup.rs -sSf | sh -s -- -y
    - export PATH="$HOME/.cargo/bin:$PATH"
    - rustup target add aarch64-apple-ios
    - cargo install tauri-cli --locked

    # Derive version from git tag
    - VERSION="${CI_COMMIT_TAG#v}"
    - echo "Building iOS version $VERSION"

    # Install dependencies
    - npm ci

    # Set version in tauri.conf.json from git tag
    - |
      node -e "
        const fs = require('fs');
        const f = 'apps/tauri/src-tauri/tauri.conf.json';
        const c = JSON.parse(fs.readFileSync(f, 'utf8'));
        c.version = process.argv[1];
        fs.writeFileSync(f, JSON.stringify(c, null, 2) + '\n');
      " "$VERSION"

    # Initialize and build iOS
    - cd apps/tauri
    - cargo tauri ios init --config src-tauri/tauri.ios.conf.json

    # Patch Xcode project for manual signing (CI has no Apple ID — only cert + profile)
    # cargo tauri ios build calls xcodebuild with -allowProvisioningUpdates and no
    # signing overrides, so we must patch the generated project directly.
    - |
      PBXPROJ=$(find src-tauri/gen/apple -name "project.pbxproj" | head -1)
      echo "Patching $PBXPROJ for manual signing + deployment target"
      sed -i '' \
        -e 's/DEVELOPMENT_TEAM = "";/DEVELOPMENT_TEAM = "2W7AC6T8T5";/g' \
        -e 's/CODE_SIGN_IDENTITY = "iPhone Developer"/CODE_SIGN_IDENTITY = "Apple Distribution"/g' \
        -e 's/IPHONEOS_DEPLOYMENT_TARGET = 14.0/IPHONEOS_DEPLOYMENT_TARGET = 16.0/g' \
        -e '/DEVELOPMENT_TEAM/a\'$'\n''				CODE_SIGN_STYLE = Manual;' \
        -e '/DEVELOPMENT_TEAM/a\'$'\n''				PROVISIONING_PROFILE_SPECIFIER = "FUTO Notes App Store";' \
        "$PBXPROJ"
      echo "Verifying patch:"
      grep -E "CODE_SIGN_STYLE|DEVELOPMENT_TEAM|CODE_SIGN_IDENTITY|PROVISIONING_PROFILE|DEPLOYMENT_TARGET" "$PBXPROJ" | head -30

    - export IPHONEOS_DEPLOYMENT_TARGET=16.0
    - cargo tauri ios build --export-method app-store-connect --config src-tauri/tauri.ios.conf.json
    - cd ../..

    # Upload to TestFlight
    - mkdir -p ~/.private_keys
    - cp .secure_files/AuthKey*.p8 ~/.private_keys/
    - IPA_PATH=$(find apps/tauri/src-tauri/gen/apple/build -name "*.ipa" -type f | head -1)
    - echo "Uploading $IPA_PATH to TestFlight"
    - xcrun altool --upload-app --type ios --file "$IPA_PATH" --apiKey "$ASC_KEY_ID" --apiIssuer "$ASC_ISSUER_ID"

    # Copy IPA to artifacts location
    - cp "$IPA_PATH" ./
  binary_artifacts:
    path: "*.ipa"
