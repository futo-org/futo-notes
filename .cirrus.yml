test_rust_macos_task:
  name: testRustMacOS
  macos_instance:
    image: ghcr.io/cirruslabs/macos-sequoia-xcode:26.2
  testRustMacOS_script:
    - brew install node@22
    - export PATH="$(brew --prefix node@22)/bin:$PATH"
    - curl https://sh.rustup.rs -sSf | sh -s -- -y
    - export PATH="$HOME/.cargo/bin:$PATH"
    - corepack enable
    - corepack prepare pnpm@10.29.2 --activate
    - pnpm install --frozen-lockfile
    - mkdir -p dist
    # Whole workspace so the new core crates (model/index/sync) are covered on
    # macOS too; ignored server tests stay skipped (no FUTO_TEST_SERVER).
    - cargo test --workspace

test_desktop_smoke_macos_task:
  name: testDesktopSmokeMacOS
  macos_instance:
    image: ghcr.io/cirruslabs/macos-sequoia-xcode:26.2
  testDesktopSmokeMacOS_script:
    - brew install node@22
    - export PATH="$(brew --prefix node@22)/bin:$PATH"
    - curl https://sh.rustup.rs -sSf | sh -s -- -y
    - export PATH="$HOME/.cargo/bin:$PATH"
    - corepack enable
    - corepack prepare pnpm@10.29.2 --activate
    - pnpm install --frozen-lockfile
    - cargo install tauri-cli --locked
    # Build frontend + debug binary
    - pnpm run build
    - (cd apps/tauri && cargo tauri build --debug --no-bundle)
    # Pre-configure notes dir so app boots to editor
    - |
      NOTES_DIR=$(mktemp -d)
      mkdir -p "$HOME/Library/Application Support/com.futo.notes"
      echo '{"notesDir":"'"$NOTES_DIR"'"}' > "$HOME/Library/Application Support/com.futo.notes/notes-dir-override.json"
    # Launch (Cirrus macOS VMs have a display — no xvfb needed)
    - |
      target/debug/futo-notes-tauri > /tmp/tauri-smoke.log 2>&1 &
    # Run smoke tests (script handles port discovery from log)
    - node tests/desktop-smoke.mjs --log-file /tmp/tauri-smoke.log
    - kill $(pgrep -f futo-notes-tauri) 2>/dev/null || true

build_ios_task:
  name: buildFutoNotesIOS
  macos_instance:
    image: ghcr.io/cirruslabs/macos-sequoia-xcode:26.2
  buildFutoNotesIOS_script:
    # Fetch secure files (certificates, provisioning profiles, API keys)
    - curl --silent "https://gitlab.com/gitlab-org/incubation-engineering/mobile-devops/download-secure-files/-/raw/main/installer" | bash

    # Install signing certificate
    - security unlock-keychain -p "admin" ~/Library/Keychains/login.keychain
    - security import ./.secure_files/Certificates.p12 -k ~/Library/Keychains/login.keychain -P "$IOS_CERT_PASSWORD" -T /usr/bin/codesign
    - "security set-key-partition-list -S apple-tool:,apple: -s -k admin ~/Library/Keychains/login.keychain"

    # Install provisioning profile
    - mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
    - PROFILE_PATH=$(ls .secure_files/*.mobileprovision | head -1)
    - PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" /dev/stdin <<< $(/usr/bin/security cms -D -i "$PROFILE_PATH"))
    - cp "$PROFILE_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/${PROFILE_UUID}.mobileprovision

    # Install Node + pnpm
    - brew install node@22
    - export PATH="$(brew --prefix node@22)/bin:$PATH"
    - node --version
    - corepack enable
    - corepack prepare pnpm@10.29.2 --activate

    # Install Rust with iOS target
    - curl https://sh.rustup.rs -sSf | sh -s -- -y
    - export PATH="$HOME/.cargo/bin:$PATH"
    - rustup target add aarch64-apple-ios
    - cargo install tauri-cli --locked

    # Derive version from git tag
    - VERSION="${CI_COMMIT_TAG#v}"
    - echo "Building iOS version $VERSION"

    # Install dependencies
    - pnpm install --frozen-lockfile

    # Set version in tauri.conf.json from git tag
    - |
      node -e "
        const fs = require('fs');
        const f = 'apps/tauri/src-tauri/tauri.conf.json';
        const c = JSON.parse(fs.readFileSync(f, 'utf8'));
        c.version = process.argv[1];
        fs.writeFileSync(f, JSON.stringify(c, null, 2) + '\n');
      " "$VERSION"

    # Initialize and build iOS
    - cd apps/tauri
    - cargo tauri ios init --config src-tauri/tauri.ios.conf.json
    # Fetch ORT xcframework — project.yml's pre-build script reads it via
    # ORT_IOS_XCFWK_PATH from apps/tauri/src-tauri/gen/apple/.
    - node ../../scripts/fetch-ort-ios.mjs
    - cargo tauri icon src-tauri/icons/icon-1024-rgba8.png --ios-color '#f0f0f0'

    # Patch Xcode project for manual signing, deployment target, and Swift compat shims
    - |
      PBXPROJ=$(find src-tauri/gen/apple -name "project.pbxproj" | head -1)
      node ../../scripts/patch-ios-pbxproj.mjs "$PBXPROJ"

    - export IPHONEOS_DEPLOYMENT_TARGET=16.0
    # Build + archive. Tauri's export step will fail (it can't resolve the
    # provisioning profile with manual signing), so we allow failure here
    # and do the export manually below.
    - cargo tauri ios build --export-method app-store-connect --config src-tauri/tauri.ios.conf.json || echo "Tauri export failed (expected) — will export manually"
    # Verify the xcarchive was created
    - |
      ARCHIVE=$(find src-tauri/gen/apple/build -name "*.xcarchive" -type d | head -1)
      if [ -z "$ARCHIVE" ]; then
        echo "ERROR: No xcarchive found — build itself failed"
        exit 1
      fi
      echo "Found archive: $ARCHIVE"
      # Export IPA with explicit provisioning profile mapping
      cat > /tmp/ExportOptions.plist << 'PLISTEOF'
      <?xml version="1.0" encoding="UTF-8"?>
      <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
      <plist version="1.0">
      <dict>
          <key>method</key>
          <string>app-store</string>
          <key>teamID</key>
          <string>2W7AC6T8T5</string>
          <key>signingStyle</key>
          <string>manual</string>
          <key>provisioningProfiles</key>
          <dict>
              <key>com.futo.notes</key>
              <string>FUTO Notes App Store</string>
          </dict>
      </dict>
      </plist>
      PLISTEOF
      xcodebuild -exportArchive \
        -archivePath "$ARCHIVE" \
        -exportOptionsPlist /tmp/ExportOptions.plist \
        -exportPath src-tauri/gen/apple/build/export
    - cd ../..

    # Copy IPA to artifacts location. TestFlight upload is gated by the
    # release:gate stage and handled by the publishFutoNotesIOS task.
    - IPA_PATH=$(find apps/tauri/src-tauri/gen/apple/build -name "*.ipa" -type f | head -1)
    - cp "$IPA_PATH" ./
  binary_artifacts:
    path: "*.ipa"

publish_ios_task:
  name: publishFutoNotesIOS
  macos_instance:
    image: ghcr.io/cirruslabs/macos-sequoia-xcode:26.2
  publishFutoNotesIOS_script:
    # Fetch the ASC API key from GitLab secure files
    - curl --silent "https://gitlab.com/gitlab-org/incubation-engineering/mobile-devops/download-secure-files/-/raw/main/installer" | bash
    - mkdir -p ~/.private_keys
    - cp .secure_files/AuthKey*.p8 ~/.private_keys/

    # The IPA is already present: GitLab's `needs: build:ios-native` (default
    # `artifacts: true`) puts it in the publish:ios working dir at
    # buildFutoNotesIOSNative/binary/*.ipa, and Cirrus rsyncs the working dir
    # into this VM.
    - |
      # Only search dirs that exist — the legacy buildFutoNotesIOS job is
      # manual on tag pipelines, so its dir is usually absent and a bare
      # find over both paths exits non-zero (killing the script under
      # Cirrus's errexit/pipefail before the native IPA is ever used).
      IPA=""
      for d in buildFutoNotesIOSNative/binary buildFutoNotesIOS/binary; do
        if [ -d "$d" ]; then
          IPA=$(find "$d" -name "*.ipa" -type f | head -1)
        fi
        if [ -n "$IPA" ]; then break; fi
      done
      if [ -z "$IPA" ]; then
        echo "ERROR: No IPA found in working dir — was build:ios-native artifact propagated?"
        exit 1
      fi
      echo "Uploading $IPA to TestFlight"
      xcrun altool --upload-app --type ios --file "$IPA" --apiKey "$ASC_KEY_ID" --apiIssuer "$ASC_ISSUER_ID"

build_macos_task:
  name: buildFutoNotesMacOS
  macos_instance:
    image: ghcr.io/cirruslabs/macos-sequoia-xcode:26.2
  buildFutoNotesMacOS_script:
    # Fetch secure files (certificates, API keys)
    - curl --silent "https://gitlab.com/gitlab-org/incubation-engineering/mobile-devops/download-secure-files/-/raw/main/installer" | bash

    # Install signing certificate
    - security unlock-keychain -p "admin" ~/Library/Keychains/login.keychain
    - security import ./.secure_files/MacCertificates.p12 -k ~/Library/Keychains/login.keychain -P "$MACOS_CERT_PASSWORD" -T /usr/bin/codesign
    - "security set-key-partition-list -S apple-tool:,apple: -s -k admin ~/Library/Keychains/login.keychain"

    # Set Tauri signing env vars
    - export APPLE_CERTIFICATE=$(base64 < .secure_files/MacCertificates.p12)
    - export APPLE_CERTIFICATE_PASSWORD="$MACOS_CERT_PASSWORD"
    - export APPLE_SIGNING_IDENTITY="Developer ID Application: FUTO Holdings, Inc. (2W7AC6T8T5)"

    # Set Tauri notarization env vars. Tauri reads APPLE_API_KEY as the
    # key ID (NOT a path) and APPLE_API_KEY_PATH as the .p8 file path.
    # Getting these swapped silently disables notarization while codesign
    # still runs, producing signed-but-unnotarized DMGs that Gatekeeper
    # rejects with "Apple could not verify…".
    - export APPLE_API_KEY="$ASC_KEY_ID"
    # Absolute path: the script later cd's into apps/tauri before the build,
    # and notarytool resolves --key relative to cwd. A relative path here
    # silently breaks notarization with "file doesn't exist".
    - export APPLE_API_KEY_PATH="$(pwd)/$(ls .secure_files/AuthKey*.p8 | head -1)"
    - export APPLE_API_ISSUER="$ASC_ISSUER_ID"

    # Install Node + pnpm
    - brew install node@22
    - export PATH="$(brew --prefix node@22)/bin:$PATH"
    - node --version
    - corepack enable
    - corepack prepare pnpm@10.29.2 --activate

    # Install Rust. We ship a universal (x86_64 + arm64) DMG so a single
    # download runs native on both Apple Silicon and Intel Macs — both target
    # std libs are needed for `--target universal-apple-darwin`.
    - curl https://sh.rustup.rs -sSf | sh -s -- -y
    - export PATH="$HOME/.cargo/bin:$PATH"
    - rustup target add aarch64-apple-darwin x86_64-apple-darwin
    - cargo install tauri-cli --locked

    # Derive version from git tag
    - VERSION="${CI_COMMIT_TAG#v}"
    - echo "Building macOS version $VERSION"

    # Install dependencies
    - pnpm install --frozen-lockfile

    # Set version in tauri.conf.json from git tag
    - |
      node -e "
        const fs = require('fs');
        const f = 'apps/tauri/src-tauri/tauri.conf.json';
        const c = JSON.parse(fs.readFileSync(f, 'utf8'));
        c.version = process.argv[1];
        fs.writeFileSync(f, JSON.stringify(c, null, 2) + '\n');
      " "$VERSION"

    # Build universal macOS DMG + the updater bundle. The release overlay turns on
    # createUpdaterArtifacts, so Tauri (in this one build) codesigns + notarizes
    # the .app, then produces .app.tar.gz and minisigns it — correct ordering,
    # no separate re-sign needed. TAURI_SIGNING_PRIVATE_KEY arrives via .cienv;
    # the key has no password and --ci supplies the empty passphrase non-interactively.
    - test -n "$TAURI_SIGNING_PRIVATE_KEY" || { echo "TAURI_SIGNING_PRIVATE_KEY is not set"; exit 1; }
    - cd apps/tauri
    - cargo tauri build --target universal-apple-darwin --config src-tauri/tauri.updater-release.conf.json --ci
    - cd ../..

    # Copy DMG (installer) + the updater artifact (.app.tar.gz + .sig) to the
    # artifact locations. macOS updater downloads the .app.tar.gz, NOT the .dmg.
    - cp target/universal-apple-darwin/release/bundle/dmg/*.dmg ./
    - mkdir -p updater && cp target/universal-apple-darwin/release/bundle/macos/*.app.tar.gz updater/ && cp target/universal-apple-darwin/release/bundle/macos/*.app.tar.gz.sig updater/
  binary_artifacts:
    path: "*.dmg"
  updater_artifacts:
    path: "updater/*"

# Native iOS app (SwiftUI over the futo-notes-ffi UniFFI core + embedded
# editor.html). Tag builds produce a signed Release IPA for TestFlight;
# non-tag builds are unsigned simulator compile checks.
build_ios_native_task:
  name: buildFutoNotesIOSNative
  macos_instance:
    image: ghcr.io/cirruslabs/macos-sequoia-xcode:26.2
  build_ios_native_script:
    - brew install node@22 xcodegen
    - export PATH="$(brew --prefix node@22)/bin:$PATH"
    - corepack enable
    - corepack prepare pnpm@10.29.2 --activate
    - curl https://sh.rustup.rs -sSf | sh -s -- -y
    - export PATH="$HOME/.cargo/bin:$PATH"
    - rustup target add aarch64-apple-ios aarch64-apple-ios-sim
    - pnpm install --frozen-lockfile
    # Shared Rust FFI -> FutoNotesFfi.xcframework + Swift bindings (uses
    # xcodebuild -create-xcframework).
    - bash scripts/build-rust-ios.sh
    # Embedded editor bundle (single self-contained editor.html).
    - pnpm exec vite build --config vite.editor.config.ts
    # Generate the Xcode project.
    - (cd apps/ios && xcodegen generate)
    - |
      if [ -n "${CI_COMMIT_TAG:-}" ]; then
        echo "Building signed native iOS release for $CI_COMMIT_TAG"
        curl --silent "https://gitlab.com/gitlab-org/incubation-engineering/mobile-devops/download-secure-files/-/raw/main/installer" | bash

        security unlock-keychain -p "admin" ~/Library/Keychains/login.keychain
        security import ./.secure_files/Certificates.p12 -k ~/Library/Keychains/login.keychain -P "$IOS_CERT_PASSWORD" -T /usr/bin/codesign
        security set-key-partition-list -S apple-tool:,apple: -s -k admin ~/Library/Keychains/login.keychain

        mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
        PROFILE_NAME=""
        for PROFILE_PATH in .secure_files/*.mobileprovision; do
          [ -e "$PROFILE_PATH" ] || continue
          PROFILE_PLIST=$(mktemp)
          /usr/bin/security cms -D -i "$PROFILE_PATH" > "$PROFILE_PLIST"
          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" "$PROFILE_PLIST")
          NAME=$(/usr/libexec/PlistBuddy -c "Print Name" "$PROFILE_PLIST")
          APP_ID=$(/usr/libexec/PlistBuddy -c "Print Entitlements:application-identifier" "$PROFILE_PLIST" 2>/dev/null || true)
          cp "$PROFILE_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/${PROFILE_UUID}.mobileprovision
          if [[ "$APP_ID" == *.com.futo.notes ]]; then
            PROFILE_NAME="$NAME"
          fi
          rm -f "$PROFILE_PLIST"
        done
        if [ -z "$PROFILE_NAME" ]; then
          echo "ERROR: No provisioning profile found for com.futo.notes"
          exit 1
        fi

        VERSION="${CI_COMMIT_TAG#v}"
        BUILD_NUMBER="${CI_PIPELINE_IID:-1}"
        ARCHIVE="apps/ios/.build-release/FutoNotesNative.xcarchive"
        xcodebuild -project apps/ios/FutoNotesNative.xcodeproj \
          -scheme FutoNotesNative -configuration Release \
          -destination 'generic/platform=iOS' \
          -derivedDataPath apps/ios/.build-release \
          -archivePath "$ARCHIVE" \
          DEVELOPMENT_TEAM=2W7AC6T8T5 \
          CODE_SIGN_STYLE=Manual \
          CODE_SIGNING_ALLOWED=YES \
          CODE_SIGNING_REQUIRED=YES \
          CODE_SIGN_IDENTITY="Apple Distribution" \
          PROVISIONING_PROFILE_SPECIFIER="$PROFILE_NAME" \
          MARKETING_VERSION="$VERSION" \
          CURRENT_PROJECT_VERSION="$BUILD_NUMBER" \
          archive | tail -5

        cat > /tmp/ExportOptionsNative.plist << PLISTEOF
      <?xml version="1.0" encoding="UTF-8"?>
      <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
      <plist version="1.0">
      <dict>
          <key>method</key>
          <string>app-store</string>
          <key>teamID</key>
          <string>2W7AC6T8T5</string>
          <key>signingStyle</key>
          <string>manual</string>
          <key>provisioningProfiles</key>
          <dict>
              <key>com.futo.notes</key>
              <string>${PROFILE_NAME}</string>
          </dict>
      </dict>
      </plist>
      PLISTEOF
        xcodebuild -exportArchive \
          -archivePath "$ARCHIVE" \
          -exportOptionsPlist /tmp/ExportOptionsNative.plist \
          -exportPath apps/ios/.build-release/export

        IPA_PATH=$(find apps/ios/.build-release/export -name "*.ipa" -type f | head -1)
        if [ -z "$IPA_PATH" ]; then
          echo "ERROR: native iOS export produced no IPA"
          exit 1
        fi
        cp "$IPA_PATH" ./
      else
        # Simulator compile check (unsigned). ARCHS=arm64: the FFI xcframework
        # only ships an arm64 simulator slice (aarch64-apple-ios-sim); a bare
        # 'generic/platform=iOS Simulator' build also targets x86_64 and fails
        # to link. Build-only, so host arch is moot.
        xcodebuild -project apps/ios/FutoNotesNative.xcodeproj \
          -scheme FutoNotesNative -configuration Debug \
          -destination 'generic/platform=iOS Simulator' \
          -derivedDataPath apps/ios/.build \
          ARCHS=arm64 ONLY_ACTIVE_ARCH=NO CODE_SIGNING_ALLOWED=NO \
          build | tail -5
      fi
  binary_artifacts:
    path: "*.ipa"
