test_rust_macos_task:
  name: testRustMacOS
  macos_instance:
    image: ghcr.io/cirruslabs/macos-sequoia-xcode:26.2
  testRustMacOS_script:
    - brew install node@22
    - export PATH="$(brew --prefix node@22)/bin:$PATH"
    - curl https://sh.rustup.rs -sSf | sh -s -- -y
    - export PATH="$HOME/.cargo/bin:$PATH"
    - corepack enable
    - corepack prepare pnpm@10.29.2 --activate
    - pnpm install --frozen-lockfile
    - pnpm run tauri:test:rust

test_desktop_smoke_macos_task:
  name: testDesktopSmokeMacOS
  macos_instance:
    image: ghcr.io/cirruslabs/macos-sequoia-xcode:26.2
  testDesktopSmokeMacOS_script:
    - brew install node@22
    - export PATH="$(brew --prefix node@22)/bin:$PATH"
    - curl https://sh.rustup.rs -sSf | sh -s -- -y
    - export PATH="$HOME/.cargo/bin:$PATH"
    - corepack enable
    - corepack prepare pnpm@10.29.2 --activate
    - pnpm install --frozen-lockfile
    # Build frontend + debug binary
    - pnpm run build
    - (cd apps/tauri && cargo tauri build --debug --no-bundle)
    # Pre-configure notes dir so app boots to editor
    - |
      NOTES_DIR=$(mktemp -d)
      mkdir -p "$HOME/Library/Application Support/com.futo.notes"
      echo '{"notesDir":"'"$NOTES_DIR"'"}' > "$HOME/Library/Application Support/com.futo.notes/notes-dir-override.json"
    # Launch (Cirrus macOS VMs have a display — no xvfb needed)
    - |
      apps/tauri/src-tauri/target/debug/futo-notes-tauri > /tmp/tauri-smoke.log 2>&1 &
    # Run smoke tests (script handles port discovery from log)
    - node tests/desktop-smoke.mjs --log-file /tmp/tauri-smoke.log
    - kill $(pgrep -f futo-notes-tauri) 2>/dev/null || true

build_ios_task:
  name: buildFutoNotesIOS
  macos_instance:
    image: ghcr.io/cirruslabs/macos-sequoia-xcode:26.2
  buildFutoNotesIOS_script:
    # Fetch secure files (certificates, provisioning profiles, API keys)
    - curl --silent "https://gitlab.com/gitlab-org/incubation-engineering/mobile-devops/download-secure-files/-/raw/main/installer" | bash

    # Install signing certificate
    - security unlock-keychain -p "admin" ~/Library/Keychains/login.keychain
    - security import ./.secure_files/Certificates.p12 -k ~/Library/Keychains/login.keychain -P "$IOS_CERT_PASSWORD" -T /usr/bin/codesign
    - "security set-key-partition-list -S apple-tool:,apple: -s -k admin ~/Library/Keychains/login.keychain"

    # Install provisioning profile
    - mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
    - PROFILE_PATH=$(ls .secure_files/*.mobileprovision | head -1)
    - PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" /dev/stdin <<< $(/usr/bin/security cms -D -i "$PROFILE_PATH"))
    - cp "$PROFILE_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/${PROFILE_UUID}.mobileprovision

    # Install Node
    - brew install node@22
    - export PATH="$(brew --prefix node@22)/bin:$PATH"
    - node --version

    # Install Rust with iOS target
    - curl https://sh.rustup.rs -sSf | sh -s -- -y
    - export PATH="$HOME/.cargo/bin:$PATH"
    - rustup target add aarch64-apple-ios
    - cargo install tauri-cli --locked

    # Derive version from git tag
    - VERSION="${CI_COMMIT_TAG#v}"
    - echo "Building iOS version $VERSION"

    # Install dependencies
    - npm ci

    # Set version in tauri.conf.json from git tag
    - |
      node -e "
        const fs = require('fs');
        const f = 'apps/tauri/src-tauri/tauri.conf.json';
        const c = JSON.parse(fs.readFileSync(f, 'utf8'));
        c.version = process.argv[1];
        fs.writeFileSync(f, JSON.stringify(c, null, 2) + '\n');
      " "$VERSION"

    # Initialize and build iOS
    - cd apps/tauri
    - cargo tauri ios init --config src-tauri/tauri.ios.conf.json
    - cargo tauri icon src-tauri/icons/icon-1024-rgba8.png --ios-color '#f0f0f0'

    # Patch Xcode project for manual signing, deployment target, and Swift compat shims
    - |
      PBXPROJ=$(find src-tauri/gen/apple -name "project.pbxproj" | head -1)
      node ../../scripts/patch-ios-pbxproj.mjs "$PBXPROJ"

    - export IPHONEOS_DEPLOYMENT_TARGET=16.0
    # Build + archive. Tauri's export step will fail (it can't resolve the
    # provisioning profile with manual signing), so we allow failure here
    # and do the export manually below.
    - cargo tauri ios build --export-method app-store-connect --config src-tauri/tauri.ios.conf.json || echo "Tauri export failed (expected) — will export manually"
    # Verify the xcarchive was created
    - |
      ARCHIVE=$(find src-tauri/gen/apple/build -name "*.xcarchive" -type d | head -1)
      if [ -z "$ARCHIVE" ]; then
        echo "ERROR: No xcarchive found — build itself failed"
        exit 1
      fi
      echo "Found archive: $ARCHIVE"
      # Export IPA with explicit provisioning profile mapping
      cat > /tmp/ExportOptions.plist << 'PLISTEOF'
      <?xml version="1.0" encoding="UTF-8"?>
      <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
      <plist version="1.0">
      <dict>
          <key>method</key>
          <string>app-store</string>
          <key>teamID</key>
          <string>2W7AC6T8T5</string>
          <key>signingStyle</key>
          <string>manual</string>
          <key>provisioningProfiles</key>
          <dict>
              <key>com.futo.notes</key>
              <string>FUTO Notes App Store</string>
          </dict>
      </dict>
      </plist>
      PLISTEOF
      xcodebuild -exportArchive \
        -archivePath "$ARCHIVE" \
        -exportOptionsPlist /tmp/ExportOptions.plist \
        -exportPath src-tauri/gen/apple/build/export
    - cd ../..

    # Upload to TestFlight
    - mkdir -p ~/.private_keys
    - cp .secure_files/AuthKey*.p8 ~/.private_keys/
    - IPA_PATH=$(find apps/tauri/src-tauri/gen/apple/build -name "*.ipa" -type f | head -1)
    - echo "Uploading $IPA_PATH to TestFlight"
    - xcrun altool --upload-app --type ios --file "$IPA_PATH" --apiKey "$ASC_KEY_ID" --apiIssuer "$ASC_ISSUER_ID"

    # Copy IPA to artifacts location
    - cp "$IPA_PATH" ./
  binary_artifacts:
    path: "*.ipa"

build_macos_task:
  name: buildFutoNotesMacOS
  macos_instance:
    image: ghcr.io/cirruslabs/macos-sequoia-xcode:26.2
  buildFutoNotesMacOS_script:
    # Fetch secure files (certificates, API keys)
    - curl --silent "https://gitlab.com/gitlab-org/incubation-engineering/mobile-devops/download-secure-files/-/raw/main/installer" | bash

    # Install signing certificate
    - security unlock-keychain -p "admin" ~/Library/Keychains/login.keychain
    - security import ./.secure_files/MacCertificates.p12 -k ~/Library/Keychains/login.keychain -P "$MACOS_CERT_PASSWORD" -T /usr/bin/codesign
    - "security set-key-partition-list -S apple-tool:,apple: -s -k admin ~/Library/Keychains/login.keychain"

    # Set Tauri signing env vars
    - export APPLE_CERTIFICATE=$(base64 < .secure_files/MacCertificates.p12)
    - export APPLE_CERTIFICATE_PASSWORD="$MACOS_CERT_PASSWORD"
    - export APPLE_SIGNING_IDENTITY="Developer ID Application: FUTO Holdings, Inc. (2W7AC6T8T5)"

    # Set Tauri notarization env vars
    - export APPLE_API_KEY=$(ls .secure_files/AuthKey*.p8 | head -1)
    - export APPLE_API_KEY_ID="$ASC_KEY_ID"
    - export APPLE_API_ISSUER="$ASC_ISSUER_ID"

    # Install Node
    - brew install node@22
    - export PATH="$(brew --prefix node@22)/bin:$PATH"
    - node --version

    # Install Rust with universal macOS targets
    - curl https://sh.rustup.rs -sSf | sh -s -- -y
    - export PATH="$HOME/.cargo/bin:$PATH"
    - rustup target add x86_64-apple-darwin aarch64-apple-darwin
    - cargo install tauri-cli --locked

    # Derive version from git tag
    - VERSION="${CI_COMMIT_TAG#v}"
    - echo "Building macOS version $VERSION"

    # Install dependencies
    - npm ci

    # Set version in tauri.conf.json from git tag
    - |
      node -e "
        const fs = require('fs');
        const f = 'apps/tauri/src-tauri/tauri.conf.json';
        const c = JSON.parse(fs.readFileSync(f, 'utf8'));
        c.version = process.argv[1];
        fs.writeFileSync(f, JSON.stringify(c, null, 2) + '\n');
      " "$VERSION"

    # Build universal macOS DMG (Tauri handles signing + notarization)
    - cd apps/tauri
    - cargo tauri build --target universal-apple-darwin
    - cd ../..

    # Copy DMG to artifacts location
    - cp apps/tauri/src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg ./
  binary_artifacts:
    path: "*.dmg"
