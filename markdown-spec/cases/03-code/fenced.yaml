- name: fenced-code-basic
  complexity: 15
  markdown: |
    ```
    hello world
    ```
  cursor: null
  expect:
    decorations:
      - class: cm-md-code-block
        count: 3
      - class: cm-md-code-block-first
        count: 1
      - class: cm-md-code-block-last
        count: 1

- name: fenced-code-with-language
  complexity: 15
