- name: tag-not-in-inline-code
  complexity: 40
  markdown: "Use `#notATag` in code."
  cursor: null
  expect:
    decorations:
      - class: cm-md-tag
        count: 0
    tags: []

- name: tag-not-in-fenced-code
  complexity: 40
  markdown: |
    ```
    #notATag inside code block
    ```
  cursor: null
  expect:
    decorations:
      - class: cm-md-tag
        count: 0
    tags: []

