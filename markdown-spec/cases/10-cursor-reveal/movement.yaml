    This control paragraph should also wrap inside the pinned editor width so ArrowUp from its visual end moves to the previous wrapped row while staying in the same logical line.
  require_wrapped_start_line: true
  start_cursor: { line: 0, ch: 999 }
  moves: [ArrowUp]
  checkpoints:
