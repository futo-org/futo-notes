- name: hr-leading-italic-wrap-arrow-up-stays-in-paragraph
  complexity: 45
  markdown: |
    ---

    *I* wrote a long sentence that should wrap inside the pinned editor width so ArrowUp from the visual end of this paragraph stays inside the same logical line instead of jumping to the horizontal rule above it.
  require_wrapped_start_line: true
  start_cursor: { line: 2, ch: 999 }
  moves: [ArrowUp]
  checkpoints:
    - after: 1
      line: 2
      vertical: up
  expect_final:
    line: 2

