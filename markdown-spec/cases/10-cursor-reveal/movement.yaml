- name: leading-italic-hides-after-moving-below-element
  complexity: 45
  markdown: |
    ---

    *I* wrote a long sentence that should wrap inside the pinned editor width so moving down from the first visual row leaves the italic span and should hide the markdown markers again.
  require_wrapped_start_line: true
  start_cursor: { line: 2, ch: 1 }
  moves: [ArrowDown]
  checkpoints:
    - after: 1
      line: 2
      visible_text_excludes: "*I*"
  expect_final:
    line: 2
    visible_text_excludes: "*I*"

