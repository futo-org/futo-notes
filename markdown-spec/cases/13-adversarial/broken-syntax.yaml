# Broken, ambiguous, and adversarial markdown inputs.
# These test that the editor doesn't crash, doesn't render garbage,
# and degrades gracefully when given malformed input.

# --- Unclosed formatting ---

- name: unclosed-bold
  complexity: 150
  markdown: "**bold without closing"
  cursor: null
  expect:
    decorations:
      - class: cm-md-strong
        count: 0
    visible_text_contains: "**bold without closing"

- name: unclosed-italic
  complexity: 150
  markdown: "*italic without closing"
  cursor: null
  expect:
    decorations:
      - class: cm-md-emphasis
        count: 0
    visible_text_contains: "*italic without closing"

- name: unclosed-strikethrough
  complexity: 150
  markdown: "~~strikethrough without closing"
  cursor: null
  expect:
    decorations:
      - class: cm-md-strikethrough
        count: 0
    visible_text_contains: "~~strikethrough without closing"

- name: unclosed-inline-code
  complexity: 150
  markdown: "`code without closing"
  cursor: null
  expect:
    visible_text_contains: "`code without closing"

- name: unclosed-link-bracket
  complexity: 150
  markdown: "[link text without closing"
  cursor: null
  expect:
    decorations:
      - class: cm-md-link
        count: 0
    visible_text_contains: "[link text without closing"

- name: unclosed-link-url
  complexity: 150
  markdown: "[text](https://example.com"
  cursor: null
  expect:
    # CM6 may still parse this as a link depending on parser leniency.
    # Just verify it doesn't crash and text is visible.
    visible_text_contains: "text"

- name: unclosed-wikilink
  complexity: 130
  markdown: "[[unclosed wikilink"
  cursor: null
  expect:
    decorations:
      - class: cm-md-wikilink
        count: 0

- name: unclosed-fenced-code
  complexity: 160
  markdown: "```\ncode but no closing fence\nmore code"
  cursor: null
  expect:
    # Unclosed fences: CM6 treats remaining lines as code block content.
    decorations:
      - class: cm-md-code-block

