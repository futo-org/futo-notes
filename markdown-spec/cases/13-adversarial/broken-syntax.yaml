# --- Syntax at boundaries ---

- name: emphasis-at-line-boundary
  complexity: 140
  markdown: "*italic\nacross lines*"
  cursor: null
  expect:
    visible_text_contains: "italic"

- name: bold-at-line-boundary
  complexity: 140
  markdown: "**bold\nacross lines**"
  cursor: null
  expect:
    visible_text_contains: "bold"

- name: wikilink-with-newline
  complexity: 130
  markdown: "[[note\nwith newline]]"
  cursor: null
  expect:
    decorations:
      - class: cm-md-wikilink
        count: 0

- name: heading-after-text
  complexity: 110
  markdown: "some text # not a heading"
  cursor: null
  expect:
    decorations:
      - class: cm-md-h1
        count: 0

- name: heading-with-only-hashes
  complexity: 120
  markdown: "######"
  cursor: null
  expect:
    # CM6 parses ###### (no space, no text) as an ATX heading with empty content.
    # After marker hiding, nothing remains visible.
    decorations:
      - class: cm-md-h6

- name: heading-seven-levels
  complexity: 120
  markdown: "####### not a valid heading"
  cursor: null
  expect:
    decorations:
      - class: cm-md-h1
        count: 0
      - class: cm-md-h2
        count: 0
      - class: cm-md-h3
        count: 0
      - class: cm-md-h4
        count: 0
      - class: cm-md-h5
        count: 0
      - class: cm-md-h6
        count: 0

# --- Empty/degenerate inputs ---

- name: empty-bold
  complexity: 130
  markdown: "****"
  cursor: null
  expect:
    # CM6 parses **** as empty StrongEmphasis — markers hidden, nothing visible.
    # This is correct behavior (degenerate but valid syntax).
    decorations:
      - class: cm-md-strong
        count: 0

- name: empty-italic
  complexity: 130
  markdown: "**"
  cursor: null
  expect:
    visible_text_contains: "**"

- name: empty-inline-code
  complexity: 130
  markdown: "``"
  cursor: null
  expect:
    visible_text_contains: "``"

- name: empty-link
  complexity: 130
  markdown: "[](https://example.com)"
  cursor: null
  expect:
    # CM6 parses this as a valid link with empty text.
    # processLink hides all markers — nothing visible remains.
    decorations:
      - class: cm-md-marker-hidden

- name: empty-wikilink
  complexity: 130
  markdown: "[[]]"
  cursor: null
  expect:
    decorations:
      - class: cm-md-wikilink
        count: 0

- name: link-empty-url
  complexity: 130
  markdown: "[text]()"
  cursor: null
  expect:
    visible_text_contains: "text"

- name: empty-fenced-code
  complexity: 110
  markdown: "```\n```"
  cursor: null
  expect:
    decorations:
      - class: cm-md-marker-hidden
        count: 2

- name: only-whitespace
  complexity: 100
  markdown: "   \n  \n   "
  cursor: null
  expect:
    decorations:
      - class: cm-md-h1
        count: 0

