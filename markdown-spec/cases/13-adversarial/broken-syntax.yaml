# --- Pathological combinations ---

- name: wikilink-inside-link-syntax
  complexity: 170
  markdown: "[[[nested]] link](https://example.com)"
  cursor: null
  expect:
    visible_text_contains: "nested"

- name: link-inside-wikilink
  complexity: 170
  markdown: "[[note [with](url) inside]]"
  cursor: null
  expect:
    visible_text_contains: "note"

- name: tag-that-looks-like-heading
  complexity: 140
  markdown: " #tag at start with space"
  cursor: null
  expect:
    tags:
      - "#tag"

- name: heading-that-looks-like-tag
  complexity: 140
  markdown: "#heading"
  cursor: null
  expect:
    # QUIRK: Server extracts #heading as a tag (regex match).
    # Client renders it as an ATX heading, NOT a tag.
    # This is a known client/server conformance gap.
    tags:
      - "#heading"

- name: all-markers-on-one-line
  complexity: 180
  markdown: "# **bold** *italic* ~~struck~~ `code` [link](url) [[wiki]] #tag"
  cursor: null
  expect:
    visible_text_contains: "bold"
    tags:
      - "#tag"

- name: markdown-injection-attempt
  complexity: 180
  markdown: "```\n</div><script>alert(1)</script>\n```"
  cursor: null
  expect:
    decorations:
      - class: cm-md-code-block

- name: extremely-long-line
