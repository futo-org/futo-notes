- name: blockquote-multiline
  complexity: 20
  markdown: |
    > First line.
    > Second line.
  cursor: null
  expect:
    decorations:
      - class: cm-md-quote
        count: 2

- name: blockquote-cursor-dimmed-marker
  complexity: 30
  markdown: |
    > First line.
    > Second line.
  cursor: { line: 0, ch: 5 }
  expect:
    decorations:
      - class: cm-md-quote-marker
        count: 1
