- name: wikilink-basic
  complexity: 10
  markdown: "Check [[my note]] here."
  cursor: null
  expect:
    decorations:
      - class: cm-md-wikilink
        text: "my note"
        attrs:
          data-wikilink: "my note"
    visible_text: "Check my note here."

- name: wikilink-cursor-reveal
  complexity: 20
  markdown: "Check [[my note]] here."
  cursor: { line: 0, ch: 10 }
  expect:
    visible_text_contains: "[[my note]]"

- name: wikilink-multiple-on-line
  complexity: 35
  markdown: "See [[note one]] and [[note two]]."
  cursor: null
  expect:
    decorations:
      - class: cm-md-wikilink
        count: 2
    visible_text: "See note one and note two."

- name: wikilink-with-spaces
  complexity: 30
  markdown: "[[grocery list]]"
  cursor: null
  expect:
    decorations:
      - class: cm-md-wikilink
        text: "grocery list"
        attrs:
          data-wikilink: "grocery list"

- name: wikilink-styling-dashed
  complexity: 15
  markdown: "See [[my note]] here."
  cursor: null
  expect:
    decorations:
      - class: cm-md-link
        count: 1
      - class: cm-md-wikilink
        count: 1
