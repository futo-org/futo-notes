name: FutoNotesNative
options:
  bundleIdPrefix: com.futo.notes
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    CODE_SIGNING_ALLOWED: "NO"
    CODE_SIGNING_REQUIRED: "NO"
    CODE_SIGN_IDENTITY: ""
    SWIFT_VERSION: "5.0"
    SWIFT_STRICT_CONCURRENCY: minimal

targets:
  FutoNotesNative:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Sources
      - path: Resources
        buildPhase: resources
      - path: Assets.xcassets
        buildPhase: resources
    dependencies:
      # Rust note-domain + sync/auth/E2EE facade (UniFFI). Static lib
      # xcframework — don't embed. Exposes NoteStore + rules + SyncClient.
      - framework: FutoNotesFfi.xcframework
        embed: false
      # System frameworks the Rust networking stack (reqwest/rustls/ring/tokio)
      # may reference when linked into the app.
      - sdk: Security.framework
      - sdk: SystemConfiguration.framework
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.futo.notes
        PRODUCT_NAME: FutoNotesNative
        # Version defaults for local archives. CI overrides both on a tag build
        # (MARKETING_VERSION=${tag#v}, CURRENT_PROJECT_VERSION=$CI_PIPELINE_IID —
        # see .cirrus.yml). Without these a local Release archive ships no
        # CFBundleShortVersionString/CFBundleVersion, which App Store Connect
        # rejects. Keep MARKETING_VERSION in step with the latest release tag.
        MARKETING_VERSION: "1.5.1"
        CURRENT_PROJECT_VERSION: "1"
        # Export compliance (App Store upload). The app uses only standard
        # cryptography (AES-256-GCM + PBKDF2 for E2EE, TLS for transport) and
        # claims the exemption, so the upload skips the manual encryption
        # questionnaire. NOTE: this is an export-control attestation — confirm
        # FUTO's compliance posture (a self-classification / ERN report to BIS
        # may be required for non-exempt strong crypto) before the first
        # production submission.
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: "NO"
        # App icon shared with the Tauri build (Assets.xcassets/AppIcon.appiconset).
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_CFBundleDisplayName: "FUTO Notes"
        INFOPLIST_KEY_UILaunchScreen_Generation: "YES"
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: "YES"
        # Editor image insertion (bridge 'pickImage'). The library path uses
        # PHPicker (out-of-process, no prompt) but the description is required
        # for App Store review hygiene; the camera path genuinely prompts.
        INFOPLIST_KEY_NSPhotoLibraryUsageDescription: "Attach photos from your library to notes."
        INFOPLIST_KEY_NSCameraUsageDescription: "Take a photo and attach it to a note."
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        GENERATE_INFOPLIST_FILE: "YES"
        # Keychain (sync-password persistence for force-quit survival) requires a
        # keychain-access-groups entitlement + a code signature. The simulator
        # uses ad-hoc signing (run.sh passes CODE_SIGN_IDENTITY=-); device builds
        # sign with a real team (run-device.sh).
        CODE_SIGN_ENTITLEMENTS: FutoNotesNative.entitlements
        CODE_SIGNING_REQUIRED: "NO"
        TARGETED_DEVICE_FAMILY: "1,2"
      # ── Dev/prod separation (mirrors the Tauri debug guard) ──
      # Debug builds get a SEPARATE bundle id + data root + keychain service so a
      # dev/debug install can never overwrite the production app or touch the
      # user's real notes (see CLAUDE.md "Dev/debug builds MUST NOT overwrite").
      # The two markers below are read at runtime:
      #   - PRODUCT_BUNDLE_IDENTIFIER drives the install identity.
      #   - FUTO_DEBUG_BUILD=1 (Debug only) selects the dev data root +
      #     dev keychain service in Swift (NotesStore / Keychain).
      # Debug also relaxes App Transport Security so the dev sync server can be
      # reached over plain http on the LAN/localhost. Release ships NO ATS
      # exception — it must behave byte-identically to before this change.
      configs:
        Debug:
          PRODUCT_BUNDLE_IDENTIFIER: com.futo.notes.dev
          INFOPLIST_KEY_CFBundleDisplayName: "FUTO Notes Dev"
          # Dev keychain group must match the dev bundle id.
          CODE_SIGN_ENTITLEMENTS: FutoNotesNative.dev.entitlements
          # DEBUG already defined by Xcode's default Swift flags; FUTO_DEBUG_BUILD
          # is our own compile-time marker so the dev/prod split is explicit and
          # testable independent of the DEBUG macro.
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: "$(inherited) DEBUG FUTO_DEBUG_BUILD"
          # ATS exception — DEBUG ONLY. Allows the dev sync server over plain
          # http on localhost/LAN. Supplied via a base Info.plist (the flat
          # INFOPLIST_KEY_NSAppTransportSecurity_* form does NOT synthesize the
          # nested dict). GENERATE_INFOPLIST_FILE merges the auto-generated keys
          # on top, so this file contributes ONLY the ATS dict. Release sets no
          # INFOPLIST_FILE → no ATS exception (byte-identical to before).
          INFOPLIST_FILE: Info.debug.plist
        Release:
          PRODUCT_BUNDLE_IDENTIFIER: com.futo.notes
