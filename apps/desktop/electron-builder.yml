appId: com.futo.notes.desktop
productName: FUTO Notes
copyright: Copyright © 2025 FUTO

directories:
  output: release

files:
  - dist-electron/**/*
  - from: ../../dist
    to: dist
    filter:
      - "**/*"

linux:
  target:
    - AppImage
    - deb
  category: Office
  icon: ../../src/assets

mac:
  target:
    - dmg
    - zip
  category: public.app-category.productivity
  icon: ../../src/assets

win:
  target:
    - nsis
  icon: ../../src/assets

publish:
  provider: generic
  url: ""
