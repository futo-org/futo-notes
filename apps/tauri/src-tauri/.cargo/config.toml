# DO NOT REMOVE — IME shield workaround.
#
# This injects the FUTO Keyboard / empty-note backspace renderer-crash
# workaround into wry's generated RustWebView.kt via the supported
# WRY_RUSTWEBVIEW_CLASS_EXTENSION extension hook. cargo-tauri filters
# environment variables when it invokes `cargo build`, so setting the
# var in the shell does NOT reach wry's build script. Setting it here
# in .cargo/config.toml's [env] table makes cargo set it on every
# build script invocation, regardless of caller.
#
# Removing this re-opens the renderer crash:
#   FUTO Keyboard + empty note + backspace → Chromium SIGTRAP.
# See docs/learnings/ime-shield-workaround.md for the full rationale.
# `just verify-ime-shield-in-generated` runs after every android-*
# build to confirm the override actually landed in the regenerated
# RustWebView.kt.
#
# The TOML triple-quoted string preserves newlines, which wry's
# build.rs interpolates verbatim at the {{class-extension}} placeholder
# in src/android/kotlin/RustWebView.kt.

[env]
WRY_RUSTWEBVIEW_CLASS_EXTENSION = '''
    // ──────────────────────────────────────────────────────────────────
    // IME SHIELD — injected via WRY_RUSTWEBVIEW_CLASS_EXTENSION at
    // build time. Source of truth: apps/tauri/src-tauri/.cargo/config.toml.
    // See docs/learnings/ime-shield-workaround.md.
    //
    // Removing this override re-opens the FUTO Keyboard + empty-note
    // + backspace renderer crash on Android / Chromium 147.
    // ──────────────────────────────────────────────────────────────────
    override fun onCreateInputConnection(outAttrs: android.view.inputmethod.EditorInfo): android.view.inputmethod.InputConnection? {
        val base = super.onCreateInputConnection(outAttrs) ?: return null
        return FutoImeConnection(base)
    }
'''

# Statically link the MSVC C runtime into the Windows binary.
#
# A default MSVC build links the VC++ runtime dynamically (VCRUNTIME140.dll,
# MSVCP140*.dll), which a clean Windows install does NOT ship — so the app dies
# on first launch with "MSVCP140_1.dll was not found" until some other app
# happens to install the redistributable. `+crt-static` bakes the runtime into
# our .exe instead, so it launches on a clean machine with no redistributable.
# This supersedes the old bundle-vc_redist + NSIS-hook workaround.
#
# Windows-MSVC-target scoped, so Linux/macOS/Android builds are unaffected.
# Enforced by ci/win-build.ps1 (dumpbin: the .exe must not import VCRUNTIME140/
# MSVCP140) and src/lib/platform/windowsRuntimeConfig.test.ts (this flag present).
[target.x86_64-pc-windows-msvc]
rustflags = ["-C", "target-feature=+crt-static"]
