[package]
name = "futo-notes-tauri"
version = "0.1.0"
edition = "2021"

[lib]
name = "futo_notes_tauri_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[[bin]]
name = "futo-notes-tauri"
path = "src/main.rs"

[build-dependencies]
tauri-build = { version = "2.0.2", features = [] }

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tauri = { version = "2.9.1", features = ["protocol-asset"] }
tauri-plugin-dialog = "2.4.2"
tauri-plugin-process = "2"
tauri-plugin-clipboard-manager = "2"
tauri-plugin-opener = "2"
tauri-plugin-fs = "2"
stonefruit-core = { path = "../../../crates/stonefruit-core" }
rand = "0.9"
rand_chacha = "0.9"
rayon = "1.11.0"
sha2 = "0.10.9"
filetime = "0.2.26"
notify = "8.2.0"
reqwest = { version = "0.12.12", default-features = false, features = ["blocking", "json", "rustls-tls"] }
png = "0.17"
libc = "0.2"
tauri-plugin-mcp-bridge = "0.10.0"

# macOS + Windows: ort downloads and statically links libonnxruntime during
# `cargo build`. pyke's prebuilts for these targets link cleanly.
[target.'cfg(any(target_os = "macos", target_os = "windows"))'.dependencies]
tauri-plugin-single-instance = "2"
stonefruit-inference = { path = "../../../crates/stonefruit-inference" }

# Linux: ORT ships as a separate libonnxruntime.so in
# apps/tauri/src-tauri/gen/linux/, fetched by `scripts/fetch-ort-linux.mjs`
# from Microsoft's official tarball (glibc 2.17 floor, no __isoc23_* symbols).
# The .so is bundled as a Tauri resource; init_ort_dylib_path() in lib.rs sets
# ORT_DYLIB_PATH at startup so `ort::init` finds it.
[target.'cfg(target_os = "linux")'.dependencies]
tauri-plugin-single-instance = "2"
stonefruit-inference = { path = "../../../crates/stonefruit-inference", default-features = false, features = ["load-dynamic"] }
glib = "0.18"

[target.'cfg(target_os = "ios")'.dependencies]
objc2 = "0.6"
# iOS: ORT statically linked via xcframework fetched by `scripts/fetch-ort-ios.mjs`.
# ORT_IOS_XCFWK_PATH is set by the Xcode pre-build script in project.yml.
# CoreML EP enables Neural Engine / GPU acceleration on iPhone.
stonefruit-inference = { path = "../../../crates/stonefruit-inference", default-features = false, features = ["coreml"] }

[target.'cfg(target_os = "android")'.dependencies]
# Android: ORT ships as a separate .so in gen/android/.../jniLibs/<abi>/,
# fetched by `node scripts/fetch-ort-android.mjs`. XNNPACK EP for SIMD CPU
# inference on ARM. Opting out of ort's build-time download here because
# cross-compiling through pyke's CDN isn't set up and load-dynamic is simpler
# to reason about.
stonefruit-inference = { path = "../../../crates/stonefruit-inference", default-features = false, features = ["load-dynamic", "xnnpack"] }

[lints.clippy]
too_many_lines = "warn"

[features]
default = ["custom-protocol"]
custom-protocol = ["tauri/custom-protocol"]
