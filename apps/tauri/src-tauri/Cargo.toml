[package]
name = "futo-notes-tauri"
version = "0.1.0"
edition = "2021"

[lib]
name = "futo_notes_tauri_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[[bin]]
name = "futo-notes-tauri"
path = "src/main.rs"

[build-dependencies]
tauri-build = { version = "2.0.2", features = [] }

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tauri = { version = "2.9.1", features = ["protocol-asset"] }
tauri-plugin-dialog = "2.4.2"
tauri-plugin-process = "2"
tauri-plugin-clipboard-manager = "2"
tauri-plugin-opener = "2"
stonefruit-core = { path = "../../../crates/stonefruit-core" }
rand = "0.9"
rand_chacha = "0.9"
rayon = "1.11.0"
sha2 = "0.10.9"
filetime = "0.2.26"
notify = "8.2.0"
reqwest = { version = "0.12.12", default-features = false, features = ["blocking", "json", "rustls-tls"] }
libc = "0.2"
tauri-plugin-mcp-bridge = "0.10.0"

[target.'cfg(not(any(target_os = "android", target_os = "ios")))'.dependencies]
tauri-plugin-single-instance = "2"

[target.'cfg(target_os = "ios")'.dependencies]
objc2 = "0.6"

[target.'cfg(target_os = "linux")'.dependencies]
glib = "0.18"

[lints.clippy]
too_many_lines = "warn"

[features]
default = ["custom-protocol"]
custom-protocol = ["tauri/custom-protocol"]
