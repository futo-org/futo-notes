default:
  tags:
    - dind
  image: gitlab.futo.org:5050/futocore/ci/kitchensink:latest
  interruptible: true
  before_script:
    - . $HOME/.nvm/nvm.sh
    - corepack enable
    - corepack prepare pnpm@10.29.2 --activate
    - export PATH="$CARGO_HOME/bin:$PATH"

variables:
  CARGO_HOME: $CI_PROJECT_DIR/.cargo-home
  PNPM_STORE_DIR: $CI_PROJECT_DIR/.pnpm-store
  PLAYWRIGHT_BROWSERS_PATH: $CI_PROJECT_DIR/.cache-ms-playwright

workflow:
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_MERGE_REQUEST_IID
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

stages:
  - cleanup
  - test
  - build
  - verify
  - publish
  - release

# ─────────────────────────────────────────────────────────────
# Reusable script fragments
# ─────────────────────────────────────────────────────────────

.setup-rust:
  script:
    - |
      if ! command -v rustup >/dev/null 2>&1; then
        curl https://sh.rustup.rs -sSf | sh -s -- -y
        export PATH="$CARGO_HOME/bin:$PATH"
      fi
    - rustup default stable
    - |
      if command -v cargo-tauri >/dev/null 2>&1; then
        echo "cargo-tauri already installed (cached)"
      else
        echo "Installing cargo-binstall..."
        curl -L --proto '=https' --tlsv1.2 -sSf https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh | bash
        echo "Installing tauri-cli via binstall..."
        cargo binstall tauri-cli --no-confirm --locked
      fi

.setup-linux-deps:
  script:
    - |
      if command -v apt-get >/dev/null 2>&1; then
        apt-get update
        DEBIAN_FRONTEND=noninteractive apt-get install -y \
          libwebkit2gtk-4.1-dev \
          libgtk-3-dev \
          libayatana-appindicator3-dev \
          librsvg2-dev \
          patchelf \
          xdg-utils
      fi

.set-version:
  script:
    - |
      VERSION="${CI_COMMIT_TAG#v}"
      echo "VERSION=$VERSION" >> build.env
      echo "Building version $VERSION from tag $CI_COMMIT_TAG"
      node -e "
        const fs = require('fs');
        const f = 'apps/tauri/src-tauri/tauri.conf.json';
        const c = JSON.parse(fs.readFileSync(f, 'utf8'));
        c.version = '$VERSION';
        fs.writeFileSync(f, JSON.stringify(c, null, 2) + '\n');
      "

# ─────────────────────────────────────────────────────────────
# Cache templates
# ─────────────────────────────────────────────────────────────

.cache-pnpm:
  cache:
    key:
      files:
        - pnpm-lock.yaml
    paths:
      - .pnpm-store/
    policy: pull-push

.cache-cargo-tauri:
  cache:
    key:
      files:
        - apps/tauri/src-tauri/Cargo.lock
    paths:
      - .cargo-home/
      - apps/tauri/src-tauri/target/
    policy: pull-push

.cache-cargo-cli:
  cache:
    key:
      files:
        - apps/cli/Cargo.lock
    paths:
      - .cargo-home/
      - apps/cli/target/
    policy: pull-push

.cache-playwright:
  cache:
    key:
      prefix: playwright
      files:
        - pnpm-lock.yaml
    paths:
      - .cache-ms-playwright/
    policy: pull-push

# ─────────────────────────────────────────────────────────────
# Cleanup
# ─────────────────────────────────────────────────────────────

docker:prune:
  stage: cleanup
  script:
    - docker system prune -af --volumes
    - df -h /
  allow_failure: true

# ─────────────────────────────────────────────────────────────
# Tests
# ─────────────────────────────────────────────────────────────

lint:
  stage: test
  needs: [docker:prune]
  cache:
    - !reference [.cache-pnpm, cache]
  script:
    - pnpm install --frozen-lockfile
    - pnpm run lint
    - pnpm run lint:platform

test:unit:
  stage: test
  needs: [docker:prune]
  cache:
    - !reference [.cache-pnpm, cache]
  script:
    - pnpm install --frozen-lockfile
    - pnpm run test:unit

test:e2e:
  stage: test
  needs: [docker:prune]
  cache:
    - !reference [.cache-pnpm, cache]
    - !reference [.cache-playwright, cache]
  script:
    - pnpm install --frozen-lockfile
    - pnpm exec playwright install --with-deps chromium
    - pnpm run test:markdown-spec
    - pnpm run test:e2e:rest

test:shared:
  stage: test
  needs: [docker:prune]
  cache:
    - !reference [.cache-pnpm, cache]
  script:
    - pnpm install --frozen-lockfile
    - pnpm run test:shared

test:server:
  stage: test
  needs: [docker:prune]
  cache:
    - !reference [.cache-cargo-tauri, cache]
  script:
    - !reference [.setup-rust, script]
    - cargo test -p stonefruit-server

test:server:smoke:
  stage: test
  needs: [docker:prune]
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG
  script:
    - IMAGE_SHA=$(docker build -q -f crates/stonefruit-server/Dockerfile .)
    - CONTAINER="sf-smoke-${CI_JOB_ID}"
    - docker rm -f "$CONTAINER" 2>/dev/null || true
    - docker run --rm -d --name "$CONTAINER" "$IMAGE_SHA"
    - |
      cleanup() { docker logs "$CONTAINER" 2>&1 || true; docker stop "$CONTAINER" 2>/dev/null || true; }
      trap cleanup EXIT
      for i in $(seq 1 10); do
        if curl -sf "http://$(docker inspect -f '{{range.NetworkSettings.Networks}}{{.IPAddress}}{{end}}' "$CONTAINER"):3005/health"; then exit 0; fi
        sleep 2
      done
      echo "Health check failed after 10 retries"
      exit 1

test:rust:
  stage: test
  needs: [docker:prune]
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_MERGE_REQUEST_IID
  cache:
    - !reference [.cache-pnpm, cache]
    - !reference [.cache-cargo-tauri, cache]
  script:
    - pnpm install --frozen-lockfile
    - !reference [.setup-linux-deps, script]
    - !reference [.setup-rust, script]
    - pnpm run tauri:test:rust

test:rust:macos:
  stage: test
  tags:
    - macscript
  needs: [docker:prune]
  allow_failure: true
  before_script:
    - env | grep -E '^(CI_)' > .cienv
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_MERGE_REQUEST_IID
  script:
    - cirrus run testRustMacOS --artifacts-dir . --env-file .cienv

test:desktop-smoke:
  stage: test
  needs: [docker:prune]
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_MERGE_REQUEST_IID
      changes:
        - apps/tauri/**/*
        - src/**/*
        - packages/shared/**/*
  cache:
    - !reference [.cache-pnpm, cache]
    - !reference [.cache-cargo-tauri, cache]
  script:
    - pnpm install --frozen-lockfile
    - !reference [.setup-linux-deps, script]
    - !reference [.setup-rust, script]
    - DEBIAN_FRONTEND=noninteractive apt-get install -y xvfb
    # Build frontend + debug binary
    - pnpm run build
    - cd apps/tauri && cargo tauri build --debug --no-bundle && cd ../..
    # Pre-configure notes dir so app boots to editor
    - |
      NOTES_DIR=$(mktemp -d)
      mkdir -p ~/.local/share/com.futo.notes
      echo '{"notesDir":"'"$NOTES_DIR"'"}' > ~/.local/share/com.futo.notes/notes-dir-override.json
    # Launch under xvfb
    - |
      TAURI_LOG="/tmp/tauri-smoke.log"
      WEBKIT_DISABLE_DMABUF_RENDERER=1 \
        xvfb-run -a --server-args="-screen 0 1280x800x24" \
        target/debug/futo-notes-tauri > "$TAURI_LOG" 2>&1 &
    # Run smoke tests (script handles port discovery + retries)
    - node tests/desktop-smoke.mjs --log-file /tmp/tauri-smoke.log
  after_script:
    - kill $(pgrep -f futo-notes-tauri) 2>/dev/null || true
  artifacts:
    when: always
    paths:
      - test-screenshots/smoke-*.png
      - test-screenshots/smoke-results.json
    expire_in: 1 week

test:cross-platform-sync:
  stage: test
  needs: [docker:prune]
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_MERGE_REQUEST_IID
      changes:
        - apps/tauri/**/*
        - src/**/*
        - crates/**/*
        - packages/shared/**/*
  cache:
    - !reference [.cache-pnpm, cache]
    - !reference [.cache-cargo-tauri, cache]
  script:
    - pnpm install --frozen-lockfile
    - !reference [.setup-linux-deps, script]
    - !reference [.setup-rust, script]
    - DEBIAN_FRONTEND=noninteractive apt-get install -y xvfb
    # Build debug Tauri binary (beforeBuildCommand runs pnpm build with test hooks) + server binary
    - cd apps/tauri && VITE_INCLUDE_TEST_HOOKS=true cargo tauri build --debug --no-bundle && cd ../..
    - cargo build -p stonefruit-server
    # Run cross-platform sync tests under xvfb
    - >-
      WEBKIT_DISABLE_DMABUF_RENDERER=1
      xvfb-run -a --server-args="-screen 0 1280x800x24"
      node tests/cross-platform-sync.mjs
  after_script:
    - kill $(pgrep -f futo-notes-tauri) 2>/dev/null || true
    - kill $(pgrep -f stonefruit-server) 2>/dev/null || true
  artifacts:
    when: always
    paths:
      - test-screenshots/sync-results.json
    expire_in: 1 week
  timeout: 20m

test:desktop-smoke:macos:
  stage: test
  tags:
    - macscript
  needs: [docker:prune]
  allow_failure: true
  before_script:
    - env | grep -E '^(CI_)' > .cienv
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_MERGE_REQUEST_IID
      changes:
        - apps/tauri/**/*
        - src/**/*
  script:
    - cirrus run testDesktopSmokeMacOS --artifacts-dir . --env-file .cienv

# ─────────────────────────────────────────────────────────────
# Docker (default branch only)
# ─────────────────────────────────────────────────────────────

docker:publish:
  stage: build
  needs:
    - job: test:server
    - job: test:server:smoke
      optional: true
  script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
    - docker run --rm --privileged multiarch/qemu-user-static --reset -p yes
    - docker buildx create --use --name multiarch
    - |
      export IMAGE="$CI_REGISTRY_IMAGE/server"
      TAGS="-t $IMAGE:latest"
      if [ -n "$CI_COMMIT_TAG" ]; then
        TAGS="$TAGS -t $IMAGE:${CI_COMMIT_TAG}"
      fi
      docker buildx build -f crates/stonefruit-server/Dockerfile \
        --platform linux/amd64,linux/arm64 \
        $TAGS --push .
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

docker:verify:
  stage: verify
  needs: [docker:publish]
  script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
    - |
      IMAGE="$CI_REGISTRY_IMAGE/server"
      TAG="${CI_COMMIT_TAG:-latest}"
      echo "Pulling $IMAGE:$TAG"
      docker pull "$IMAGE:$TAG"
    - CONTAINER="sf-verify-${CI_JOB_ID}"
    - docker rm -f "$CONTAINER" 2>/dev/null || true
    - docker run --rm -d --name "$CONTAINER" "$IMAGE:$TAG"
    - |
      cleanup() { docker logs "$CONTAINER" 2>&1 || true; docker stop "$CONTAINER" 2>/dev/null || true; }
      trap cleanup EXIT
      IP=$(docker inspect -f '{{range.NetworkSettings.Networks}}{{.IPAddress}}{{end}}' "$CONTAINER")
      for i in $(seq 1 15); do
        if curl -sf "http://$IP:3006/health" > /dev/null; then
          echo "Health check passed on attempt $i"
          exit 0
        fi
        sleep 2
      done
      echo "Published image health check failed after 15 retries"
      exit 1
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# ─────────────────────────────────────────────────────────────
# CLI
# ─────────────────────────────────────────────────────────────

cli:test:
  stage: test
  needs: [docker:prune]
  cache:
    - !reference [.cache-cargo-cli, cache]
  script:
    - !reference [.setup-rust, script]
    - cd apps/cli
    - cargo test
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_MERGE_REQUEST_IID
      changes:
        - apps/cli/**/*
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      changes:
        - apps/cli/**/*

cli:build:amd64:
  stage: build
  needs: [cli:test]
  cache:
    - !reference [.cache-cargo-cli, cache]
  script:
    - !reference [.setup-rust, script]
    - cd apps/cli
    - |
      VERSION="${CI_COMMIT_TAG#v}"
      [ -z "$VERSION" ] && VERSION="dev"
      mkdir -p dist
      STONEFRUIT_VERSION="$VERSION" cargo build --release
      cp ../../target/release/stonefruit "dist/stonefruit-linux-amd64"
  artifacts:
    paths:
      - apps/cli/dist/
    expire_in: 4 weeks
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_MERGE_REQUEST_IID
      changes:
        - apps/cli/**/*
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      changes:
        - apps/cli/**/*

cli:build:arm64:
  stage: build
  needs: [cli:test]
  cache:
    - !reference [.cache-cargo-cli, cache]
  script:
    - !reference [.setup-rust, script]
    - cd apps/cli
    - |
      rustup target add aarch64-unknown-linux-gnu
      apt-get update -qq && apt-get install -y -qq gcc-aarch64-linux-gnu >/dev/null 2>&1 || true
      export CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc
      VERSION="${CI_COMMIT_TAG#v}"
      [ -z "$VERSION" ] && VERSION="dev"
      mkdir -p dist
      STONEFRUIT_VERSION="$VERSION" cargo build --release --target aarch64-unknown-linux-gnu
      cp ../../target/aarch64-unknown-linux-gnu/release/stonefruit "dist/stonefruit-linux-arm64"
  artifacts:
    paths:
      - apps/cli/dist/
    expire_in: 4 weeks
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_MERGE_REQUEST_IID
      changes:
        - apps/cli/**/*
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      changes:
        - apps/cli/**/*

cli:publish:
  stage: publish
  image: curlimages/curl:latest
  needs: [cli:build:amd64, cli:build:arm64]
  interruptible: false
  before_script: []
  script:
    - |
      VERSION="${CI_COMMIT_TAG#v}"
      for f in apps/cli/dist/stonefruit-*; do
        [ -f "$f" ] || continue
        NAME=$(basename "$f")
        echo "Uploading $NAME"
        curl --fail --header "JOB-TOKEN: $CI_JOB_TOKEN" \
          --upload-file "$f" \
          "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/stonefruit-cli/${VERSION}/${NAME}"
      done
  rules:
    - if: $CI_COMMIT_TAG

# ─────────────────────────────────────────────────────────────
# Builds (tags only)
# ─────────────────────────────────────────────────────────────

build:linux:
  stage: build
  needs: [lint, test:unit, test:e2e]
  cache:
    - !reference [.cache-pnpm, cache]
    - !reference [.cache-cargo-tauri, cache]
  script:
    - pnpm install --frozen-lockfile
    - !reference [.setup-linux-deps, script]
    - !reference [.setup-rust, script]
    - !reference [.set-version, script]
    - cd apps/tauri && cargo tauri build
  after_script:
    - |
      echo "=== Linux build artifacts ==="
      find apps/tauri/src-tauri/target/release/bundle -type f \
        \( -name "*.deb" -o -name "*.rpm" -o -name "*.AppImage" \) 2>/dev/null
  artifacts:
    paths:
      - apps/tauri/src-tauri/target/release/bundle/deb/*.deb
      - apps/tauri/src-tauri/target/release/bundle/rpm/*.rpm
      - apps/tauri/src-tauri/target/release/bundle/appimage/*.AppImage
    expire_in: 4 weeks
  rules:
    - if: $CI_COMMIT_TAG

build:android:
  stage: build
  needs: [lint, test:unit, test:e2e]
  cache:
    - !reference [.cache-pnpm, cache]
    - !reference [.cache-cargo-tauri, cache]
  variables:
    ANDROID_HOME: /opt/android-sdk
    JAVA_HOME: /opt/jdk-21
  script:
    - pnpm install --frozen-lockfile
    # JDK 21
    - |
      if [ ! -d "$JAVA_HOME" ]; then
        curl -sL https://download.oracle.com/java/21/latest/jdk-21_linux-x64_bin.tar.gz | tar xz -C /opt
        mv /opt/jdk-21* /opt/jdk-21
      fi
      export PATH="$JAVA_HOME/bin:$PATH"
      java -version
    # Android SDK + NDK
    - |
      mkdir -p "$ANDROID_HOME"
      if [ ! -d "$ANDROID_HOME/cmdline-tools/latest" ]; then
        curl -sL https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -o /tmp/cmdtools.zip
        unzip -q /tmp/cmdtools.zip -d "$ANDROID_HOME/cmdline-tools"
        mv "$ANDROID_HOME/cmdline-tools/cmdline-tools" "$ANDROID_HOME/cmdline-tools/latest"
      fi
      export PATH="$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools:$PATH"
      yes | sdkmanager --licenses > /dev/null 2>&1 || true
      sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0" "ndk;27.0.12077973"
      export NDK_HOME="$ANDROID_HOME/ndk/27.0.12077973"
    # Rust with Android targets
    - !reference [.setup-rust, script]
    - rustup target add aarch64-linux-android armv7-linux-androideabi x86_64-linux-android i686-linux-android
    # Version
    - !reference [.set-version, script]
    # Initialize Tauri Android project
    - cd apps/tauri && cargo tauri android init
    - cd apps/tauri && cargo tauri icon src-tauri/icons/icon-1024-rgba8.png
    # Configure release signing
    - |
      if [ -n "$KEYSTORE_BASE64" ]; then
        echo "$KEYSTORE_BASE64" | base64 -d > /tmp/release.keystore
        cat > src-tauri/gen/android/keystore.properties <<EOF
      keyAlias=${KEY_ALIAS:-upload}
      password=${KEYSTORE_PASSWORD}
      storeFile=/tmp/release.keystore
      EOF
        node ../../scripts/patch-android-signing.mjs src-tauri/gen/android/app/build.gradle.kts
      else
        echo "WARNING: No KEYSTORE_BASE64 set — APK will be unsigned"
      fi
    # Build APK
    - cargo tauri android build --apk
  after_script:
    - |
      echo "=== Android build artifacts ==="
      find apps/tauri/src-tauri/gen/android -name "*.apk" -type f 2>/dev/null
  artifacts:
    paths:
      - apps/tauri/src-tauri/gen/android/app/build/outputs/apk/**/*.apk
    expire_in: 4 weeks
  rules:
    - if: $CI_COMMIT_TAG

build:ios:
  stage: build
  tags:
    - macscript
  needs: [lint, test:unit, test:e2e]
  before_script:
    - env | grep -E '^(CI_|IOS_|ASC_)' > .cienv
  script:
    - cirrus run buildFutoNotesIOS --artifacts-dir . --env-file .cienv
  artifacts:
    paths:
      - buildFutoNotesIOS/binary/*.ipa
    expire_in: 4 weeks
  rules:
    - if: $CI_COMMIT_TAG

build:macos:
  stage: build
  tags:
    - macscript
  needs: [lint, test:unit, test:e2e]
  before_script:
    - env | grep -E '^(CI_|MACOS_|ASC_)' > .cienv
  script:
    - cirrus run buildFutoNotesMacOS --artifacts-dir . --env-file .cienv
  artifacts:
    paths:
      - buildFutoNotesMacOS/binary/*.dmg
    expire_in: 4 weeks
  rules:
    - if: $CI_COMMIT_TAG

# ─────────────────────────────────────────────────────────────
# Windows build (Proxmox VM)
# ─────────────────────────────────────────────────────────────
# Flow: provision Windows VM → SSH in to build → sign artifacts → cleanup VM
# Based on devops/templates/proxmox-win-ci
# Template VM 101 has: Rust 1.92, VS Build Tools (MSVC), winget
# Needs installed at build time: Git, Node.js, pnpm, NSIS, tauri-cli
# Required CI/CD variables (masked, protected):
#   PROXMOX_USER, PROXMOX_TOKEN_ID, PROXMOX_TOKEN_SECRET
#   PROXMOX_WIN_USER, PROXMOX_WIN_PASSWORD

.proxmox_auth: &proxmox_auth
  - export PROXMOX_AUTH="PVEAPIToken=${PROXMOX_USER}!${PROXMOX_TOKEN_ID}=${PROXMOX_TOKEN_SECRET}"

windows:provision:
  stage: build
  tags:
    - proxmoxshell
  needs: [lint, test:unit, test:e2e]
  before_script:
    - *proxmox_auth
  variables:
    PROXMOX_HOST: "127.0.0.1"
    PROXMOX_NODE: "green"
    TEMPLATE_VMID: "101"
    VM_NAME: "stonefruit-win-${CI_PIPELINE_ID}"
    CLONE_TYPE: "1"
  script:
    # Get next available VMID
    - |
      export NEXT_VMID=$(curl -s -k \
        -H "Authorization: ${PROXMOX_AUTH}" \
        "https://${PROXMOX_HOST}:8006/api2/json/cluster/nextid" | jq -r '.data')
      echo "VMID=${NEXT_VMID}" >> provision.env
      echo "Using VMID: ${NEXT_VMID}"

    # Clone the template VM and poll task until done
    - |
      CLONE_RESPONSE=$(curl -s -k -X POST \
        -H "Authorization: ${PROXMOX_AUTH}" \
        -H "Content-Type: application/x-www-form-urlencoded" \
        -d "newid=${NEXT_VMID}&name=${VM_NAME}&full=${CLONE_TYPE}" \
        "https://${PROXMOX_HOST}:8006/api2/json/nodes/${PROXMOX_NODE}/qemu/${TEMPLATE_VMID}/clone")
      UPID=$(echo "$CLONE_RESPONSE" | jq -r '.data')
      echo "Clone task started: $UPID"

    - |
      UPID_ENCODED=$(printf '%s' "$UPID" | jq -sRr @uri)
      LATEST_TEMP=""
      while true; do
        TASK_STATUS=$(curl -s -k \
          -H "Authorization: ${PROXMOX_AUTH}" \
          "https://${PROXMOX_HOST}:8006/api2/json/nodes/${PROXMOX_NODE}/tasks/${UPID_ENCODED}/status")
        STATUS=$(echo "$TASK_STATUS" | jq -r '.data.status')
        if [ "$STATUS" = "stopped" ]; then
          EXIT_STATUS=$(echo "$TASK_STATUS" | jq -r '.data.exitstatus')
          if [ "$EXIT_STATUS" = "OK" ]; then
            echo "Clone completed successfully!"
            break
          else
            echo "Clone failed: $EXIT_STATUS"
            exit 1
          fi
        fi
        TASK_LOG=$(curl -s -k \
          -H "Authorization: ${PROXMOX_AUTH}" \
          "https://${PROXMOX_HOST}:8006/api2/json/nodes/${PROXMOX_NODE}/tasks/${UPID_ENCODED}/log?limit=10000")
        LATEST=$(echo "$TASK_LOG" | jq -r '.data | sort_by(.n) | last | .t // "waiting..."')
        if [ "$LATEST_TEMP" != "$LATEST" ]; then
          echo "Status: $STATUS | $LATEST"
          LATEST_TEMP="$LATEST"
        fi
        sleep 5
      done

    # Start the VM
    - |
      source provision.env
      curl -s -k -X POST \
        -H "Authorization: ${PROXMOX_AUTH}" \
        "https://${PROXMOX_HOST}:8006/api2/json/nodes/${PROXMOX_NODE}/qemu/${VMID}/status/start"

    # Wait for VM to get an IP via QEMU guest agent
    - |
      source provision.env
      echo "Waiting for VM to boot and get IP..."
      for i in $(seq 1 60); do
        IP=$(curl -s -k \
          -H "Authorization: ${PROXMOX_AUTH}" \
          "https://${PROXMOX_HOST}:8006/api2/json/nodes/${PROXMOX_NODE}/qemu/${VMID}/agent/network-get-interfaces" 2>/dev/null \
          | jq -r '.data.result[]? | select(.name != "Loopback Pseudo-Interface 1") | ."ip-addresses"[]? | select(."ip-address-type" == "ipv4") | ."ip-address"' \
          | head -1)
        if [ -n "$IP" ] && [ "$IP" != "null" ]; then
          echo "VM_IP=${IP}" >> provision.env
          echo "VM is up at: ${IP}"
          break
        fi
        echo "Waiting for start and IP... (${i}/60)"
        sleep 10
      done
      if [ -z "$IP" ] || [ "$IP" = "null" ]; then
        echo "ERROR: No IP after 10 minutes"
        exit 1
      fi

  artifacts:
    reports:
      dotenv: provision.env
  rules:
    - if: $CI_COMMIT_TAG

build:windows:
  stage: build
  tags:
    - proxmoxshell
  needs:
    - job: windows:provision
      artifacts: true
  script:
    # Wait for SSH to be ready
    - |
      for i in $(seq 1 30); do
        if sshpass -p "${PROXMOX_WIN_PASSWORD}" ssh -o StrictHostKeyChecking=no -o ConnectTimeout=5 "${PROXMOX_WIN_USER}@${VM_IP}" "echo ready" 2>/dev/null; then
          echo "SSH is ready!"
          break
        fi
        echo "Waiting for SSH... ($i/30)"
        sleep 10
      done

    # Upload build scripts to VM
    - |
      sshpass -p "${PROXMOX_WIN_PASSWORD}" scp -o StrictHostKeyChecking=no \
        ci/win-install-deps.ps1 ci/win-build.ps1 \
        "${PROXMOX_WIN_USER}@${VM_IP}:C:/Users/${PROXMOX_WIN_USER}/"

    # Install build dependencies
    - |
      sshpass -p "${PROXMOX_WIN_PASSWORD}" ssh -o StrictHostKeyChecking=no "${PROXMOX_WIN_USER}@${VM_IP}" \
        "powershell -NoProfile -ExecutionPolicy Bypass -File C:\\Users\\${PROXMOX_WIN_USER}\\win-install-deps.ps1"

    # Clone repo and build
    - |
      VERSION="${CI_COMMIT_TAG#v}"
      sshpass -p "${PROXMOX_WIN_PASSWORD}" ssh -o StrictHostKeyChecking=no "${PROXMOX_WIN_USER}@${VM_IP}" \
        "powershell -NoProfile -ExecutionPolicy Bypass -File C:\\Users\\${PROXMOX_WIN_USER}\\win-build.ps1 -RepoUrl ${CI_REPOSITORY_URL} -Branch ${CI_COMMIT_TAG} -Version ${VERSION}"

    # Retrieve build artifacts
    - mkdir -p windows-artifacts
    - |
      sshpass -p "${PROXMOX_WIN_PASSWORD}" scp -o StrictHostKeyChecking=no -r \
        "${PROXMOX_WIN_USER}@${VM_IP}:C:/build/stonefruit/apps/tauri/src-tauri/target/release/bundle/nsis/*" \
        windows-artifacts/
    - |
      echo "=== Windows build artifacts ==="
      ls -la windows-artifacts/

  artifacts:
    paths:
      - windows-artifacts/*
    expire_in: 4 weeks
  rules:
    - if: $CI_COMMIT_TAG

windows:sign:
  stage: build
  tags:
    - dind
  image: debian:trixie-slim
  needs:
    - job: build:windows
      artifacts: true
  before_script: []
  script:
    - |
      if ! command -v aws >/dev/null 2>&1 || ! command -v java >/dev/null 2>&1 || ! command -v python3 >/dev/null 2>&1; then
        apt-get update
        DEBIAN_FRONTEND=noninteractive apt-get install -y ca-certificates curl jq awscli default-jre-headless python3
      fi
    # Download fullchain.pem from GitLab secure files
    - |
      mkdir -p /deploy/signing
      FILE_ID=$(curl --silent --fail \
        --header "JOB-TOKEN: $CI_JOB_TOKEN" \
        "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/secure_files" \
        | jq -r '.[] | select(.name=="fullchain.pem") | .id')
      test -n "$FILE_ID"
      curl --silent --fail \
        --header "JOB-TOKEN: $CI_JOB_TOKEN" \
        --output /deploy/signing/fullchain.pem \
        "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/secure_files/${FILE_ID}/download"
      echo "Downloaded fullchain.pem"
    # Sign all .exe artifacts
    - |
      for f in windows-artifacts/*.exe; do
        [ -f "$f" ] || continue
        CERT_FILE=/deploy/signing/fullchain.pem bash ci/sign-windows.sh "$f"
      done
  artifacts:
    paths:
      - windows-artifacts/*.exe
    expire_in: 4 weeks
  rules:
    - if: $CI_COMMIT_TAG

windows:cleanup:
  stage: build
  tags:
    - proxmoxshell
  needs:
    - job: windows:provision
      artifacts: true
    - job: build:windows
  when: always
  before_script:
    - *proxmox_auth
  variables:
    PROXMOX_HOST: "127.0.0.1"
    PROXMOX_NODE: "green"
  script:
    - |
      if [ -z "$VMID" ]; then
        echo "No VMID found, skipping cleanup."
        exit 0
      fi
      echo "Stopping VM $VMID..."
      curl -s -k -X POST \
        -H "Authorization: ${PROXMOX_AUTH}" \
        "https://${PROXMOX_HOST}:8006/api2/json/nodes/${PROXMOX_NODE}/qemu/${VMID}/status/stop"
    - |
      echo "Waiting for VM to stop..."
      for i in $(seq 1 30); do
        STATUS=$(curl -s -k \
          -H "Authorization: ${PROXMOX_AUTH}" \
          "https://${PROXMOX_HOST}:8006/api2/json/nodes/${PROXMOX_NODE}/qemu/${VMID}/status/current" | jq -r '.data.status')
        if [ "$STATUS" = "stopped" ]; then
          echo "VM stopped!"
          break
        fi
        sleep 5
      done
    - |
      curl -s -k -X DELETE \
        -H "Authorization: ${PROXMOX_AUTH}" \
        "https://${PROXMOX_HOST}:8006/api2/json/nodes/${PROXMOX_NODE}/qemu/${VMID}"
      echo "VM ${VMID} deleted"
  rules:
    - if: $CI_COMMIT_TAG

# ─────────────────────────────────────────────────────────────
# Release gate — all platform artifacts must exist
# ─────────────────────────────────────────────────────────────

release:gate:
  stage: verify
  needs:
    - job: docker:verify
    - job: build:linux
      artifacts: true
    - job: build:android
      artifacts: true
    - job: build:ios
      artifacts: true
    - job: build:macos
      artifacts: true
    - job: windows:sign
      artifacts: true
    - job: cli:build:amd64
      artifacts: true
    - job: cli:build:arm64
      artifacts: true
  before_script: []
  script:
    - |
      MISSING=0
      check() { if ! ls $1 >/dev/null 2>&1; then echo "MISSING: $1"; MISSING=$((MISSING+1)); else echo "OK: $1"; fi; }

      echo "=== Platform artifacts ==="
      check "apps/tauri/src-tauri/target/release/bundle/deb/*.deb"
      check "apps/tauri/src-tauri/target/release/bundle/rpm/*.rpm"
      check "apps/tauri/src-tauri/target/release/bundle/appimage/*.AppImage"
      check "apps/tauri/src-tauri/gen/android/app/build/outputs/apk/**/*release*.apk"
      check "buildFutoNotesIOS/binary/*.ipa"
      check "buildFutoNotesMacOS/binary/*.dmg"

      echo ""
      echo "=== Windows installer ==="
      check "windows-artifacts/*.exe"

      echo ""
      echo "=== CLI binaries ==="
      check "apps/cli/dist/stonefruit-linux-amd64"
      check "apps/cli/dist/stonefruit-linux-arm64"

      # Verify CLI binaries are executable and report version
      echo ""
      echo "=== CLI version check ==="
      chmod +x apps/cli/dist/stonefruit-linux-amd64
      apps/cli/dist/stonefruit-linux-amd64 version || echo "WARN: version command failed"

      echo ""
      if [ "$MISSING" -gt 0 ]; then
        echo "RELEASE BLOCKED: $MISSING artifact(s) missing"
        exit 1
      fi
      echo "All artifacts present — release gate passed"
  rules:
    - if: $CI_COMMIT_TAG

# ─────────────────────────────────────────────────────────────
# Publish to GitLab Package Registry
# ─────────────────────────────────────────────────────────────

publish:
  stage: publish
  interruptible: false
  needs:
    - job: release:gate
    - job: build:linux
      artifacts: true
    - job: build:android
      artifacts: true
    - job: build:ios
      artifacts: true
    - job: build:macos
      artifacts: true
    - job: windows:sign
      artifacts: true
  script:
    - VERSION="${CI_COMMIT_TAG#v}"
    - REGISTRY_URL="${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/stonefruit/${CI_COMMIT_TAG}"
    # Linux
    - |
      for f in apps/tauri/src-tauri/target/release/bundle/deb/*.deb; do
        [ -f "$f" ] || continue
        NAME="stonefruit_${VERSION}_amd64.deb"
        echo "Uploading $NAME"
        curl --fail -H "JOB-TOKEN: $CI_JOB_TOKEN" --upload-file "$f" "${REGISTRY_URL}/${NAME}"
        echo "DEB_URL=${REGISTRY_URL}/${NAME}" >> publish.env
      done
    - |
      for f in apps/tauri/src-tauri/target/release/bundle/rpm/*.rpm; do
        [ -f "$f" ] || continue
        NAME="stonefruit-${VERSION}-1.x86_64.rpm"
        echo "Uploading $NAME"
        curl --fail -H "JOB-TOKEN: $CI_JOB_TOKEN" --upload-file "$f" "${REGISTRY_URL}/${NAME}"
        echo "RPM_URL=${REGISTRY_URL}/${NAME}" >> publish.env
      done
    - |
      for f in apps/tauri/src-tauri/target/release/bundle/appimage/*.AppImage; do
        [ -f "$f" ] || continue
        NAME="Stonefruit-${VERSION}-x86_64.AppImage"
        echo "Uploading $NAME"
        curl --fail -H "JOB-TOKEN: $CI_JOB_TOKEN" --upload-file "$f" "${REGISTRY_URL}/${NAME}"
        echo "APPIMAGE_URL=${REGISTRY_URL}/${NAME}" >> publish.env
      done
    # Android APK
    - |
      APK=$(find apps/tauri/src-tauri/gen/android -name "*release*.apk" -type f 2>/dev/null | head -1)
      if [ -n "$APK" ]; then
        NAME="stonefruit-${VERSION}.apk"
        echo "Uploading $NAME"
        curl --fail -H "JOB-TOKEN: $CI_JOB_TOKEN" --upload-file "$APK" "${REGISTRY_URL}/${NAME}"
        echo "APK_URL=${REGISTRY_URL}/${NAME}" >> publish.env
      fi
    # iOS IPA
    - |
      IPA=$(find buildFutoNotesIOS -name "*.ipa" -type f 2>/dev/null | head -1)
      if [ -n "$IPA" ]; then
        NAME="Stonefruit-${VERSION}.ipa"
        echo "Uploading $NAME"
        curl --fail -H "JOB-TOKEN: $CI_JOB_TOKEN" --upload-file "$IPA" "${REGISTRY_URL}/${NAME}"
        echo "IPA_URL=${REGISTRY_URL}/${NAME}" >> publish.env
      fi
    # macOS DMG
    - |
      DMG=$(find buildFutoNotesMacOS -name "*.dmg" -type f 2>/dev/null | head -1)
      if [ -n "$DMG" ]; then
        NAME="Stonefruit-${VERSION}-universal.dmg"
        echo "Uploading $NAME"
        curl --fail -H "JOB-TOKEN: $CI_JOB_TOKEN" --upload-file "$DMG" "${REGISTRY_URL}/${NAME}"
        echo "DMG_URL=${REGISTRY_URL}/${NAME}" >> publish.env
      fi
    # Windows NSIS installer
    - |
      NSIS=$(find windows-artifacts -name "*.exe" -type f 2>/dev/null | head -1)
      if [ -n "$NSIS" ]; then
        NAME="Stonefruit-${VERSION}-x64-setup.exe"
        echo "Uploading $NAME"
        curl --fail -H "JOB-TOKEN: $CI_JOB_TOKEN" --upload-file "$NSIS" "${REGISTRY_URL}/${NAME}"
        echo "WINDOWS_URL=${REGISTRY_URL}/${NAME}" >> publish.env
      fi
  artifacts:
    reports:
      dotenv: publish.env
  rules:
    - if: $CI_COMMIT_TAG

# ─────────────────────────────────────────────────────────────
# Create GitLab Release
# ─────────────────────────────────────────────────────────────

release:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  interruptible: false
  needs:
    - job: publish
      artifacts: true
  before_script: []
  script:
    - VERSION="${CI_COMMIT_TAG#v}"
    - REGISTRY_URL="${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/stonefruit/${CI_COMMIT_TAG}"
    - |
      release-cli create \
        --name "Stonefruit ${CI_COMMIT_TAG}" \
        --tag-name "${CI_COMMIT_TAG}" \
        --description "Stonefruit release ${CI_COMMIT_TAG}" \
        --assets-link "{\"name\":\"stonefruit_${VERSION}_amd64.deb\",\"url\":\"${REGISTRY_URL}/stonefruit_${VERSION}_amd64.deb\",\"link_type\":\"package\"}" \
        --assets-link "{\"name\":\"stonefruit-${VERSION}-1.x86_64.rpm\",\"url\":\"${REGISTRY_URL}/stonefruit-${VERSION}-1.x86_64.rpm\",\"link_type\":\"package\"}" \
        --assets-link "{\"name\":\"Stonefruit-${VERSION}-x86_64.AppImage\",\"url\":\"${REGISTRY_URL}/Stonefruit-${VERSION}-x86_64.AppImage\",\"link_type\":\"package\"}" \
        --assets-link "{\"name\":\"stonefruit-${VERSION}.apk\",\"url\":\"${REGISTRY_URL}/stonefruit-${VERSION}.apk\",\"link_type\":\"package\"}" \
        --assets-link "{\"name\":\"Stonefruit-${VERSION}.ipa\",\"url\":\"${REGISTRY_URL}/Stonefruit-${VERSION}.ipa\",\"link_type\":\"package\"}" \
        --assets-link "{\"name\":\"Stonefruit-${VERSION}-universal.dmg\",\"url\":\"${REGISTRY_URL}/Stonefruit-${VERSION}-universal.dmg\",\"link_type\":\"package\"}" \
        --assets-link "{\"name\":\"Stonefruit-${VERSION}-x64-setup.exe\",\"url\":\"${REGISTRY_URL}/Stonefruit-${VERSION}-x64-setup.exe\",\"link_type\":\"package\"}"
  rules:
    - if: $CI_COMMIT_TAG
