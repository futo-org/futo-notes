default:
  tags:
    - dind
  image: gitlab.futo.org:5050/futocore/ci/kitchensink:latest
  before_script:
    - . $HOME/.nvm/nvm.sh

workflow:
  rules:
    - if: $CI_COMMIT_TAG

stages:
  - build

# TEMPORARY: iOS-only pipeline for debugging.
# Revert to full CI once iOS build passes (see git history).

build:ios:
  stage: build
  tags:
    - macscript
  needs: []
  before_script:
    - env | grep -E '^(CI_|IOS_|ASC_)' > .cienv
  script:
    - cirrus run buildFutoNotesIOS --artifacts-dir . --env-file .cienv
  artifacts:
    paths:
      - buildFutoNotesIOS/binary/*.ipa
    expire_in: 4 weeks
  rules:
    - if: $CI_COMMIT_TAG
