# Temporary test pipeline — Windows CI infra smoke test
# Full pipeline backed up at .gitlab-ci.yml.full-with-windows

stages:
  - test

.proxmox-auth: &proxmox-auth
  - export PROXMOX_AUTH="PVEAPIToken=${PROXMOX_USER}!${PROXMOX_TOKEN_ID}=${PROXMOX_TOKEN_SECRET}"

windows:smoke-test:
  stage: test
  tags:
    - proxmoxshell
  variables:
    PROXMOX_HOST: "127.0.0.1"
    PROXMOX_NODE: "green"
    TEMPLATE_VMID: "101"
    VM_NAME: "stonefruit-win-smoke-${CI_PIPELINE_ID}"
  before_script:
    - *proxmox-auth
  script:
    # 0. Debug: check what's available
    - |
      echo "=== Environment diagnostics ==="
      echo "PROXMOX_HOST=$PROXMOX_HOST"
      echo "PROXMOX_NODE=$PROXMOX_NODE"
      echo "PROXMOX_USER is set: $([ -n "$PROXMOX_USER" ] && echo yes || echo NO)"
      echo "PROXMOX_TOKEN_ID is set: $([ -n "$PROXMOX_TOKEN_ID" ] && echo yes || echo NO)"
      echo "PROXMOX_TOKEN_SECRET is set: $([ -n "$PROXMOX_TOKEN_SECRET" ] && echo yes || echo NO)"
      echo "PROXMOX_AUTH starts with: $(echo "$PROXMOX_AUTH" | head -c 30)..."
      echo "Available tools: curl=$(which curl 2>/dev/null || echo missing) jq=$(which jq 2>/dev/null || echo missing) ssh=$(which ssh 2>/dev/null || echo missing)"
      echo "aws CLI: $(which aws 2>/dev/null || echo missing)"

    # 1. Verify Proxmox connectivity
    - |
      echo "=== Testing Proxmox API connectivity ==="
      echo "Trying https://${PROXMOX_HOST}:8006/api2/json/version ..."
      RESULT=$(curl -sv -k -H "Authorization: $PROXMOX_AUTH" \
        "https://${PROXMOX_HOST}:8006/api2/json/version" 2>&1)
      echo "$RESULT"
      echo "---"
      # Also try without auth to see if Proxmox is reachable at all
      echo "Trying unauthenticated..."
      curl -sv -k "https://${PROXMOX_HOST}:8006/api2/json/version" 2>&1 | tail -20

    # 2. Check template VM exists (non-fatal for diagnostics)
    - |
      echo "=== Checking template VM $TEMPLATE_VMID ==="
      curl -s -k -H "Authorization: $PROXMOX_AUTH" \
        "https://${PROXMOX_HOST}:8006/api2/json/nodes/${PROXMOX_NODE}/qemu/${TEMPLATE_VMID}/status/current" | jq .

    # 3. Check AWS credentials
    - |
      echo "=== Testing AWS credentials ==="
      if command -v aws >/dev/null 2>&1; then
        aws sts get-caller-identity 2>&1 && echo "AWS credentials OK" || echo "WARN: AWS credentials not configured"
      else
        echo "WARN: aws CLI not installed on this runner"
      fi

    # 4. Check what other tools exist
    - |
      echo "=== Checking for jsign ==="
      which jsign 2>/dev/null && jsign --version 2>&1 || echo "jsign not found"
      echo "=== Checking for makensis ==="
      which makensis 2>/dev/null || echo "makensis not found"
      echo "=== Network interfaces ==="
      ip addr show 2>/dev/null | grep "inet " || ifconfig 2>/dev/null | grep "inet " || echo "no ip tool found"

  after_script:
    - echo "Diagnostic run complete — no VMs to clean up"
