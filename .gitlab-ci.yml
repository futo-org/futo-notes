default:
  tags:
    - dind
  image: gitlab.futo.org:5050/futocore/ci/kitchensink:latest
  before_script:
    - . $HOME/.nvm/nvm.sh

workflow:
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_MERGE_REQUEST_IID
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

stages:
  - cleanup
  - test
  - build

docker:prune:
  stage: cleanup
  script:
    - docker system prune -af --volumes
    - df -h /
  allow_failure: true

lint:
  stage: test
  script:
    - npm ci
    - npm run lint
    - npm run lint:platform

test:unit:
  stage: test
  script:
    - npm ci
    - npm run test:unit

test:e2e:
  stage: test
  script:
    - npm ci
    - npx playwright install --with-deps chromium
    - npm test

test:server:
  stage: test
  script:
    - npm ci
    - npm run server:test

test:server:smoke:
  stage: test
  script:
    - docker build -f apps/server/Dockerfile -t stonefruit-server-smoke .
    - docker run --rm -d --name sf-smoke --network=host -e SEARCH_ENABLED=false -e TRANSFORMS_ENABLED=false stonefruit-server-smoke
    - |
      cleanup() { docker logs sf-smoke 2>&1 || true; docker stop sf-smoke 2>/dev/null || true; }
      trap cleanup EXIT
      for i in $(seq 1 10); do
        curl -sf http://localhost:3005/health && exit 0
        sleep 2
      done
      echo "Health check failed after 10 retries"
      exit 1

test:rust:
  stage: test
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_MERGE_REQUEST_IID
  script:
    - npm ci
    - |
      if command -v apt-get >/dev/null 2>&1; then
        apt-get update
        DEBIAN_FRONTEND=noninteractive apt-get install -y \
          libwebkit2gtk-4.1-dev \
          libgtk-3-dev \
          libayatana-appindicator3-dev \
          librsvg2-dev \
          patchelf
      fi
    - |
      if ! command -v rustup >/dev/null 2>&1; then
        curl https://sh.rustup.rs -sSf | sh -s -- -y
        export PATH="$HOME/.cargo/bin:$PATH"
      fi
    - rustup default stable
    - npm run tauri:test:rust

build:tauri:
  stage: build
  needs: [lint, test:unit, test:e2e, test:server, test:server:smoke]
  script:
    - npm ci
    - |
      if command -v apt-get >/dev/null 2>&1; then
        apt-get update
        DEBIAN_FRONTEND=noninteractive apt-get install -y \
          libwebkit2gtk-4.1-dev \
          libgtk-3-dev \
          libayatana-appindicator3-dev \
          librsvg2-dev \
          patchelf
      fi
    - |
      if ! command -v rustup >/dev/null 2>&1; then
        curl https://sh.rustup.rs -sSf | sh -s -- -y
        export PATH="$HOME/.cargo/bin:$PATH"
      fi
    - rustup default stable
    - npm run tauri:build
  artifacts:
    paths:
      - apps/tauri/src-tauri/target/release
    expire_in: 1 week
  rules:
    - if: $CI_COMMIT_TAG
      when: always
