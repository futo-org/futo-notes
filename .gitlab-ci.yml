default:
  tags:
    - dind
  image: gitlab.futo.org:5050/futocore/ci/kitchensink:latest
  interruptible: true
  before_script:
    - . $HOME/.nvm/nvm.sh
    - corepack enable
    - corepack prepare pnpm@10.29.2 --activate
    - pnpm config set store-dir "$PNPM_STORE_DIR"
    - export PATH="$CARGO_HOME/bin:$PATH"

variables:
  CARGO_HOME: $CI_PROJECT_DIR/.cargo-home
  PNPM_STORE_DIR: $CI_PROJECT_DIR/.pnpm-store
  PLAYWRIGHT_BROWSERS_PATH: $CI_PROJECT_DIR/.cache-ms-playwright

workflow:
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_MERGE_REQUEST_IID
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

stages:
  - test
  - build
  - verify
  - release

# ─────────────────────────────────────────────────────────────
# Reusable script fragments
# ─────────────────────────────────────────────────────────────

.setup-rust:
  script:
    - |
      if ! command -v rustup >/dev/null 2>&1; then
        curl https://sh.rustup.rs -sSf | sh -s -- -y
        export PATH="$CARGO_HOME/bin:$PATH"
      fi
    - rustup default stable
    - |
      if command -v cargo-tauri >/dev/null 2>&1; then
        echo "cargo-tauri already installed (cached)"
      else
        echo "Installing cargo-binstall..."
        curl -L --proto '=https' --tlsv1.2 -sSf https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh | bash
        echo "Installing tauri-cli via binstall..."
        cargo binstall tauri-cli --no-confirm --locked
      fi

.setup-linux-deps:
  script:
    - |
      if command -v apt-get >/dev/null 2>&1; then
        apt-get update
        DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
          libwebkit2gtk-4.1-dev \
          libgtk-3-dev \
          libayatana-appindicator3-dev \
          librsvg2-dev \
          libfuse2 \
          libssl-dev \
          patchelf \
          xdg-utils
      fi

.set-version:
  script:
    - |
      VERSION="${CI_COMMIT_TAG#v}"
      echo "VERSION=$VERSION" >> build.env
      echo "Building version $VERSION from tag $CI_COMMIT_TAG"
      node -e "
        const fs = require('fs');
        const f = 'apps/tauri/src-tauri/tauri.conf.json';
        const c = JSON.parse(fs.readFileSync(f, 'utf8'));
        c.version = '$VERSION';
        fs.writeFileSync(f, JSON.stringify(c, null, 2) + '\n');
      "

# Clone the E2EE sync server (separate repo, public) and install its deps.
# tests/lib/sync-test-server.mjs reads FUTO_NOTES_E2EE_SERVER_REPO to locate it.
.setup-futo-notes-server:
  script:
    - |
      SERVER_DIR="$CI_PROJECT_DIR/.futo-notes-server"
      git clone --depth 1 \
        https://gitlab.futo.org/futo-notes/futo-notes-server.git \
        "$SERVER_DIR"
      (cd "$SERVER_DIR" && pnpm install --frozen-lockfile)
      export FUTO_NOTES_E2EE_SERVER_REPO="$SERVER_DIR"

.setup-playwright:
  script:
    - |
      playwright_browser_path() {
        node -e "const fs=require('fs'); const { chromium }=require('@playwright/test'); const p=chromium.executablePath(); if (fs.existsSync(p)) console.log(p)" 2>/dev/null
        if [ -n "${PLAYWRIGHT_BROWSERS_PATH:-}" ]; then
          find "$PLAYWRIGHT_BROWSERS_PATH" -type f \( -name chrome-headless-shell -o -path "*/chrome-linux64/chrome" \) -print -quit 2>/dev/null
        fi
      }

      playwright_browser_exists() {
        test -n "$(playwright_browser_path | head -1)"
      }

      if playwright_browser_exists; then
        echo "Playwright Chromium already present at $(playwright_browser_path | head -1)"
      elif [ -d /ms-playwright ]; then
        export PLAYWRIGHT_BROWSERS_PATH=/ms-playwright
        if playwright_browser_exists; then
          echo "Using Playwright Chromium baked into kitchensink at $(playwright_browser_path | head -1)"
        else
          export PLAYWRIGHT_BROWSERS_PATH="$CI_PROJECT_DIR/.cache-ms-playwright"
          pnpm exec playwright install --only-shell chromium
        fi
      else
        pnpm exec playwright install --only-shell chromium
      fi

# ─────────────────────────────────────────────────────────────
# Cache templates
# ─────────────────────────────────────────────────────────────

.cache-pnpm:
  cache:
    key:
      files:
        - pnpm-lock.yaml
    paths:
      - .pnpm-store/
    policy: pull-push

.cache-cargo-tauri:
  cache:
    key:
      files:
        - Cargo.lock
    paths:
      - .cargo-home/
      - target/
    policy: pull-push

# Separate caches for the release Linux builds. Packages (.deb/.rpm) build on
# ubuntu:22.04 (glibc 2.35, wide forward-compat); AppImage builds on ubuntu:24.04
# so the bundled WebKitGTK is new enough for Mesa 26 (Arch/Fedora 40+). Test
# jobs use the kitchensink image. Each base gets its own cache key — sharing a
# target/ across images wastes bandwidth and invalidates oddly.
.cache-cargo-tauri-linux-packages:
  cache:
    key:
      prefix: linux-packages
      files:
        - Cargo.lock
    paths:
      - .cargo-home/
      - target/
    policy: pull-push

.cache-cargo-tauri-linux-appimage:
  cache:
    key:
      prefix: linux-appimage
      files:
        - Cargo.lock
    paths:
      - .cargo-home/
      - target/
    policy: pull-push

.cache-playwright:
  cache:
    key:
      prefix: playwright
      files:
        - pnpm-lock.yaml
    paths:
      - .cache-ms-playwright/
    policy: pull-push

# ─────────────────────────────────────────────────────────────
# Tests
# Cheap checks run on every MR/default/tag pipeline. Browser CI is intentionally
# small on MRs; exhaustive Playwright coverage runs on release tags, with manual
# MR jobs available when a change warrants it.
# ─────────────────────────────────────────────────────────────

test:
  stage: test
  cache:
    - !reference [.cache-pnpm, cache]
  script:
    - pnpm install --frozen-lockfile --prefer-offline
    - pnpm run lint
    - pnpm run lint:platform
    - pnpm exec vitest run --silent=passed-only
    - pnpm --filter @futo-notes/shared exec vitest run --silent=passed-only
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_MERGE_REQUEST_IID
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

test:e2e:smoke:
  stage: test
  cache:
    - !reference [.cache-pnpm, cache]
    - !reference [.cache-playwright, cache]
  script:
    - pnpm install --frozen-lockfile --prefer-offline
    - !reference [.setup-playwright, script]
    - pnpm run test:e2e:smoke
  rules:
    - if: $CI_MERGE_REQUEST_IID
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

test:e2e:markdown-spec:
  stage: test
  cache:
    - !reference [.cache-pnpm, cache]
    - !reference [.cache-playwright, cache]
  script:
    - pnpm install --frozen-lockfile --prefer-offline
    - !reference [.setup-playwright, script]
    - pnpm run test:markdown-spec
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_MERGE_REQUEST_IID
      when: manual
      allow_failure: true

test:e2e:rest:
  stage: test
  cache:
    - !reference [.cache-pnpm, cache]
    - !reference [.cache-playwright, cache]
  script:
    - pnpm install --frozen-lockfile --prefer-offline
    - !reference [.setup-playwright, script]
    - pnpm run test:e2e:rest
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_MERGE_REQUEST_IID
      when: manual
      allow_failure: true

test:rust:
  stage: test
  cache:
    - !reference [.cache-pnpm, cache]
    - !reference [.cache-cargo-tauri, cache]
  script:
    - pnpm install --frozen-lockfile
    - !reference [.setup-linux-deps, script]
    - !reference [.setup-rust, script]
    - node scripts/fetch-ort-linux.mjs
    - mkdir -p dist
    - cd apps/tauri/src-tauri && cargo test
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_MERGE_REQUEST_IID

test:rust:macos:
  stage: test
  tags:
    - macscript
  allow_failure: true
  # Force a clean clone each run — the macscript runner's incremental fetch
  # kept hitting `missing blob object / remote did not send all necessary
  # objects` on a stale local .git.
  variables:
    GIT_STRATEGY: clone
  before_script:
    - env | grep -E '^(CI_)' > .cienv
  script:
    - cirrus run testRustMacOS --artifacts-dir . --env-file .cienv
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_MERGE_REQUEST_IID

test:desktop-smoke:
  stage: test
  cache:
    - !reference [.cache-pnpm, cache]
    - !reference [.cache-cargo-tauri, cache]
  script:
    - pnpm install --frozen-lockfile
    - !reference [.setup-linux-deps, script]
    - !reference [.setup-rust, script]
    - DEBIAN_FRONTEND=noninteractive apt-get install -y xvfb
    - node scripts/fetch-ort-linux.mjs
    # Build frontend + debug binary
    - pnpm run build
    - cd apps/tauri && cargo tauri build --debug --no-bundle && cd ../..
    # Pre-configure notes dir so app boots to editor
    - |
      NOTES_DIR=$(mktemp -d)
      mkdir -p ~/.local/share/com.futo.notes
      echo '{"notesDir":"'"$NOTES_DIR"'"}' > ~/.local/share/com.futo.notes/notes-dir-override.json
    # Launch under xvfb
    - |
      TAURI_LOG="/tmp/tauri-smoke.log"
      WEBKIT_DISABLE_DMABUF_RENDERER=1 \
        xvfb-run -a --server-args="-screen 0 1280x800x24" \
        target/debug/futo-notes-tauri > "$TAURI_LOG" 2>&1 &
    # Run smoke tests (script handles port discovery + retries)
    - node tests/desktop-smoke.mjs --log-file /tmp/tauri-smoke.log
  after_script:
    - kill $(pgrep -f futo-notes-tauri) 2>/dev/null || true
  artifacts:
    when: always
    paths:
      - test-screenshots/smoke-*.png
      - test-screenshots/smoke-results.json
    expire_in: 1 week
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_MERGE_REQUEST_IID
      changes:
        - apps/tauri/**/*
        - src/**/*
        - packages/shared/**/*

test:cross-platform-sync:
  stage: test
  services:
    - name: postgres:15
      alias: postgres
  variables:
    POSTGRES_DB: futo_notes
    POSTGRES_USER: futo_notes
    POSTGRES_PASSWORD: futo_notes
    FUTO_NOTES_E2EE_DATABASE_URL: postgres://futo_notes:futo_notes@postgres:5432/futo_notes
    PGPASSWORD: futo_notes
  cache:
    - !reference [.cache-pnpm, cache]
    - !reference [.cache-cargo-tauri, cache]
  script:
    - pnpm install --frozen-lockfile
    - !reference [.setup-linux-deps, script]
    - !reference [.setup-rust, script]
    - DEBIAN_FRONTEND=noninteractive apt-get install -y xvfb postgresql-client
    - !reference [.setup-futo-notes-server, script]
    - node scripts/fetch-ort-linux.mjs
    # cargo clean -p so the tauri build script re-runs and re-embeds dist/
    # with hooks — .cache-cargo-tauri is shared with test:desktop-smoke
    # which builds without VITE_INCLUDE_TEST_HOOKS, and the cached crate can
    # otherwise re-link a hooks-free binary.
    - (cd apps/tauri && cargo clean -p futo-notes-tauri 2>/dev/null || true)
    - (cd apps/tauri && VITE_INCLUDE_TEST_HOOKS=true cargo tauri build --debug --no-bundle)
    # Run cross-platform sync tests under xvfb
    - >-
      WEBKIT_DISABLE_DMABUF_RENDERER=1
      xvfb-run -a --server-args="-screen 0 1280x800x24"
      node tests/cross-platform-sync.mjs
  after_script:
    - kill $(pgrep -f futo-notes-tauri) 2>/dev/null || true
  artifacts:
    when: always
    paths:
      - test-screenshots/sync-results.json
    expire_in: 1 week
  # Cold Rust compile alone burns ~5min; bump to give warm runs a comfortable
  # margin and cold runs (cache miss) enough headroom to finish.
  timeout: 30m
  rules:
    - if: $CI_MERGE_REQUEST_IID
      changes:
        - apps/tauri/**/*
        - src/**/*
        - crates/**/*
        - packages/shared/**/*
        - tests/cross-platform-sync.mjs
        - tests/lib/**

test:cross-platform-sync:android:
  stage: test
  tags:
    - android_kvm
  image: gitlab.futo.org:5050/futo-notes/futo-notes/ci/android:latest
  services:
    - name: postgres:15
      alias: postgres
  cache:
    - !reference [.cache-pnpm, cache]
    - !reference [.cache-cargo-tauri, cache]
  variables:
    ANDROID_HOME: /opt/android-sdk
    ANDROID_SDK_ROOT: /opt/android-sdk
    JAVA_HOME: /opt/jdk-21
    NDK_HOME: /opt/android-sdk/ndk/27.0.12077973
    # Devops baked an AVD called "runner_phone" on futocoredebianrunner1;
    # once build:ci-android-image is rebuilt from the current Dockerfile it
    # will also carry "ci", so either name will work.
    SF_ANDROID_AVD: runner_phone
    SF_ANDROID_KVM: "1"
    POSTGRES_DB: futo_notes
    POSTGRES_USER: futo_notes
    POSTGRES_PASSWORD: futo_notes
    FUTO_NOTES_E2EE_DATABASE_URL: postgres://futo_notes:futo_notes@postgres:5432/futo_notes
    PGPASSWORD: futo_notes
  script:
    - test -e /dev/kvm || { echo "FATAL:/dev/kvm missing — runner not KVM-enabled"; exit 1; }
    - export PATH="$JAVA_HOME/bin:$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools:$ANDROID_HOME/emulator:$PATH"
    # Install desktop Tauri deps inline. The ci/android image has these too,
    # but hasn't been rebuilt since we added them — keep the inline install
    # until build:ci-android-image ships the new layers.
    - !reference [.setup-linux-deps, script]
    # xvfb for the desktop client display, postgresql-client for the truncate
    # path in sync-test-server.mjs, mesa-drivers so WebKitGTK's GL fallback
    # actually works under xvfb (kitchensink image has these baked in; the
    # android image doesn't yet).
    - DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends xvfb postgresql-client libgl1-mesa-dri libegl1-mesa libglu1-mesa
    - pnpm install --frozen-lockfile
    - !reference [.setup-rust, script]
    - !reference [.setup-futo-notes-server, script]
    - node scripts/fetch-ort-linux.mjs
    - node scripts/fetch-ort-android.mjs --abis x86_64,arm64-v8a
    # cargo clean keeps the Tauri build script honest — .cache-cargo-tauri
    # is shared with desktop-smoke (no VITE_INCLUDE_TEST_HOOKS), so the
    # cached crate may not re-run its embed step on incremental compile.
    # Full rebuild of this one crate costs ~20s; the wider workspace stays
    # cached.
    - (cd apps/tauri && cargo clean -p futo-notes-tauri 2>/dev/null || true)
    - (cd apps/tauri && VITE_INCLUDE_TEST_HOOKS=true cargo tauri build --debug --no-bundle)
    - >-
      (cd apps/tauri &&
      VITE_INCLUDE_TEST_HOOKS=true cargo tauri android build --debug --apk
      --config src-tauri/tauri.android.dev-mode.conf.json)
    # Desktop client needs a display; emulator runs headless via -no-window.
    # LIBGL_ALWAYS_SOFTWARE forces Mesa software rendering — xvfb doesn't
    # expose a real GPU and WebKitGTK sits silent without any GL path.
    - >-
      WEBKIT_DISABLE_DMABUF_RENDERER=1
      LIBGL_ALWAYS_SOFTWARE=1
      xvfb-run -a --server-args="-screen 0 1280x800x24"
      node tests/cross-platform-sync.mjs --matrix desktop-android
  after_script:
    # Wrap each adb call with `timeout` — when the emulator never started
    # (e.g. step failed early) adb blocks forever trying to connect, and the
    # GitLab after_script cap (5m) is the only thing that eventually kills it.
    - timeout 10 adb logcat -d > logcat.txt 2>/dev/null || true
    - timeout 10 adb exec-out screencap -p > final-screen.png 2>/dev/null || true
    - timeout 10 adb emu kill 2>/dev/null || true
    - kill $(pgrep -f futo-notes-tauri) 2>/dev/null || true
    # Stage the Tauri logs under the project dir so the artifacts step can
    # upload them (GitLab rejects paths outside $CI_PROJECT_DIR).
    - mkdir -p tauri-logs && cp /tmp/tauri-*.log tauri-logs/ 2>/dev/null || true
  artifacts:
    when: always
    paths:
      - test-screenshots/sync-results.json
      - logcat.txt
      - final-screen.png
      - tauri-logs/
    expire_in: 1 week
  timeout: 45m
  rules:
    - if: $CI_MERGE_REQUEST_IID
      changes:
        - apps/tauri/**/*
        - src/**/*
        - crates/**/*
        - packages/shared/**/*
        - tests/cross-platform-sync.mjs
        - tests/lib/**

test:desktop-smoke:macos:
  stage: test
  tags:
    - macscript
  allow_failure: true
  variables:
    GIT_STRATEGY: clone
  before_script:
    - env | grep -E '^(CI_)' > .cienv
  script:
    - cirrus run testDesktopSmokeMacOS --artifacts-dir . --env-file .cienv
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_MERGE_REQUEST_IID
      changes:
        - apps/tauri/**/*
        - src/**/*

# ─────────────────────────────────────────────────────────────
# Builds (tags only)
# ─────────────────────────────────────────────────────────────

# .deb/.rpm install against the host's webkit2gtk, so building on the oldest
# Ubuntu that ships libwebkit2gtk-4.1 (22.04, glibc 2.35) gives forward-compat
# with older distros. Building on rolling/latest would link against a newer
# glibc and break on anything older.
build:linux-packages:
  stage: build
  needs:
    - job: test
    - job: test:e2e:markdown-spec
    - job: test:e2e:rest
  image: ubuntu:22.04
  before_script: &linux-before-script
    - apt-get update
    - DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends curl ca-certificates build-essential git file pkg-config
    - curl -fsSL https://deb.nodesource.com/setup_22.x | bash -
    - DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends nodejs
    - corepack enable
    - corepack prepare pnpm@10.29.2 --activate
    - pnpm config set store-dir "$PNPM_STORE_DIR"
    - export PATH="$CARGO_HOME/bin:$PATH"
  cache:
    - !reference [.cache-pnpm, cache]
    - !reference [.cache-cargo-tauri-linux-packages, cache]
  script:
    - pnpm install --frozen-lockfile
    - !reference [.setup-linux-deps, script]
    - !reference [.setup-rust, script]
    - !reference [.set-version, script]
    - node scripts/fetch-ort-linux.mjs
    - cd apps/tauri && cargo tauri build --bundles deb,rpm
  after_script:
    - |
      echo "=== Linux package artifacts ==="
      find target/release/bundle -type f \( -name "*.deb" -o -name "*.rpm" \) 2>/dev/null
  artifacts:
    paths:
      - target/release/bundle/deb/*.deb
      - target/release/bundle/rpm/*.rpm
    expire_in: 4 weeks
  rules:
    - if: $CI_COMMIT_TAG

# AppImage bundles its entire userland (WebKitGTK, GLib, GStreamer, libwayland,
# ...) and relies on the *host's* Mesa at runtime. The failure mode we hit on
# Mesa 26 (CachyOS / Arch / Fedora 40+): linuxdeploy bundles the build base's
# libwayland-client.so.0 into the AppImage, and that bundled copy mismatches
# the host's libEGL — eglGetPlatformDisplay(EGL_PLATFORM_WAYLAND_KHR, …) fails
# with "Could not create default EGL display: EGL_BAD_PARAMETER. Aborting…"
# and WebKit exits before rendering. Confirmed reproducible on v1.2.0 against
# CachyOS (Mesa 26.0.5). Fix: delete libwayland-client.so.0 from the AppImage
# via scripts/patch-appimage-mesa26.mjs so the host's copy is used instead —
# host libwayland and host libEGL always match because they ship together.
#
# Base is ubuntu:22.04 for the widest glibc floor (2.35). jammy-security
# already ships WebKitGTK 2.50 (libwebkit2gtk-4.1 2.50.4-0ubuntu0.22.04.1),
# which is new enough to use the EGL platform API — so noble buys us nothing
# extra here and costs us glibc compat on older target distros.
build:linux-appimage:
  stage: build
  needs:
    - job: test
    - job: test:e2e:markdown-spec
    - job: test:e2e:rest
  image: ubuntu:22.04
  before_script: *linux-before-script
  cache:
    - !reference [.cache-pnpm, cache]
    - !reference [.cache-cargo-tauri-linux-appimage, cache]
  script:
    - pnpm install --frozen-lockfile
    - !reference [.setup-linux-deps, script]
    - !reference [.setup-rust, script]
    - !reference [.set-version, script]
    - node scripts/fetch-ort-linux.mjs
    - cd apps/tauri && cargo tauri build --bundles appimage && cd ../..
    # Strip the bundled libwayland-client.so.0 so the AppImage boots on Mesa 26.
    # Script auto-downloads appimagetool if it isn't already on PATH.
    - node scripts/patch-appimage-mesa26.mjs --dir target/release/bundle/appimage
  after_script:
    - |
      echo "=== Linux AppImage artifact ==="
      find target/release/bundle -type f -name "*.AppImage" 2>/dev/null
  artifacts:
    paths:
      - target/release/bundle/appimage/*.AppImage
    expire_in: 4 weeks
  rules:
    - if: $CI_COMMIT_TAG

# Rebuild the pre-baked Android CI image (JDK + SDK/NDK + Rust targets +
# emulator + system image + desktop Tauri deps). Manual trigger only —
# click "Run" on this job when ci/android.Dockerfile changes. Runs as
# docker-in-docker so registry auth uses the runner's CI_JOB_TOKEN and no
# laptop push is needed.
build:ci-android-image:
  stage: build
  needs: []
  image: docker:27
  services:
    - docker:27-dind
  before_script: []
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
  script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"
    - docker build -f ci/android.Dockerfile -t "$CI_REGISTRY_IMAGE/ci/android:latest" .
    - docker push "$CI_REGISTRY_IMAGE/ci/android:latest"
  rules:
    - if: $CI_PIPELINE_SOURCE == "web"
      when: manual
    - if: $CI_MERGE_REQUEST_IID
      changes:
        - ci/android.Dockerfile
      when: manual
      allow_failure: true

build:android:
  stage: build
  needs:
    - job: test
    - job: test:e2e:markdown-spec
    - job: test:e2e:rest
  image: gitlab.futo.org:5050/futo-notes/futo-notes/ci/android:latest
  cache:
    - !reference [.cache-pnpm, cache]
    - !reference [.cache-cargo-tauri, cache]
  variables:
    ANDROID_HOME: /opt/android-sdk
    JAVA_HOME: /opt/jdk-21
    NDK_HOME: /opt/android-sdk/ndk/27.0.12077973
  script:
    - export PATH="$JAVA_HOME/bin:$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools:$PATH"
    - pnpm install --frozen-lockfile
    - !reference [.setup-rust, script]
    # Version
    - !reference [.set-version, script]
    # Initialize Tauri Android project
    - cd apps/tauri && cargo tauri android init
    - cd apps/tauri && cargo tauri icon src-tauri/icons/icon-1024-rgba8.png
    # com/futo/notes/dev/MainActivity.kt is a byte-identical copy of the
    # production MainActivity but in the .dev package, kept tracked so
    # `just android-dev` users get the IME shield lifecycle hooks. Its
    # superclass TauriActivity is only generated by `cargo tauri android
    # build` with the dev config (tauri.android.dev-mode.conf.json), so
    # production CI's Kotlin compile can't resolve it and fails. Strip it
    # here — the IME shield's WRY_RUSTWEBVIEW_CLASS_EXTENSION injection
    # is package-local and still applies via the prod MainActivity.
    - rm -f apps/tauri/src-tauri/gen/android/app/src/main/java/com/futo/notes/dev/MainActivity.kt
    # Configure release signing
    - |
      if [ -n "$KEYSTORE_BASE64" ]; then
        echo "$KEYSTORE_BASE64" | base64 -d > /tmp/release.keystore
        cat > src-tauri/gen/android/keystore.properties <<EOF
      keyAlias=${KEY_ALIAS:-upload}
      password=${KEYSTORE_PASSWORD}
      storeFile=/tmp/release.keystore
      EOF
        node ../../scripts/patch-android-signing.mjs src-tauri/gen/android/app/build.gradle.kts
      else
        echo "WARNING: No KEYSTORE_BASE64 set — APK will be unsigned"
      fi
    # Build APK
    - cargo tauri android build --apk
  after_script:
    - |
      echo "=== Android build artifacts ==="
      find apps/tauri/src-tauri/gen/android -name "*.apk" -type f 2>/dev/null
  artifacts:
    paths:
      - apps/tauri/src-tauri/gen/android/app/build/outputs/apk/**/*.apk
    expire_in: 4 weeks
  rules:
    - if: $CI_COMMIT_TAG

build:ios:
  stage: build
  needs:
    - job: test
    - job: test:e2e:markdown-spec
    - job: test:e2e:rest
  tags:
    - macscript
  variables:
    GIT_STRATEGY: clone
  before_script:
    - env | grep -E '^(CI_|IOS_|ASC_)' > .cienv
  script:
    - cirrus run buildFutoNotesIOS --artifacts-dir . --env-file .cienv
  artifacts:
    paths:
      - buildFutoNotesIOS/binary/*.ipa
    expire_in: 4 weeks
  rules:
    - if: $CI_COMMIT_TAG

build:macos:
  stage: build
  needs:
    - job: test
    - job: test:e2e:markdown-spec
    - job: test:e2e:rest
  tags:
    - macscript
  variables:
    GIT_STRATEGY: clone
  before_script:
    - env | grep -E '^(CI_|MACOS_|ASC_)' > .cienv
  script:
    - cirrus run buildFutoNotesMacOS --artifacts-dir . --env-file .cienv
  artifacts:
    paths:
      - buildFutoNotesMacOS/binary/*.dmg
    expire_in: 4 weeks
  rules:
    - if: $CI_COMMIT_TAG

# ─────────────────────────────────────────────────────────────
# Windows build (Proxmox VM)
# ─────────────────────────────────────────────────────────────
# Flow: provision Windows VM → SSH in to build → sign artifacts → cleanup VM
# Template VM 101 has: Rust 1.92, VS Build Tools (MSVC), winget
# Needs installed at build time: Git, Node.js, pnpm, NSIS, tauri-cli
# Required CI/CD variables (masked, protected):
#   PROXMOX_USER, PROXMOX_TOKEN_ID, PROXMOX_TOKEN_SECRET
#   PROXMOX_WIN_USER, PROXMOX_WIN_PASSWORD

.proxmox_auth: &proxmox_auth
  - export PROXMOX_AUTH="PVEAPIToken=${PROXMOX_USER}!${PROXMOX_TOKEN_ID}=${PROXMOX_TOKEN_SECRET}"

windows:provision:
  stage: build
  needs:
    - job: test
    - job: test:e2e:markdown-spec
    - job: test:e2e:rest
  tags:
    - proxmoxshell
  before_script:
    - *proxmox_auth
  variables:
    PROXMOX_HOST: "127.0.0.1"
    PROXMOX_NODE: "green"
    TEMPLATE_VMID: "101"
    VM_NAME: "futo-notes-win-${CI_PIPELINE_ID}"
    CLONE_TYPE: "1"
  script:
    # Get next available VMID
    - |
      export NEXT_VMID=$(curl -s -k \
        -H "Authorization: ${PROXMOX_AUTH}" \
        "https://${PROXMOX_HOST}:8006/api2/json/cluster/nextid" | jq -r '.data')
      echo "VMID=${NEXT_VMID}" >> provision.env
      echo "Using VMID: ${NEXT_VMID}"

    # Clone the template VM and poll task until done
    - |
      CLONE_RESPONSE=$(curl -s -k -X POST \
        -H "Authorization: ${PROXMOX_AUTH}" \
        -H "Content-Type: application/x-www-form-urlencoded" \
        -d "newid=${NEXT_VMID}&name=${VM_NAME}&full=${CLONE_TYPE}" \
        "https://${PROXMOX_HOST}:8006/api2/json/nodes/${PROXMOX_NODE}/qemu/${TEMPLATE_VMID}/clone")
      UPID=$(echo "$CLONE_RESPONSE" | jq -r '.data')
      echo "Clone task started: $UPID"

    - |
      UPID_ENCODED=$(printf '%s' "$UPID" | jq -sRr @uri)
      LATEST_TEMP=""
      while true; do
        TASK_STATUS=$(curl -s -k \
          -H "Authorization: ${PROXMOX_AUTH}" \
          "https://${PROXMOX_HOST}:8006/api2/json/nodes/${PROXMOX_NODE}/tasks/${UPID_ENCODED}/status")
        STATUS=$(echo "$TASK_STATUS" | jq -r '.data.status')
        if [ "$STATUS" = "stopped" ]; then
          EXIT_STATUS=$(echo "$TASK_STATUS" | jq -r '.data.exitstatus')
          if [ "$EXIT_STATUS" = "OK" ]; then
            echo "Clone completed successfully!"
            break
          else
            echo "Clone failed: $EXIT_STATUS"
            exit 1
          fi
        fi
        TASK_LOG=$(curl -s -k \
          -H "Authorization: ${PROXMOX_AUTH}" \
          "https://${PROXMOX_HOST}:8006/api2/json/nodes/${PROXMOX_NODE}/tasks/${UPID_ENCODED}/log?limit=10000")
        LATEST=$(echo "$TASK_LOG" | jq -r '.data | sort_by(.n) | last | .t // "waiting..."')
        if [ "$LATEST_TEMP" != "$LATEST" ]; then
          echo "Status: $STATUS | $LATEST"
          LATEST_TEMP="$LATEST"
        fi
        sleep 5
      done

    # Start the VM
    - |
      source provision.env
      curl -s -k -X POST \
        -H "Authorization: ${PROXMOX_AUTH}" \
        "https://${PROXMOX_HOST}:8006/api2/json/nodes/${PROXMOX_NODE}/qemu/${VMID}/status/start"

    # Wait for VM to get an IP via QEMU guest agent
    - |
      source provision.env
      echo "Waiting for VM to boot and get IP..."
      for i in $(seq 1 60); do
        IP=$(curl -s -k \
          -H "Authorization: ${PROXMOX_AUTH}" \
          "https://${PROXMOX_HOST}:8006/api2/json/nodes/${PROXMOX_NODE}/qemu/${VMID}/agent/network-get-interfaces" 2>/dev/null \
          | jq -r '.data.result[]? | select(.name != "Loopback Pseudo-Interface 1") | ."ip-addresses"[]? | select(."ip-address-type" == "ipv4") | ."ip-address"' \
          | head -1)
        if [ -n "$IP" ] && [ "$IP" != "null" ]; then
          echo "VM_IP=${IP}" >> provision.env
          echo "VM is up at: ${IP}"
          break
        fi
        echo "Waiting for start and IP... (${i}/60)"
        sleep 10
      done
      if [ -z "$IP" ] || [ "$IP" = "null" ]; then
        echo "ERROR: No IP after 10 minutes"
        exit 1
      fi

  artifacts:
    reports:
      dotenv: provision.env
  rules:
    - if: $CI_COMMIT_TAG

build:windows:
  stage: build
  tags:
    - proxmoxshell
  needs:
    - job: windows:provision
      artifacts: true
  before_script: []
  script:
    # Wait for SSH to be ready
    - |
      for i in $(seq 1 30); do
        if sshpass -p "${PROXMOX_WIN_PASSWORD}" ssh -o StrictHostKeyChecking=no -o ConnectTimeout=5 "${PROXMOX_WIN_USER}@${VM_IP}" "echo ready" 2>/dev/null; then
          echo "SSH is ready!"
          break
        fi
        echo "Waiting for SSH... ($i/30)"
        sleep 10
      done

    # Upload build scripts to VM
    - |
      sshpass -p "${PROXMOX_WIN_PASSWORD}" scp -o StrictHostKeyChecking=no \
        ci/win-install-deps.ps1 ci/win-build.ps1 \
        "${PROXMOX_WIN_USER}@${VM_IP}:C:/Users/${PROXMOX_WIN_USER}/"

    # Install build dependencies
    - |
      sshpass -p "${PROXMOX_WIN_PASSWORD}" ssh -o StrictHostKeyChecking=no "${PROXMOX_WIN_USER}@${VM_IP}" \
        "powershell -NoProfile -ExecutionPolicy Bypass -File C:\\Users\\${PROXMOX_WIN_USER}\\win-install-deps.ps1"

    # Clone repo and build
    - |
      VERSION="${CI_COMMIT_TAG#v}"
      sshpass -p "${PROXMOX_WIN_PASSWORD}" ssh -o StrictHostKeyChecking=no "${PROXMOX_WIN_USER}@${VM_IP}" \
        "powershell -NoProfile -ExecutionPolicy Bypass -File C:\\Users\\${PROXMOX_WIN_USER}\\win-build.ps1 -RepoUrl ${CI_REPOSITORY_URL} -Branch ${CI_COMMIT_TAG} -Version ${VERSION}"

    # Retrieve build artifacts
    - mkdir -p windows-artifacts
    - |
      sshpass -p "${PROXMOX_WIN_PASSWORD}" scp -o StrictHostKeyChecking=no -r \
        "${PROXMOX_WIN_USER}@${VM_IP}:C:/build/futo-notes/target/release/bundle/nsis/*" \
        windows-artifacts/
    - |
      echo "=== Windows build artifacts ==="
      ls -la windows-artifacts/

  artifacts:
    paths:
      - windows-artifacts/*
    expire_in: 4 weeks
  rules:
    - if: $CI_COMMIT_TAG

windows:sign:
  stage: build
  tags:
    - dind
  image: debian:trixie-slim
  needs:
    - job: build:windows
      artifacts: true
  before_script: []
  script:
    - |
      if ! command -v aws >/dev/null 2>&1 || ! command -v java >/dev/null 2>&1 || ! command -v python3 >/dev/null 2>&1; then
        apt-get update
        DEBIAN_FRONTEND=noninteractive apt-get install -y ca-certificates curl jq awscli default-jre-headless python3
      fi
    # Download fullchain.pem from GitLab secure files
    - |
      mkdir -p /deploy/signing
      FILE_ID=$(curl --silent --fail \
        --header "JOB-TOKEN: $CI_JOB_TOKEN" \
        "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/secure_files" \
        | jq -r '.[] | select(.name=="fullchain.pem") | .id')
      test -n "$FILE_ID"
      curl --silent --fail \
        --header "JOB-TOKEN: $CI_JOB_TOKEN" \
        --output /deploy/signing/fullchain.pem \
        "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/secure_files/${FILE_ID}/download"
      echo "Downloaded fullchain.pem"
    # Sign all .exe artifacts
    - |
      for f in windows-artifacts/*.exe; do
        [ -f "$f" ] || continue
        CERT_FILE=/deploy/signing/fullchain.pem bash ci/sign-windows.sh "$f"
      done
  artifacts:
    paths:
      - windows-artifacts/*.exe
    expire_in: 4 weeks
  rules:
    - if: $CI_COMMIT_TAG

windows:cleanup:
  stage: build
  tags:
    - proxmoxshell
  needs:
    - job: windows:provision
      artifacts: true
    - job: build:windows
  when: always
  before_script:
    - *proxmox_auth
  variables:
    PROXMOX_HOST: "127.0.0.1"
    PROXMOX_NODE: "green"
  script:
    - |
      if [ -z "$VMID" ]; then
        echo "No VMID found, skipping cleanup."
        exit 0
      fi
      echo "Stopping VM $VMID..."
      curl -s -k -X POST \
        -H "Authorization: ${PROXMOX_AUTH}" \
        "https://${PROXMOX_HOST}:8006/api2/json/nodes/${PROXMOX_NODE}/qemu/${VMID}/status/stop"
    - |
      echo "Waiting for VM to stop..."
      for i in $(seq 1 30); do
        STATUS=$(curl -s -k \
          -H "Authorization: ${PROXMOX_AUTH}" \
          "https://${PROXMOX_HOST}:8006/api2/json/nodes/${PROXMOX_NODE}/qemu/${VMID}/status/current" | jq -r '.data.status')
        if [ "$STATUS" = "stopped" ]; then
          echo "VM stopped!"
          break
        fi
        sleep 5
      done
    - |
      curl -s -k -X DELETE \
        -H "Authorization: ${PROXMOX_AUTH}" \
        "https://${PROXMOX_HOST}:8006/api2/json/nodes/${PROXMOX_NODE}/qemu/${VMID}"
      echo "VM ${VMID} deleted"
  rules:
    - if: $CI_COMMIT_TAG

# ─────────────────────────────────────────────────────────────
# Release gate — all platform artifacts must exist
# ─────────────────────────────────────────────────────────────

release:gate:
  stage: verify
  needs:
    - job: test
    - job: build:linux-packages
      artifacts: true
    - job: build:linux-appimage
      artifacts: true
    - job: build:android
      artifacts: true
    - job: build:ios
      artifacts: true
    - job: build:macos
      artifacts: true
    - job: windows:sign
      artifacts: true
  before_script: []
  script:
    - |
      MISSING=0
      check() { if ! ls $1 >/dev/null 2>&1; then echo "MISSING: $1"; MISSING=$((MISSING+1)); else echo "OK: $1"; fi; }
      check_find() { if [ -z "$(find $1 -name "$2" -type f 2>/dev/null)" ]; then echo "MISSING: $2 in $1"; MISSING=$((MISSING+1)); else echo "OK: $2 in $1"; fi; }

      echo "=== Platform artifacts ==="
      check "target/release/bundle/deb/*.deb"
      check "target/release/bundle/rpm/*.rpm"
      check "target/release/bundle/appimage/*.AppImage"
      check_find "apps/tauri/src-tauri/gen/android" "*release*.apk"
      check "buildFutoNotesIOS/binary/*.ipa"
      check "buildFutoNotesMacOS/binary/*.dmg"

      echo ""
      echo "=== Windows installer ==="
      check "windows-artifacts/*.exe"

      echo ""
      if [ "$MISSING" -gt 0 ]; then
        echo "RELEASE BLOCKED: $MISSING artifact(s) missing"
        exit 1
      fi
      echo "All artifacts present — release gate passed"
  rules:
    - if: $CI_COMMIT_TAG

# ─────────────────────────────────────────────────────────────
# Publish + create GitLab release
# ─────────────────────────────────────────────────────────────

# Upload the iOS IPA to TestFlight. Gated by release:gate so a failing
# test job blocks the upload. The Cirrus task pulls the IPA artifact
# built in build:ios, so we don't rebuild from scratch.
publish:ios:
  stage: release
  interruptible: false
  tags:
    - macscript
  needs:
    - job: release:gate
    - job: build:ios
  variables:
    GIT_STRATEGY: clone
  before_script:
    - env | grep -E '^(CI_|IOS_|ASC_)' > .cienv
  script:
    - cirrus run publishFutoNotesIOS --artifacts-dir . --env-file .cienv
  rules:
    - if: $CI_COMMIT_TAG

release:
  stage: release
  interruptible: false
  needs:
    - job: release:gate
    - job: build:linux-packages
      artifacts: true
    - job: build:linux-appimage
      artifacts: true
    - job: build:android
      artifacts: true
    - job: build:ios
      artifacts: true
    - job: build:macos
      artifacts: true
    - job: windows:sign
      artifacts: true
  script:
    - VERSION="${CI_COMMIT_TAG#v}"
    - REGISTRY_URL="${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/futo-notes/${CI_COMMIT_TAG}"
    # Linux
    - |
      for f in target/release/bundle/deb/*.deb; do
        [ -f "$f" ] || continue
        NAME="futo-notes_${VERSION}_amd64.deb"
        echo "Uploading $NAME"
        curl --fail -H "JOB-TOKEN: $CI_JOB_TOKEN" --upload-file "$f" "${REGISTRY_URL}/${NAME}"
      done
    - |
      for f in target/release/bundle/rpm/*.rpm; do
        [ -f "$f" ] || continue
        NAME="futo-notes-${VERSION}-1.x86_64.rpm"
        echo "Uploading $NAME"
        curl --fail -H "JOB-TOKEN: $CI_JOB_TOKEN" --upload-file "$f" "${REGISTRY_URL}/${NAME}"
      done
    - |
      for f in target/release/bundle/appimage/*.AppImage; do
        [ -f "$f" ] || continue
        NAME="FUTO-Notes-${VERSION}-x86_64.AppImage"
        echo "Uploading $NAME"
        curl --fail -H "JOB-TOKEN: $CI_JOB_TOKEN" --upload-file "$f" "${REGISTRY_URL}/${NAME}"
      done
    # Android APK
    - |
      APK=$(find apps/tauri/src-tauri/gen/android -name "*release*.apk" -type f 2>/dev/null | head -1)
      if [ -n "$APK" ]; then
        NAME="futo-notes-${VERSION}.apk"
        echo "Uploading $NAME"
        curl --fail -H "JOB-TOKEN: $CI_JOB_TOKEN" --upload-file "$APK" "${REGISTRY_URL}/${NAME}"
      fi
    # iOS IPA
    - |
      IPA=$(find buildFutoNotesIOS -name "*.ipa" -type f 2>/dev/null | head -1)
      if [ -n "$IPA" ]; then
        NAME="FUTO-Notes-${VERSION}.ipa"
        echo "Uploading $NAME"
        curl --fail -H "JOB-TOKEN: $CI_JOB_TOKEN" --upload-file "$IPA" "${REGISTRY_URL}/${NAME}"
      fi
    # macOS DMG
    - |
      DMG=$(find buildFutoNotesMacOS -name "*.dmg" -type f 2>/dev/null | head -1)
      if [ -n "$DMG" ]; then
        NAME="FUTO-Notes-${VERSION}-aarch64.dmg"
        echo "Uploading $NAME"
        curl --fail -H "JOB-TOKEN: $CI_JOB_TOKEN" --upload-file "$DMG" "${REGISTRY_URL}/${NAME}"
      fi
    # Windows NSIS installer
    - |
      NSIS=$(find windows-artifacts -name "*.exe" -type f 2>/dev/null | head -1)
      if [ -n "$NSIS" ]; then
        NAME="FUTO-Notes-${VERSION}-x64-setup.exe"
        echo "Uploading $NAME"
        curl --fail -H "JOB-TOKEN: $CI_JOB_TOKEN" --upload-file "$NSIS" "${REGISTRY_URL}/${NAME}"
      fi
    # Create GitLab release
    - |
      curl -sL "https://gitlab.com/api/v4/projects/gitlab-org%2Frelease-cli/packages/generic/release-cli/latest/release-cli-linux-amd64" \
        -o /usr/local/bin/release-cli && chmod +x /usr/local/bin/release-cli
    - |
      release-cli create \
        --name "FUTO Notes ${CI_COMMIT_TAG}" \
        --tag-name "${CI_COMMIT_TAG}" \
        --description "FUTO Notes release ${CI_COMMIT_TAG}" \
        --assets-link "{\"name\":\"futo-notes_${VERSION}_amd64.deb\",\"url\":\"${REGISTRY_URL}/futo-notes_${VERSION}_amd64.deb\",\"link_type\":\"package\"}" \
        --assets-link "{\"name\":\"futo-notes-${VERSION}-1.x86_64.rpm\",\"url\":\"${REGISTRY_URL}/futo-notes-${VERSION}-1.x86_64.rpm\",\"link_type\":\"package\"}" \
        --assets-link "{\"name\":\"FUTO-Notes-${VERSION}-x86_64.AppImage\",\"url\":\"${REGISTRY_URL}/FUTO-Notes-${VERSION}-x86_64.AppImage\",\"link_type\":\"package\"}" \
        --assets-link "{\"name\":\"futo-notes-${VERSION}.apk\",\"url\":\"${REGISTRY_URL}/futo-notes-${VERSION}.apk\",\"link_type\":\"package\"}" \
        --assets-link "{\"name\":\"FUTO-Notes-${VERSION}.ipa\",\"url\":\"${REGISTRY_URL}/FUTO-Notes-${VERSION}.ipa\",\"link_type\":\"package\"}" \
        --assets-link "{\"name\":\"FUTO-Notes-${VERSION}-aarch64.dmg\",\"url\":\"${REGISTRY_URL}/FUTO-Notes-${VERSION}-aarch64.dmg\",\"link_type\":\"package\"}" \
        --assets-link "{\"name\":\"FUTO-Notes-${VERSION}-x64-setup.exe\",\"url\":\"${REGISTRY_URL}/FUTO-Notes-${VERSION}-x64-setup.exe\",\"link_type\":\"package\"}"
  rules:
    - if: $CI_COMMIT_TAG
