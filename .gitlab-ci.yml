default:
  tags:
    - dind
  # Pinned by digest, not `:latest`, so a rebuild of the shared org-wide
  # kitchensink image can't silently change our CI environment out from under
  # us. This digest is the `:latest` that all default-image jobs already run
  # on. Bump it deliberately (resolve via the registry API:
  # /projects/402/registry/repositories/97/tags/latest) when we want a newer
  # base. Note: kitchensink does NOT carry the GTK/webkit dev libs, so any job
  # that compiles the Tauri desktop crate must run `.setup-linux-deps` itself.
  image: gitlab.futo.org:5050/futocore/ci/kitchensink@sha256:2df4951967506d9dc31ad4dea6d7b03eb4ddea21f3bd5e500ef3d3be924e589f
  interruptible: true
  before_script:
    - . $HOME/.nvm/nvm.sh
    - corepack enable
    - corepack prepare pnpm@10.29.2 --activate
    - pnpm config set store-dir "$PNPM_STORE_DIR"
    - export PATH="$CARGO_HOME/bin:$PATH"

variables:
  CARGO_HOME: $CI_PROJECT_DIR/.cargo-home
  PNPM_STORE_DIR: $CI_PROJECT_DIR/.pnpm-store
  PLAYWRIGHT_BROWSERS_PATH: $CI_PROJECT_DIR/.cache-ms-playwright

workflow:
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_MERGE_REQUEST_IID
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

stages:
  - collect-secrets
  - test
  - build
  - verify
  - release
  - trigger

collect-secrets-from-op:
  stage: collect-secrets
  needs: []
  # Don't inherit default.before_script (nvm/corepack/pnpm) — none of it exists
  # on the 1password/op image and `. $HOME/.nvm/nvm.sh` would fail the job
  # before script: runs.
  before_script: []
  image:
    name: 1password/op
    docker:
      user: root
  variables:
    OP_ITEMS: |
      TAURI_SIGNING_PRIVATE_KEY:tauri-updater-signing-keys/tauri-signing-private-key
    OP_VAULT: "FUTO_Notes"
  # Provisioning job: writes Protected project variables, so only run where the
  # OP/GitLab tokens are available. Runs automatically on every default-branch
  # pipeline (push + scheduled); tag/MR pipelines leave CI_COMMIT_BRANCH empty so
  # they're excluded (protected tokens absent there anyway). allow_failure so a
  # transient 1Password/API error doesn't block main CI — the written var
  # persists, so a failed re-sync just keeps the last good value.
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      allow_failure: true
  script:
    - apt install -y curl
    - op --version

    - |
      if [ -z "$OP_SERVICE_ACCOUNT_TOKEN" ]; then
        echo "ERROR:OP_SERVICE_ACCOUNT_TOKEN is not set - should be a CI secret for the OnePassword Vault access token"
        exit 1
      fi
      # Parse OP_ITEMS and sync each secret to GitLab CI/CD variables
      if [ -z "$OP_ITEMS" ]; then
        echo "ERROR: OP_ITEMS is not set"
        exit 1
      fi
      if [ -z "$OP_VAULT" ]; then
        echo "ERROR: OP_VAULT is not set"
        exit 1
      fi
      if [ -z "$GITLAB_API_TOKEN" ]; then
        echo "ERROR: GITLAB_API_TOKEN is not set"
        exit 1
      fi

      API_URL="${CI_SERVER_URL}/api/v4/projects/${CI_PROJECT_ID}/variables"
      FAILED=0

      echo "$OP_ITEMS" | tr ',' '\n' | while IFS=: read -r VAR_NAME ITEM_NAME; do
        # Trim whitespace
        VAR_NAME=$(echo "$VAR_NAME" | xargs)
        ITEM_NAME=$(echo "$ITEM_NAME" | xargs)

        if [ -z "$VAR_NAME" ] || [ -z "$ITEM_NAME" ]; then
          echo "WARNING: Skipping malformed entry (VAR_NAME='${VAR_NAME}', ITEM_NAME='${ITEM_NAME}')"
          continue
        fi

        echo "Fetching secret for '${ITEM_NAME}' from vault '${OP_VAULT}'..."
        SECRET=$(op read "op://${OP_VAULT}/${ITEM_NAME}") || {
          echo "ERROR: Failed to read op://${OP_VAULT}/${ITEM_NAME}"
          exit 1
        }

        # GitLab requires masked variables to be at least 8 characters
        if [ ${#SECRET} -lt 8 ]; then
          echo "WARNING: Skipping '${VAR_NAME}' — secret is ${#SECRET} characters, GitLab requires at least 8 for masked variables"
          continue
        fi

        # GitLab requires masked variables to only contain Base64 chars plus @:.~/-
        if echo "$SECRET" | grep -qP '[^a-zA-Z0-9+/=@:.~\-]'; then
          echo "WARNING: Skipping '${VAR_NAME}' — secret contains characters not allowed in GitLab masked variables (only Base64, @, :, ., ~, /, - are permitted)"
          continue
        fi

        echo "Setting CI/CD variable '${VAR_NAME}'..."

        RESPONSE_BODY=$(mktemp)
        trap "rm -f $RESPONSE_BODY" EXIT

        # Try PUT (update) first
        HTTP_CODE=$(curl -s -o "$RESPONSE_BODY" -w "%{http_code}" -X PUT \
          "${API_URL}/${VAR_NAME}" \
          -H "PRIVATE-TOKEN: ${GITLAB_API_TOKEN}" \
          -H "Content-Type: application/x-www-form-urlencoded" \
          --data-urlencode "value=${SECRET}" \
          --data-urlencode "masked=true" \
          --data-urlencode "protected=true" \
          --data-urlencode "variable_type=env_var")

        if [ "$HTTP_CODE" = "200" ]; then
          echo "  Updated '${VAR_NAME}' (HTTP ${HTTP_CODE})"
        elif [ "$HTTP_CODE" = "404" ]; then
          # Variable doesn't exist yet — create it with POST
          HTTP_CODE=$(curl -s -o "$RESPONSE_BODY" -w "%{http_code}" -X POST \
            "${API_URL}" \
            -H "PRIVATE-TOKEN: ${GITLAB_API_TOKEN}" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            --data-urlencode "key=${VAR_NAME}" \
            --data-urlencode "value=${SECRET}" \
            --data-urlencode "masked=true" \
            --data-urlencode "protected=true" \
            --data-urlencode "variable_type=env_var")

          if [ "$HTTP_CODE" = "201" ]; then
            echo "  Created '${VAR_NAME}' (HTTP ${HTTP_CODE})"
          else
            echo "ERROR: Failed to create '${VAR_NAME}' (HTTP ${HTTP_CODE})"
            echo "  Response: $(cat $RESPONSE_BODY)"
            exit 1
          fi
        else
          echo "ERROR: Failed to update '${VAR_NAME}' (HTTP ${HTTP_CODE})"
          echo "  Response: $(cat $RESPONSE_BODY)"
          exit 1
        fi
      done

      # Check if the subshell (piped while loop) failed
      if [ $? -ne 0 ]; then
        exit 1
      fi

      echo "All secrets synced successfully."

# ─────────────────────────────────────────────────────────────
# Reusable script fragments
# ─────────────────────────────────────────────────────────────

.setup-rust:
  script:
    - |
      if ! command -v rustup >/dev/null 2>&1; then
        curl https://sh.rustup.rs -sSf | sh -s -- -y
        export PATH="$CARGO_HOME/bin:$PATH"
      fi
    - rustup default stable
    - |
      if command -v cargo-tauri >/dev/null 2>&1; then
        echo "cargo-tauri already installed (cached)"
      else
        echo "Installing cargo-binstall..."
        curl -L --proto '=https' --tlsv1.2 -sSf https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh | bash
        echo "Installing tauri-cli via binstall..."
        cargo binstall tauri-cli --no-confirm --locked
      fi

.setup-linux-deps:
  script:
    - |
      if command -v apt-get >/dev/null 2>&1; then
        apt-get update
        DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
          libwebkit2gtk-4.1-dev \
          libgtk-3-dev \
          libayatana-appindicator3-dev \
          librsvg2-dev \
          libfuse2 \
          libssl-dev \
          patchelf \
          xdg-utils
      fi

.set-version:
  script:
    - |
      VERSION="${CI_COMMIT_TAG#v}"
      echo "VERSION=$VERSION" >> build.env
      echo "Building version $VERSION from tag $CI_COMMIT_TAG"
      node scripts/desktop-version.mjs "$VERSION"

# Clone the E2EE sync server (separate repo, public) and install its deps.
# tests/lib/sync-test-server.mjs reads FUTO_NOTES_E2EE_SERVER_REPO to locate it.
# The server migrated to Bun (no pnpm-lock.yaml), so it installs with `bun
# install` and the harness boots it via `bun src/index.ts`. The kitchensink
# image has no bun, so install it and put it on PATH for the rest of the job.
.setup-futo-notes-server:
  script:
    - |
      if ! command -v bun >/dev/null 2>&1; then
        curl -fsSL https://bun.sh/install | bash
      fi
      export BUN_INSTALL="${BUN_INSTALL:-$HOME/.bun}"
      export PATH="$BUN_INSTALL/bin:$PATH"
      bun --version
      SERVER_DIR="$CI_PROJECT_DIR/.futo-notes-server"
      git clone --depth 1 \
        https://gitlab.futo.org/futo-notes/futo-notes-server.git \
        "$SERVER_DIR"
      (cd "$SERVER_DIR" && bun install)
      export FUTO_NOTES_E2EE_SERVER_REPO="$SERVER_DIR"

.setup-playwright:
  script:
    - |
      playwright_browser_path() {
        node -e "const fs=require('fs'); const { chromium }=require('@playwright/test'); const p=chromium.executablePath(); if (fs.existsSync(p)) console.log(p)" 2>/dev/null
        if [ -n "${PLAYWRIGHT_BROWSERS_PATH:-}" ]; then
          find "$PLAYWRIGHT_BROWSERS_PATH" -type f \( -name chrome-headless-shell -o -path "*/chrome-linux64/chrome" \) -print -quit 2>/dev/null
        fi
      }

      playwright_browser_exists() {
        test -n "$(playwright_browser_path | head -1)"
      }

      if playwright_browser_exists; then
        echo "Playwright Chromium already present at $(playwright_browser_path | head -1)"
      elif [ -d /ms-playwright ]; then
        export PLAYWRIGHT_BROWSERS_PATH=/ms-playwright
        if playwright_browser_exists; then
          echo "Using Playwright Chromium baked into kitchensink at $(playwright_browser_path | head -1)"
        else
          export PLAYWRIGHT_BROWSERS_PATH="$CI_PROJECT_DIR/.cache-ms-playwright"
          pnpm exec playwright install --only-shell chromium
        fi
      else
        pnpm exec playwright install --only-shell chromium
      fi

# ─────────────────────────────────────────────────────────────
# Cache templates
# ─────────────────────────────────────────────────────────────

.cache-pnpm:
  cache:
    key:
      files:
        - pnpm-lock.yaml
    paths:
      - .pnpm-store/
    policy: pull-push

.cache-cargo-tauri:
  cache:
    key:
      files:
        - Cargo.lock
    paths:
      - .cargo-home/
      - target/
    policy: pull-push
    # Upload even on failure/timeout: a cold compile that dies at the job
    # wall still seeds the cache, so the retry resumes instead of starting
    # cold again (cargo handles partial target/ dirs fine).
    when: always

# Native shells (Compose / SwiftUI) build futo-notes-ffi for the Android NDK
# targets (aarch64/armv7/x86_64-linux-android) plus a host lib for binding
# generation. Those target/ subtrees and the cargo-ndk toolchain are disjoint
# from what the Tauri jobs build, so sharing .cache-cargo-tauri's target/ just
# thrashes both caches (each job evicts the other's artifacts on push). Give
# the native cargo work its own key.
.cache-cargo-native:
  cache:
    key:
      prefix: native
      files:
        - Cargo.lock
    paths:
      - .cargo-home/
      - target/
    policy: pull-push
    # when: always — see .cache-cargo-tauri. Critical here: this job only
    # runs on tags, so without failure uploads every tag retry starts cold.
    when: always

# Gradle wrapper distribution + dependency cache for the native Android build.
# Keyed on the gradle config so a dependency bump invalidates it; the wrapper
# dist rarely changes, so warm runs skip the ~100 MB Gradle download.
.cache-gradle-native:
  cache:
    key:
      prefix: gradle-native
      files:
        - apps/android/gradle/wrapper/gradle-wrapper.properties
        - apps/android/app/build.gradle.kts
    paths:
      - .gradle-native/caches/
      - .gradle-native/wrapper/
    policy: pull-push
    when: always

# Separate caches for the release Linux builds. Both packages (.deb/.rpm) and the
# AppImage build on ubuntu:22.04 (glibc 2.35, wide forward-compat; jammy-security
# WebKitGTK is new enough for the EGL platform API — the AppImage's Mesa 26 issue
# is handled by scripts/patch-appimage-mesa26.mjs, not by a newer base). Test jobs
# use the kitchensink image. Each base gets its own cache key — sharing a target/
# across images wastes bandwidth and invalidates oddly.
.cache-cargo-tauri-linux-packages:
  cache:
    key:
      prefix: linux-packages
      files:
        - Cargo.lock
    paths:
      - .cargo-home/
      - target/
    policy: pull-push

.cache-cargo-tauri-linux-appimage:
  cache:
    key:
      prefix: linux-appimage
      files:
        - Cargo.lock
    paths:
      - .cargo-home/
      - target/
    policy: pull-push

.cache-playwright:
  cache:
    key:
      prefix: playwright
      files:
        - pnpm-lock.yaml
    paths:
      - .cache-ms-playwright/
    policy: pull-push

# ─────────────────────────────────────────────────────────────
# Tests
# Release tag pipelines run the full validation set automatically. MR
# pipelines auto-run every suite whose `changes:` paths the MR touches; a
# trailing manual+allow_failure rule keeps each suite one click away on
# unrelated MRs. Manual-only is reserved for jobs that publish something
# (build:ci-android-image) or need protected secrets that don't exist on MR
# pipelines (the Windows Proxmox chain — see windows:provision).
# ─────────────────────────────────────────────────────────────

test:
  stage: test
  cache:
    - !reference [.cache-pnpm, cache]
  script:
    - pnpm install --frozen-lockfile --prefer-offline
    - node scripts/spec-gaps.mjs --check
    - pnpm exec tsx scripts/gen-toolbar-spec.ts --check
    - pnpm run lint
    - pnpm run lint:platform
    - pnpm run format:check
    - pnpm exec tsx tests/conformance/generate.mjs --check
    - pnpm run test:full
    - pnpm run build
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_MERGE_REQUEST_IID
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# Permanent anti-duplication gates (architecture-hardening.md PKT-7 / L2-4,
# PKT-8 / R1-R2): command reachability (F24 — every registered Tauri command
# has a caller or an allowlisted reason), platform discipline (F29 —
# @tauri-apps access stays behind src/lib/platform/** + a frozen allowlist),
# bridge coverage + version (F11 — the generated Android BridgeSpec.kt
# matches packages/editor/src/bridge.ts), the drift registry (R1 — AGENTS.md
# §12's permitted-duplicate list as code, deny-by-default) and the debt
# ratchet (R2 — 4 fuzzy debt counts that can only go down). The
# constants-conformance gate (F7/F21) and the bridge exhaustiveness type
# check ride in the `test`/`test:rust`/`test:rust:workspace` jobs already,
# as ordinary Rust/vitest tests and a tsc error.
test:arch-gates:
  stage: test
  cache:
    - !reference [.cache-pnpm, cache]
  script:
    - pnpm install --frozen-lockfile --prefer-offline
    - node scripts/check-command-reachability.mjs
    - node scripts/check-platform-discipline.mjs
    - pnpm exec tsx scripts/gen-bridge-spec.ts --check
    - node scripts/drift-check.mjs
    - node scripts/debt-ratchet.mjs
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_MERGE_REQUEST_IID
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

test:e2e:smoke:
  stage: test
  cache:
    - !reference [.cache-pnpm, cache]
    - !reference [.cache-playwright, cache]
  script:
    - pnpm install --frozen-lockfile --prefer-offline
    - !reference [.setup-playwright, script]
    - pnpm run test:e2e:smoke
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_MERGE_REQUEST_IID
      changes: &web-e2e-smoke-changes
        - src/**/*
        - packages/editor/**/*
        - packages/shared/**/*
        - tests/p0-regressions.spec.ts
        - tests/lib/**/*
        - playwright.config.ts
        - package.json
        - pnpm-lock.yaml
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      changes: *web-e2e-smoke-changes

test:e2e:markdown-spec:
  stage: test
  cache:
    - !reference [.cache-pnpm, cache]
    - !reference [.cache-playwright, cache]
  script:
    - pnpm install --frozen-lockfile --prefer-offline
    - !reference [.setup-playwright, script]
    - pnpm run test:markdown-spec
  rules:
    - if: $CI_COMMIT_TAG
    # Deterministic editor corpus, already blocking on tags — auto-run and
    # block on the MRs that can break it.
    - if: $CI_MERGE_REQUEST_IID
      changes:
        - src/**/*
        - packages/editor/**/*
        - markdown-spec/**/*
        - tests/markdown-spec.spec.ts
        - tests/lib/**/*
        - playwright.config.ts
        - package.json
        - pnpm-lock.yaml
        - .gitlab-ci.yml
    - if: $CI_MERGE_REQUEST_IID
      when: manual
      allow_failure: true

test:e2e:rest:
  stage: test
  cache:
    - !reference [.cache-pnpm, cache]
    - !reference [.cache-playwright, cache]
  script:
    - pnpm install --frozen-lockfile --prefer-offline
    - !reference [.setup-playwright, script]
    - pnpm run test:e2e:rest
  rules:
    - if: $CI_COMMIT_TAG
    # Same web surface as test:e2e:smoke, plus any spec edit re-runs the
    # suite that contains it.
    - if: $CI_MERGE_REQUEST_IID
      changes:
        - src/**/*
        - packages/editor/**/*
        - packages/shared/**/*
        - tests/**/*.spec.ts
        - tests/lib/**/*
        - playwright.config.ts
        - package.json
        - pnpm-lock.yaml
        - .gitlab-ci.yml
    - if: $CI_MERGE_REQUEST_IID
      when: manual
      allow_failure: true

test:rust:
  stage: test
  cache:
    - !reference [.cache-cargo-tauri, cache]
  script:
    - !reference [.setup-rust, script]
    # Minimal Rust coverage: prove the canonical model rules still match the
    # committed language-neutral fixtures. Full workspace tests are explicit.
    - cargo test -p futo-notes-model --test conformance
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_MERGE_REQUEST_IID

test:rust:workspace:
  stage: test
  cache:
    - !reference [.cache-cargo-tauri, cache]
  script:
    # `cargo test --workspace` compiles the futo-notes-tauri desktop crate,
    # which links gtk-sys/gobject-sys and needs the GTK/webkit dev libs. The
    # default kitchensink image does not ship them, so install them here — the
    # same pattern the linux build + cross-platform-sync jobs already use.
    # Without this the job dies at `gobject-2.0 not found`.
    - !reference [.setup-linux-deps, script]
    - !reference [.setup-rust, script]
    - mkdir -p dist
    - cargo test --workspace
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_MERGE_REQUEST_IID
      changes: &rust-workspace-changes
        - Cargo.toml
        - Cargo.lock
        - rust-toolchain.toml
        - .cargo/**/*
        - crates/**/*
        - apps/tauri/src-tauri/**/*
        - apps/tauri/Cargo.toml
        - scripts/build-rust-android.sh
        - scripts/build-rust-ios.sh
        # CI config changes can alter this job's toolchain/system-dep setup
        # (e.g. the GTK deps it needs to compile the tauri crate) — re-run the
        # workspace tests so an environment break is caught on that change.
        - .gitlab-ci.yml
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      changes: *rust-workspace-changes

# Lock in the search/ML isolation boundary: the portable core crates must never
# pull in Tantivy or ORT. The FFI facade may expose keyword-only native search
# through futo-notes-search, but must not pull in ORT/SPLADE. cargo tree
# -e normal walks only normal (non-dev, non-build) deps, so a dev-dependency on
# a core crate doesn't trip this.
test:rust:dep-guard:
  stage: test
  cache:
    - !reference [.cache-cargo-tauri, cache]
  script:
    - !reference [.setup-rust, script]
    - |
      FAIL=0
      for c in futo-notes-core futo-notes-model futo-notes-sync; do
        if cargo tree -p "$c" -e normal | grep -Eiq '(^|[^[:alnum:]_-])(tantivy|ort|ort-sys)([^[:alnum:]_-]|$)'; then
          echo "DEP GUARD FAILED: search/ML dep (tantivy/ort) reached portable core crate '$c':"
          cargo tree -p "$c" -e normal | grep -Ei '(^|[^[:alnum:]_-])(tantivy|ort|ort-sys)([^[:alnum:]_-]|$)'
          FAIL=1
        else
          echo "OK: '$c' is free of tantivy/ort"
        fi
      done
      if cargo tree -p futo-notes-ffi -e normal | grep -Eiq '(^|[^[:alnum:]_-])(futo-notes-inference|ort|ort-sys)([^[:alnum:]_-]|$)'; then
        echo "DEP GUARD FAILED: ORT/SPLADE dep reached native FFI facade:"
        cargo tree -p futo-notes-ffi -e normal | grep -Ei '(^|[^[:alnum:]_-])(futo-notes-inference|ort|ort-sys)([^[:alnum:]_-]|$)'
        FAIL=1
      else
        echo "OK: 'futo-notes-ffi' is keyword-only (no ORT/SPLADE)"
      fi
      if [ "$FAIL" -ne 0 ]; then
        echo "Portable core crates must stay free of search/ML deps; FFI must stay free of ORT/SPLADE. See AGENTS.md."
        exit 1
      fi
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_MERGE_REQUEST_IID

test:rust:macos:
  stage: test
  tags:
    - macscript
  # Force a clean clone each run — the macscript runner's incremental fetch
  # kept hitting `missing blob object / remote did not send all necessary
  # objects` on a stale local .git.
  variables:
    GIT_STRATEGY: clone
  before_script:
    - env | grep -E '^(CI_)' > .cienv
  script:
    - cirrus run testRustMacOS --artifacts-dir . --env-file .cienv
  rules:
    - if: $CI_COMMIT_TAG
    # Auto on Rust-touching MRs. allow_failure stays: this runs through
    # Cirrus on the single macscript runner, and infra flakiness must not
    # block merges — but the result is now visible instead of opt-in.
    - if: $CI_MERGE_REQUEST_IID
      changes: *rust-workspace-changes
      allow_failure: true
    - if: $CI_MERGE_REQUEST_IID
      when: manual
      allow_failure: true

test:cross-platform-sync:
  stage: test
  # Pin to the fast office runner — see build:android-native.
  tags:
    - dind_fast
  services:
    - name: postgres:15
      alias: postgres
  variables:
    POSTGRES_DB: futo_notes
    POSTGRES_USER: futo_notes
    POSTGRES_PASSWORD: futo_notes
    FUTO_NOTES_E2EE_DATABASE_URL: postgres://futo_notes:futo_notes@postgres:5432/futo_notes
    PGPASSWORD: futo_notes
  cache:
    - !reference [.cache-pnpm, cache]
    - !reference [.cache-cargo-tauri, cache]
  script:
    - pnpm install --frozen-lockfile
    - !reference [.setup-linux-deps, script]
    - !reference [.setup-rust, script]
    - DEBIAN_FRONTEND=noninteractive apt-get install -y xvfb postgresql-client
    - !reference [.setup-futo-notes-server, script]
    # Rust server-backed integration suite (futo-notes-sync orchestrator
    # against a REAL server — e.g. the disconnect→reconnect conflict-spam
    # regressions). Dev-mode server instance on its own database so it can't
    # interfere with the password-mode server the cross-platform run boots.
    - psql -h postgres -U futo_notes -d postgres -c 'CREATE DATABASE futo_notes_rust_it'
    - export PATH="${BUN_INSTALL:-$HOME/.bun}/bin:$PATH"
    - >-
      (cd "$CI_PROJECT_DIR/.futo-notes-server" &&
      AUTH_MODE=dev PORT=3009 BLOB_DIR=/tmp/rust-it-blobs
      DATABASE_URL=postgres://futo_notes:futo_notes@postgres:5432/futo_notes_rust_it
      bun src/index.ts &> /tmp/rust-it-server.log &)
    - for i in $(seq 1 30); do curl -sf http://127.0.0.1:3009/health && break; sleep 1; done
    - >-
      FUTO_TEST_SERVER=http://127.0.0.1:3009
      cargo test -p futo-notes-sync --test server_integration --test sse_live
      -- --ignored --test-threads=1
      || { tail -50 /tmp/rust-it-server.log; exit 1; }
    # (the dev-mode server is left running — own port + database, reaped with
    # the job container)
    # cargo clean -p so the tauri build script re-runs and re-embeds dist/
    # with the test hooks: a futo-notes-tauri crate cached in
    # .cache-cargo-tauri from a build without VITE_INCLUDE_TEST_HOOKS can
    # otherwise re-link a hooks-free binary.
    - (cd apps/tauri && cargo clean -p futo-notes-tauri 2>/dev/null || true)
    - (cd apps/tauri && VITE_INCLUDE_TEST_HOOKS=true cargo tauri build --debug --no-bundle)
    # Run cross-platform sync tests under xvfb
    - >-
      WEBKIT_DISABLE_DMABUF_RENDERER=1
      xvfb-run -a --server-args="-screen 0 1280x800x24"
      node tests/cross-platform-sync.mjs
  after_script:
    - kill $(pgrep -f futo-notes-tauri) 2>/dev/null || true
  artifacts:
    when: always
    paths:
      - test-screenshots/sync-results.json
    expire_in: 1 week
  # A fully cold Rust compile of the desktop Tauri app blew past 30m on the
  # v1.4.0 tag pipeline (this job is tag-only, so its cache is rarely warm).
  # 60m lets a cold run finish and seed the cache (when: always) for retries.
  timeout: 60m
  rules:
    - if: $CI_COMMIT_TAG
    # Sync-critical paths auto-run and BLOCK the merge — this suite guards
    # user data, and a failure here nearly shipped a broken release twice.
    # First MR run on the cold non-protected-ref cache namespace is slow
    # (up to the 60m wall); caches upload when: always, so subsequent MRs
    # warm-start.
    - if: $CI_MERGE_REQUEST_IID
      changes:
        - crates/futo-notes-sync/**/*
        - crates/futo-notes-core/**/*
        - src/lib/syncServiceE2ee.ts
        - src/lib/sync*
        - tests/cross-platform-sync.mjs
        - tests/lib/**/*
        - .gitlab-ci.yml
    # Anything else that could plausibly affect sync stays one click away.
    - if: $CI_MERGE_REQUEST_IID
      when: manual
      allow_failure: true
      changes:
        - apps/tauri/**/*
        - src/**/*
        - crates/**/*
        - packages/shared/**/*
        - packages/editor/**/*

test:desktop-smoke:macos:
  stage: test
  tags:
    - macscript
  variables:
    GIT_STRATEGY: clone
  before_script:
    - env | grep -E '^(CI_)' > .cienv
  script:
    - cirrus run testDesktopSmokeMacOS --artifacts-dir . --env-file .cienv
  rules:
    - if: $CI_COMMIT_TAG
    # Auto on desktop-touching MRs; allow_failure stays (single macscript
    # runner via Cirrus — see test:rust:macos).
    - if: $CI_MERGE_REQUEST_IID
      changes:
        - apps/tauri/**/*
        - src/**/*
      allow_failure: true
    - if: $CI_MERGE_REQUEST_IID
      when: manual
      allow_failure: true

# ─────────────────────────────────────────────────────────────
# Builds (tags only)
# ─────────────────────────────────────────────────────────────

# .deb/.rpm install against the host's webkit2gtk, so building on the oldest
# Ubuntu that ships libwebkit2gtk-4.1 (22.04, glibc 2.35) gives forward-compat
# with older distros. Building on rolling/latest would link against a newer
# glibc and break on anything older.
build:linux-packages:
  stage: build
  # Pin to the fast office runner — see build:android-native.
  tags:
    - dind_fast
  needs:
    - job: test
  image: ubuntu:22.04
  before_script: &linux-before-script
    - apt-get update
    - DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends curl ca-certificates build-essential git file pkg-config
    - curl -fsSL https://deb.nodesource.com/setup_22.x | bash -
    - DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends nodejs
    - corepack enable
    - corepack prepare pnpm@10.29.2 --activate
    - pnpm config set store-dir "$PNPM_STORE_DIR"
    - export PATH="$CARGO_HOME/bin:$PATH"
  cache:
    - !reference [.cache-pnpm, cache]
    - !reference [.cache-cargo-tauri-linux-packages, cache]
  script:
    - pnpm install --frozen-lockfile
    - !reference [.setup-linux-deps, script]
    - !reference [.setup-rust, script]
    - !reference [.set-version, script]
    - cd apps/tauri && cargo tauri build --bundles deb,rpm
  after_script:
    - |
      echo "=== Linux package artifacts ==="
      find target/release/bundle -type f \( -name "*.deb" -o -name "*.rpm" \) 2>/dev/null
  artifacts:
    paths:
      - target/release/bundle/deb/*.deb
      - target/release/bundle/rpm/*.rpm
    expire_in: 4 weeks
  rules:
    - if: $CI_COMMIT_TAG

# AppImage bundles its entire userland (WebKitGTK, GLib, GStreamer, libwayland,
# ...) and relies on the *host's* Mesa at runtime. The failure mode we hit on
# Mesa 26 (CachyOS / Arch / Fedora 40+): linuxdeploy bundles the build base's
# libwayland-client.so.0 into the AppImage, and that bundled copy mismatches
# the host's libEGL — eglGetPlatformDisplay(EGL_PLATFORM_WAYLAND_KHR, …) fails
# with "Could not create default EGL display: EGL_BAD_PARAMETER. Aborting…"
# and WebKit exits before rendering. Confirmed reproducible on v1.2.0 against
# CachyOS (Mesa 26.0.5). Fix: delete libwayland-client.so.0 from the AppImage
# via scripts/patch-appimage-mesa26.mjs so the host's copy is used instead —
# host libwayland and host libEGL always match because they ship together.
#
# Base is ubuntu:22.04 for the widest glibc floor (2.35). jammy-security
# already ships WebKitGTK 2.50 (libwebkit2gtk-4.1 2.50.4-0ubuntu0.22.04.1),
# which is new enough to use the EGL platform API — so noble buys us nothing
# extra here and costs us glibc compat on older target distros.
build:linux-appimage:
  stage: build
  # Pin to the fast office runner — see build:android-native.
  tags:
    - dind_fast
  needs:
    - job: test
  image: ubuntu:22.04
  before_script: *linux-before-script
  cache:
    - !reference [.cache-pnpm, cache]
    - !reference [.cache-cargo-tauri-linux-appimage, cache]
  script:
    - pnpm install --frozen-lockfile
    - !reference [.setup-linux-deps, script]
    - !reference [.setup-rust, script]
    - !reference [.set-version, script]
    - cd apps/tauri && cargo tauri build --bundles appimage && cd ../..
    # Strip the bundled libwayland-client.so.0 so the AppImage boots on Mesa 26.
    # Script auto-downloads appimagetool if it isn't already on PATH.
    - node scripts/patch-appimage-mesa26.mjs --dir target/release/bundle/appimage
    # Updater signature — minisign the FINAL (mesa-patched) AppImage so the .sig
    # matches the bytes clients download. MUST be the last touch on the artifact.
    # TAURI_SIGNING_PRIVATE_KEY is a protected CI variable; the key has no password
    # (-p "" supplies the empty passphrase). The .sig content is embedded into
    # latest.json by the release: job.
    - |
      test -n "$TAURI_SIGNING_PRIVATE_KEY" || { echo "TAURI_SIGNING_PRIVATE_KEY is not set"; exit 1; }
      for f in target/release/bundle/appimage/*.AppImage; do
        cargo tauri signer sign -p "" "$f"
      done
  after_script:
    - |
      echo "=== Linux AppImage artifact ==="
      find target/release/bundle -type f \( -name "*.AppImage" -o -name "*.AppImage.sig" \) 2>/dev/null
  artifacts:
    paths:
      - target/release/bundle/appimage/*.AppImage
      - target/release/bundle/appimage/*.AppImage.sig
    expire_in: 4 weeks
  rules:
    - if: $CI_COMMIT_TAG

# Rebuild the pre-baked Android CI image (JDK + SDK/NDK + Rust targets +
# emulator + system image + desktop Tauri deps). Manual trigger only —
# click "Run" on this job when ci/android.Dockerfile changes. Registry auth
# uses the runner's CI_JOB_TOKEN, so no laptop push is needed.
#
# Builds with Buildah (rootless, daemonless) instead of docker-in-docker: the
# docker:27-dind SERVICE stopped starting on our runners — its health check
# fails and the `docker` host never resolves, so `docker build` died with
# `error during connect: … lookup docker … no such host`. Buildah needs no
# privileged daemon and no service container, which removes that whole failure
# class. STORAGE_DRIVER=vfs + BUILDAH_ISOLATION=chroot is the recipe for an
# unprivileged CI container (no user-namespace / fuse-overlayfs requirement);
# --format docker keeps the pushed manifest in the schema every consumer pulls.
build:ci-android-image:
  stage: build
  needs: []
  image: quay.io/buildah/stable:latest
  before_script: []
  variables:
    STORAGE_DRIVER: vfs
    BUILDAH_ISOLATION: chroot
  script:
    - buildah login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
    - buildah bud --format docker -f "$CI_PROJECT_DIR/ci/android.Dockerfile" -t "$CI_REGISTRY_IMAGE/ci/android:latest" "$CI_PROJECT_DIR"
    - buildah push "$CI_REGISTRY_IMAGE/ci/android:latest"
  rules:
    - if: $CI_PIPELINE_SOURCE == "web"
      when: manual
    - if: $CI_MERGE_REQUEST_IID
      changes:
        - ci/android.Dockerfile
      when: manual
      allow_failure: true

build:macos:
  stage: build
  needs:
    - job: test
  tags:
    - macscript
  variables:
    GIT_STRATEGY: clone
  before_script:
    # TAURI_ passes the updater signing key (TAURI_SIGNING_PRIVATE_KEY[_PASSWORD])
    # through to the Cirrus macOS task, which builds the signed .app.tar.gz.
    - env | grep -E '^(CI_|MACOS_|ASC_|TAURI_)' > .cienv
  script:
    - cirrus run buildFutoNotesMacOS --artifacts-dir . --env-file .cienv
  artifacts:
    paths:
      - buildFutoNotesMacOS/binary/*.dmg
      - buildFutoNotesMacOS/updater/*
    expire_in: 4 weeks
  rules:
    - if: $CI_COMMIT_TAG

# ─────────────────────────────────────────────────────────────
# Native app shells (Compose / SwiftUI) — NOT Tauri. Same Rust core
# (futo-notes-ffi via UniFFI) + the embedded editor.html bundle. These are the
# release mobile apps on tags; on MRs/default-branch pushes they remain
# build-only verification jobs with no device install.
# ─────────────────────────────────────────────────────────────

build:android-native:
  stage: build
  # Pin to the office runner via the dind_fast tag (only runner 71 has it; the
  # DigitalOcean dind droplet has just `dind`). It keeps a warm local cargo
  # cache and has far faster CPU — ~5m here vs ~88m cold on the droplet.
  # Trade-off: the dind_fast jobs serialise on one box and lose the droplet
  # as failover.
  tags:
    - dind_fast
  needs: []
  image: gitlab.futo.org:5050/futo-notes/futo-notes/ci/android:latest
  cache:
    - !reference [.cache-pnpm, cache]
    # Native cargo work (NDK targets + host lib) is disjoint from the Tauri
    # jobs — own key so the two don't evict each other's target/.
    - !reference [.cache-cargo-native, cache]
    # Gradle wrapper dist + dependency cache (GRADLE_USER_HOME below).
    - !reference [.cache-gradle-native, cache]
  variables:
    ANDROID_HOME: /opt/android-sdk
    ANDROID_SDK_ROOT: /opt/android-sdk
    JAVA_HOME: /opt/jdk-21
    NDK_HOME: /opt/android-sdk/ndk/28.2.13676358
    # scripts/build-rust-android.sh requires ANDROID_NDK_HOME specifically
    # (cargo-ndk also honors it); the image only exports NDK_HOME. NDK r28 links
    # the Rust .so 16 KB-page-aligned by default (Play 16 KB requirement).
    ANDROID_NDK_HOME: /opt/android-sdk/ndk/28.2.13676358
    # Point Gradle's home at a cached, in-project dir so the wrapper dist +
    # dependency cache survive between runs (must be under $CI_PROJECT_DIR for
    # GitLab caching). The .gradle-native/{caches,wrapper} subtrees map to
    # .cache-gradle-native.
    GRADLE_USER_HOME: $CI_PROJECT_DIR/.gradle-native
  script:
    - export PATH="$JAVA_HOME/bin:$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools:$PATH"
    # SDK platform 36 + build-tools 36 are baked into ci/android.Dockerfile
    # (the same image build:android uses), so no inline sdkmanager install is
    # needed here.
    - pnpm install --frozen-lockfile
    - !reference [.setup-rust, script]
    # Android Rust targets + cargo-ndk for the per-ABI .so build. The image
    # bakes the targets, but re-adding is a no-op if present. cargo-ndk is
    # cached in .cache-cargo-native's .cargo-home/bin — only build it (FROM
    # SOURCE, not binstall: the prebuilt binstall binary needs GLIBC_2.39,
    # newer than the ci/android image) when the cached binary is missing.
    - rustup target add aarch64-linux-android armv7-linux-androideabi x86_64-linux-android
    - |
      if command -v cargo-ndk >/dev/null 2>&1; then
        echo "cargo-ndk already installed (cached)"
      else
        cargo install cargo-ndk --locked
      fi
    # Shared Rust FFI (.so per ABI) + UniFFI Kotlin bindings.
    - bash scripts/build-rust-android.sh
    - |
      if [ -n "$CI_COMMIT_TAG" ]; then
        VERSION="${CI_COMMIT_TAG#v}"
        export VERSION_NAME="$VERSION"
        # versionCode = MAJOR*1000000 + MINOR*1000 + PATCH, matching the LEGACY
        # app's scheme (e.g. v1.4.0 = 1004000). The old CI_PIPELINE_IID (~hundreds)
        # is far below legacy codes, so Android/Obtainium/Play reject it as a
        # downgrade for anyone with the old app installed. Keep this monotonic
        # with semver so updates always apply.
        V_MAJ="${VERSION%%.*}"; V_REST="${VERSION#*.}"
        V_MIN="${V_REST%%.*}"; V_PAT="${V_REST#*.}"; V_PAT="${V_PAT%%[!0-9]*}"
        export VERSION_CODE=$(( ${V_MAJ:-0} * 1000000 + ${V_MIN:-0} * 1000 + ${V_PAT:-0} ))
        echo "Building native Android release versionName=$VERSION_NAME versionCode=$VERSION_CODE"
      fi
    # Build the embedded editor bundle and stage it into the app assets
    # (the SAME single editor.html iOS bundles).
    - pnpm exec vite build --config vite.editor.config.ts
    - mkdir -p apps/android/app/src/main/assets
    - cp apps/ios/Resources/editor.html apps/android/app/src/main/assets/editor.html
    - |
      if [ -n "$CI_COMMIT_TAG" ] && [ -n "${KEYSTORE_BASE64:-}" ]; then
        echo "$KEYSTORE_BASE64" | base64 -d > /tmp/native-release.keystore
        {
          echo "keyAlias=${KEY_ALIAS:-upload}"
          echo "password=${KEYSTORE_PASSWORD}"
          echo "storeFile=/tmp/native-release.keystore"
        } > apps/android/keystore.properties
      elif [ -n "$CI_COMMIT_TAG" ]; then
        echo "WARNING: No KEYSTORE_BASE64 set — native Android release APK will be unsigned"
      fi
    # On tags build BOTH: a release APK (GitLab release / sideload) and a
    # release AAB (Google Play, uploaded by publish:android). Debug elsewhere
    # for fast compile verification with the same native shell.
    - |
      if [ -n "$CI_COMMIT_TAG" ]; then
        cd apps/android && ./gradlew --no-daemon :app:assembleRelease :app:bundleRelease
      else
        cd apps/android && ./gradlew --no-daemon :app:assembleDebug :app:testDebugUnitTest
      fi
  after_script:
    - find apps/android/app/build/outputs/apk -name "*.apk" -type f 2>/dev/null || true
    - find apps/android/app/build/outputs/bundle -name "*.aab" -type f 2>/dev/null || true
  artifacts:
    paths:
      - apps/android/app/build/outputs/apk/**/*.apk
      - apps/android/app/build/outputs/bundle/**/*.aab
    expire_in: 4 weeks
  # A cold/partial .cache-cargo-native cache makes the Rust FFI compile across
  # 3 NDK ABIs swing wide (observed 8m warm → 27m near-cold → 45m timeout
  # fully cold on the v1.4.0 tag pipeline, killed mid-armv7). 90m lets a fully
  # cold run finish; the caches now upload when: always so even a failed run
  # warms the next attempt.
  timeout: 90m
  rules:
    - if: $CI_MERGE_REQUEST_IID
      changes: &native-android-changes
        - apps/android/**/*
        - crates/**/*
        - packages/editor/**/*
        - editor.html
        - vite.editor.config.ts
        - scripts/build-rust-android.sh
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      changes: *native-android-changes
    - if: $CI_COMMIT_TAG

# Native iOS build on the macscript runner via Cirrus (see .cirrus.yml,
# task buildFutoNotesIOSNative). Tags build a signed Release IPA; branch/MR
# pipelines run an unsigned simulator compile check.
build:ios-native:
  stage: build
  needs: []
  tags:
    - macscript
  variables:
    GIT_STRATEGY: clone
  before_script:
    # IOS_ must pass through: the Cirrus task imports Certificates.p12 with
    # $IOS_CERT_PASSWORD on tag builds. CI_-only here yields an empty
    # password and "MAC verification failed during PKCS12 import".
    - env | grep -E '^(CI_|IOS_)' > .cienv
  script:
    - cirrus run buildFutoNotesIOSNative --artifacts-dir . --env-file .cienv
  artifacts:
    paths:
      - buildFutoNotesIOSNative/binary/*.ipa
    expire_in: 4 weeks
  rules:
    - if: $CI_MERGE_REQUEST_IID
      changes: &native-ios-changes
        - apps/ios/**/*
        - crates/**/*
        - packages/editor/**/*
        - editor.html
        - vite.editor.config.ts
        - scripts/build-rust-ios.sh
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      changes: *native-ios-changes
    - if: $CI_COMMIT_TAG

# ─────────────────────────────────────────────────────────────
# Windows build (Proxmox VM)
# ─────────────────────────────────────────────────────────────
# Flow: provision Windows VM → SSH in to build → sign artifacts → cleanup VM
# Template VM 101 has: Rust 1.92, VS Build Tools (MSVC), winget
# Needs installed at build time: Git, Node.js, pnpm, NSIS, tauri-cli
# Required CI/CD variables (masked, protected):
#   PROXMOX_USER, PROXMOX_TOKEN_ID, PROXMOX_TOKEN_SECRET
#   PROXMOX_WIN_USER, PROXMOX_WIN_PASSWORD

.proxmox_auth: &proxmox_auth
  - export PROXMOX_AUTH="PVEAPIToken=${PROXMOX_USER}!${PROXMOX_TOKEN_ID}=${PROXMOX_TOKEN_SECRET}"

windows:provision:
  stage: build
  needs:
    - job: test
  tags:
    - proxmoxshell
  before_script:
    - *proxmox_auth
  variables:
    PROXMOX_HOST: "127.0.0.1"
    PROXMOX_NODE: "green"
    TEMPLATE_VMID: "101"
    VM_NAME: "futo-notes-win-${CI_PIPELINE_ID}"
    CLONE_TYPE: "1"
  script:
    # Get next available VMID
    - |
      export NEXT_VMID=$(curl -s -k \
        -H "Authorization: ${PROXMOX_AUTH}" \
        "https://${PROXMOX_HOST}:8006/api2/json/cluster/nextid" | jq -r '.data')
      echo "VMID=${NEXT_VMID}" >> provision.env
      echo "Using VMID: ${NEXT_VMID}"

    # Clone the template VM and poll task until done
    - |
      CLONE_RESPONSE=$(curl -s -k -X POST \
        -H "Authorization: ${PROXMOX_AUTH}" \
        -H "Content-Type: application/x-www-form-urlencoded" \
        -d "newid=${NEXT_VMID}&name=${VM_NAME}&full=${CLONE_TYPE}" \
        "https://${PROXMOX_HOST}:8006/api2/json/nodes/${PROXMOX_NODE}/qemu/${TEMPLATE_VMID}/clone")
      UPID=$(echo "$CLONE_RESPONSE" | jq -r '.data')
      echo "Clone task started: $UPID"

    - |
      UPID_ENCODED=$(printf '%s' "$UPID" | jq -sRr @uri)
      LATEST_TEMP=""
      while true; do
        TASK_STATUS=$(curl -s -k \
          -H "Authorization: ${PROXMOX_AUTH}" \
          "https://${PROXMOX_HOST}:8006/api2/json/nodes/${PROXMOX_NODE}/tasks/${UPID_ENCODED}/status")
        STATUS=$(echo "$TASK_STATUS" | jq -r '.data.status')
        if [ "$STATUS" = "stopped" ]; then
          EXIT_STATUS=$(echo "$TASK_STATUS" | jq -r '.data.exitstatus')
          if [ "$EXIT_STATUS" = "OK" ]; then
            echo "Clone completed successfully!"
            break
          else
            echo "Clone failed: $EXIT_STATUS"
            exit 1
          fi
        fi
        TASK_LOG=$(curl -s -k \
          -H "Authorization: ${PROXMOX_AUTH}" \
          "https://${PROXMOX_HOST}:8006/api2/json/nodes/${PROXMOX_NODE}/tasks/${UPID_ENCODED}/log?limit=10000")
        LATEST=$(echo "$TASK_LOG" | jq -r '.data | sort_by(.n) | last | .t // "waiting..."')
        if [ "$LATEST_TEMP" != "$LATEST" ]; then
          echo "Status: $STATUS | $LATEST"
          LATEST_TEMP="$LATEST"
        fi
        sleep 5
      done

    # Start the VM
    - |
      source provision.env
      curl -s -k -X POST \
        -H "Authorization: ${PROXMOX_AUTH}" \
        "https://${PROXMOX_HOST}:8006/api2/json/nodes/${PROXMOX_NODE}/qemu/${VMID}/status/start"

    # Wait for VM to get an IP via QEMU guest agent
    - |
      source provision.env
      echo "Waiting for VM to boot and get IP..."
      for i in $(seq 1 60); do
        IP=$(curl -s -k \
          -H "Authorization: ${PROXMOX_AUTH}" \
          "https://${PROXMOX_HOST}:8006/api2/json/nodes/${PROXMOX_NODE}/qemu/${VMID}/agent/network-get-interfaces" 2>/dev/null \
          | jq -r '.data.result[]? | select(.name != "Loopback Pseudo-Interface 1") | ."ip-addresses"[]? | select(."ip-address-type" == "ipv4") | ."ip-address"' \
          | head -1)
        if [ -n "$IP" ] && [ "$IP" != "null" ]; then
          echo "VM_IP=${IP}" >> provision.env
          echo "VM is up at: ${IP}"
          break
        fi
        echo "Waiting for start and IP... (${i}/60)"
        sleep 10
      done
      if [ -z "$IP" ] || [ "$IP" = "null" ]; then
        echo "ERROR: No IP after 10 minutes"
        exit 1
      fi

  artifacts:
    # when: always — publish the dotenv even when this job FAILS. The VM is
    # created (clone+start) before the IP wait that can time out and `exit 1`;
    # without this, a failed provision drops the VMID and windows:cleanup can't
    # find the VM, orphaning it. With it, the VMID reaches cleanup regardless.
    when: always
    reports:
      dotenv: provision.env
  rules:
    - if: $CI_COMMIT_TAG
    # Manual Windows build on MRs: verify the Windows installer (incl. the
    # static-CRT / no-VC++-runtime guard in ci/win-build.ps1) before merge,
    # without cutting a tag. publish/release jobs are tag-only, so an MR
    # pipeline can never publish. Manual ⇒ never auto-runs on every MR push;
    # playing this one job starts the provision→build→cleanup chain.
    #
    # This chain is the deliberate EXCEPTION to the MR auto-run policy: the
    # PROXMOX_* credentials are PROTECTED CI variables, which don't exist on
    # MR pipelines from non-protected branches — an auto rule would fail
    # every single run. If this ever becomes auto (vars unprotected or
    # protected-branch MRs), windows:cleanup's MR rule must switch to
    # when: always under the same changes: in the SAME commit, or a failed
    # build orphans the VM.
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      when: manual
      allow_failure: true

build:windows:
  stage: build
  tags:
    - proxmoxshell
  needs:
    - job: windows:provision
      artifacts: true
  # Pass the VM password to sshpass via the SSHPASS env var (sshpass -e)
  # rather than on the command line, so the password never appears in the
  # process argument list (visible in `ps`) on the runner or VM.
  variables:
    SSHPASS: "$PROXMOX_WIN_PASSWORD"
  before_script: []
  script:
    # Wait for SSH to be ready
    - |
      for i in $(seq 1 30); do
        if sshpass -e ssh -o StrictHostKeyChecking=no -o ConnectTimeout=5 "${PROXMOX_WIN_USER}@${VM_IP}" "echo ready" 2>/dev/null; then
          echo "SSH is ready!"
          break
        fi
        echo "Waiting for SSH... ($i/30)"
        sleep 10
      done

    # Upload build scripts to VM
    - |
      sshpass -e scp -o StrictHostKeyChecking=no \
        ci/win-install-deps.ps1 ci/win-build.ps1 \
        "${PROXMOX_WIN_USER}@${VM_IP}:C:/Users/${PROXMOX_WIN_USER}/"

    # Install build dependencies
    - |
      sshpass -e ssh -o StrictHostKeyChecking=no "${PROXMOX_WIN_USER}@${VM_IP}" \
        "powershell -NoProfile -ExecutionPolicy Bypass -File C:\\Users\\${PROXMOX_WIN_USER}\\win-install-deps.ps1"

    # Clone repo and build
    - |
      # Tag builds clone the tag and derive the version from it. MR builds have
      # no tag, so clone the MR source branch and use a plain 0.0.0 (a
      # non-numeric pre-release like 0.0.0-ci.N is rejected by the MSI bundler).
      REF="${CI_COMMIT_TAG:-${CI_MERGE_REQUEST_SOURCE_BRANCH_NAME:-$CI_COMMIT_REF_NAME}}"
      VERSION="${CI_COMMIT_TAG#v}"
      [ -n "$VERSION" ] || VERSION="0.0.0"
      sshpass -e ssh -o StrictHostKeyChecking=no "${PROXMOX_WIN_USER}@${VM_IP}" \
        "powershell -NoProfile -ExecutionPolicy Bypass -File C:\\Users\\${PROXMOX_WIN_USER}\\win-build.ps1 -RepoUrl ${CI_REPOSITORY_URL} -Branch ${REF} -Version ${VERSION}"

    # Retrieve build artifacts
    - mkdir -p windows-artifacts
    - |
      sshpass -e scp -o StrictHostKeyChecking=no -r \
        "${PROXMOX_WIN_USER}@${VM_IP}:C:/build/futo-notes/target/release/bundle/nsis/*" \
        windows-artifacts/
    - |
      echo "=== Windows build artifacts ==="
      ls -la windows-artifacts/

  artifacts:
    paths:
      - windows-artifacts/*
    expire_in: 4 weeks
  rules:
    - if: $CI_COMMIT_TAG
    # On an MR, run automatically once the manual provision succeeds.
    # allow_failure so flaky/expensive Windows infra never blocks a merge.
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      allow_failure: true

windows:sign:
  stage: build
  tags:
    - dind
  image: debian:trixie-slim
  needs:
    - job: build:windows
      artifacts: true
  before_script: []
  script:
    - |
      if ! command -v aws >/dev/null 2>&1 || ! command -v java >/dev/null 2>&1 || ! command -v python3 >/dev/null 2>&1 || ! command -v npx >/dev/null 2>&1; then
        apt-get update
        DEBIAN_FRONTEND=noninteractive apt-get install -y ca-certificates curl jq awscli default-jre-headless python3 nodejs npm
      fi
    # Download fullchain.pem from GitLab secure files
    - |
      mkdir -p /deploy/signing
      FILE_ID=$(curl --silent --fail \
        --header "JOB-TOKEN: $CI_JOB_TOKEN" \
        "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/secure_files" \
        | jq -r '.[] | select(.name=="fullchain.pem") | .id')
      test -n "$FILE_ID"
      curl --silent --fail \
        --header "JOB-TOKEN: $CI_JOB_TOKEN" \
        --output /deploy/signing/fullchain.pem \
        "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/secure_files/${FILE_ID}/download"
      echo "Downloaded fullchain.pem"
    # Sign all .exe artifacts (Authenticode via jsign/AWS KMS)
    - |
      for f in windows-artifacts/*.exe; do
        [ -f "$f" ] || continue
        CERT_FILE=/deploy/signing/fullchain.pem bash ci/sign-windows.sh "$f"
      done
    # Updater signature — minisign the exe AFTER Authenticode (jsign rewrites the
    # bytes, so any earlier .sig is stale). minisign MUST be the last touch. The
    # Windows VM build stays keyless; the signing key lives only here as a CI var.
    # The key has no password (-p "" supplies the empty passphrase). The CLI is
    # pinned to match the cargo tauri-cli used on Linux/macOS. The .sig content is
    # embedded into latest.json by the release: job.
    - |
      test -n "$TAURI_SIGNING_PRIVATE_KEY" || { echo "TAURI_SIGNING_PRIVATE_KEY is not set"; exit 1; }
      for f in windows-artifacts/*.exe; do
        [ -f "$f" ] || continue
        npx --yes @tauri-apps/cli@2.11.3 signer sign -p "" "$f"
      done
  artifacts:
    paths:
      - windows-artifacts/*.exe
      - windows-artifacts/*.exe.sig
    expire_in: 4 weeks
  rules:
    - if: $CI_COMMIT_TAG

windows:cleanup:
  stage: build
  tags:
    - proxmoxshell
  needs:
    - job: windows:provision
      artifacts: true
    - job: build:windows
  when: always
  before_script:
    - *proxmox_auth
  variables:
    PROXMOX_HOST: "127.0.0.1"
    PROXMOX_NODE: "green"
  script:
    - |
      # Fallback: if the VMID dotenv never reached us (provision failed so early
      # it didn't publish, or the artifact was lost), find the VM by its
      # pipeline-scoped name so a failed build/provision can't leave an orphan.
      if [ -z "$VMID" ]; then
        echo "No VMID from provision; looking up VM by name futo-notes-win-${CI_PIPELINE_ID}..."
        VMID=$(curl -s -k \
          -H "Authorization: ${PROXMOX_AUTH}" \
          "https://${PROXMOX_HOST}:8006/api2/json/nodes/${PROXMOX_NODE}/qemu" \
          | jq -r ".data[] | select(.name==\"futo-notes-win-${CI_PIPELINE_ID}\") | .vmid" | head -1)
      fi
      if [ -z "$VMID" ] || [ "$VMID" = "null" ]; then
        echo "No VM found for this pipeline, nothing to clean up."
        exit 0
      fi
      echo "Stopping VM $VMID..."
      curl -s -k -X POST \
        -H "Authorization: ${PROXMOX_AUTH}" \
        "https://${PROXMOX_HOST}:8006/api2/json/nodes/${PROXMOX_NODE}/qemu/${VMID}/status/stop"
    - |
      echo "Waiting for VM to stop..."
      for i in $(seq 1 30); do
        STATUS=$(curl -s -k \
          -H "Authorization: ${PROXMOX_AUTH}" \
          "https://${PROXMOX_HOST}:8006/api2/json/nodes/${PROXMOX_NODE}/qemu/${VMID}/status/current" | jq -r '.data.status')
        if [ "$STATUS" = "stopped" ]; then
          echo "VM stopped!"
          break
        fi
        sleep 5
      done
    - |
      curl -s -k -X DELETE \
        -H "Authorization: ${PROXMOX_AUTH}" \
        "https://${PROXMOX_HOST}:8006/api2/json/nodes/${PROXMOX_NODE}/qemu/${VMID}"
      echo "VM ${VMID} deleted"
  rules:
    - if: $CI_COMMIT_TAG
    # On MRs, tear down the VM manually AFTER the build (play this job). Manual
    # rather than the job-level when:always so it doesn't fire at pipeline start
    # and no-op before the VM exists — which would orphan the real VM.
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      when: manual
      allow_failure: true

# ─────────────────────────────────────────────────────────────
# Release gate — all platform artifacts must exist
# ─────────────────────────────────────────────────────────────

release:gate:
  stage: verify
  needs:
    # EVERY test job that runs on tag pipelines must be listed here. With
    # DAG `needs`, release/publish:ios run as soon as their needs succeed —
    # a failed test job NOT in this list does not stop the publish (this
    # nearly shipped v1.4.0 twice: once past a failed test:e2e:rest, once
    # past a failed test:cross-platform-sync).
    - job: test
    - job: test:arch-gates
    - job: test:e2e:smoke
    - job: test:e2e:markdown-spec
    - job: test:e2e:rest
    - job: test:rust
    - job: test:rust:workspace
    - job: test:rust:dep-guard
    - job: test:rust:macos
    - job: test:desktop-smoke:macos
    - job: test:cross-platform-sync
    - job: build:linux-packages
      artifacts: true
    - job: build:linux-appimage
      artifacts: true
    - job: build:android-native
      artifacts: true
    - job: build:ios-native
      artifacts: true
    - job: build:macos
      artifacts: true
    - job: windows:sign
      artifacts: true
  before_script: []
  script:
    - |
      MISSING=0
      check() { if ! ls $1 >/dev/null 2>&1; then echo "MISSING: $1"; MISSING=$((MISSING+1)); else echo "OK: $1"; fi; }
      check_find() { if [ -z "$(find $1 -name "$2" -type f 2>/dev/null)" ]; then echo "MISSING: $2 in $1"; MISSING=$((MISSING+1)); else echo "OK: $2 in $1"; fi; }

      echo "=== Platform artifacts ==="
      check "target/release/bundle/deb/*.deb"
      check "target/release/bundle/rpm/*.rpm"
      check "target/release/bundle/appimage/*.AppImage"
      check_find "apps/android/app/build/outputs/apk/release" "*release*.apk"
      check_find "apps/android/app/build/outputs/bundle/release" "*.aab"
      check "buildFutoNotesIOSNative/binary/*.ipa"
      check "buildFutoNotesMacOS/binary/*.dmg"

      echo ""
      echo "=== Windows installer ==="
      check "windows-artifacts/*.exe"

      echo ""
      echo "=== Desktop updater artifacts (.sig + macOS app.tar.gz) ==="
      # The self-updater needs a signed updater artifact per desktop OS. Linux
      # ships the AppImage, macOS the .app.tar.gz (NOT the .dmg), Windows the
      # setup.exe — each with a minisign .sig embedded into latest.json.
      check "target/release/bundle/appimage/*.AppImage.sig"
      check_find "buildFutoNotesMacOS/updater" "*.app.tar.gz"
      check_find "buildFutoNotesMacOS/updater" "*.app.tar.gz.sig"
      check "windows-artifacts/*.exe.sig"

      echo ""
      if [ "$MISSING" -gt 0 ]; then
        echo "RELEASE BLOCKED: $MISSING artifact(s) missing"
        exit 1
      fi
      echo "All artifacts present — release gate passed"
  rules:
    - if: $CI_COMMIT_TAG

# ─────────────────────────────────────────────────────────────
# Publish + create GitLab release
# ─────────────────────────────────────────────────────────────

# Upload the iOS IPA to TestFlight. Gated by release:gate so a failing
# test job blocks the upload. The Cirrus task pulls the IPA artifact
# built in build:ios-native, so we don't rebuild from scratch.
publish:ios:
  stage: release
  interruptible: false
  tags:
    - macscript
  needs:
    - job: release:gate
    - job: build:ios-native
  variables:
    GIT_STRATEGY: clone
  before_script:
    - env | grep -E '^(CI_|IOS_|ASC_)' > .cienv
  script:
    - cirrus run publishFutoNotesIOS --artifacts-dir . --env-file .cienv
  rules:
    - if: $CI_COMMIT_TAG

# Upload the signed AAB to Google Play (internal testing track) using FUTO's
# shared publish_playstore.py (Android Publisher API v3) — the SAME uploader
# grayjay uses. Gated by release:gate so a failing test blocks the upload.
# Consumes the AAB built in build:android-native (no rebuild of the Rust .so).
# Requires:
#   - PLAY_SERVICE_ACCOUNT_JSON  (CI var, base64 of the Play service-account JSON)
#   - the app already created in Play Console + that service account granted
#     "Release to testing tracks" access (the API cannot create the app listing)
#   - KEYSTORE_BASE64/KEYSTORE_PASSWORD/KEY_ALIAS set so build:android-native
#     produced a SIGNED AAB (Play rejects unsigned uploads)
# To go live to production later, change --track internal → --track production
# (and optionally --status inProgress --rollout 0.1 for a staged rollout).
publish:android:
  stage: release
  interruptible: false
  image: gitlab.futo.org:5050/futo-notes/futo-notes/ci/android:latest
  needs:
    - job: release:gate
    - job: build:android-native
      artifacts: true
  script:
    - |
      if [ -z "${PLAY_SERVICE_ACCOUNT_JSON:-}" ]; then
        echo "PLAY_SERVICE_ACCOUNT_JSON is not set — cannot publish to Google Play." >&2
        exit 1
      fi
    - echo "$PLAY_SERVICE_ACCOUNT_JSON" | base64 -d > /tmp/play-sa.json
    - AAB=$(find apps/android/app/build/outputs/bundle/release -name "*.aab" -type f | head -1)
    - test -n "$AAB" || { echo "No release AAB found from build:android-native" >&2; exit 1; }
    # The CI android image ships python3 without the venv module / ensurepip;
    # install python3-venv (+pip) so scripts/venv-playstore.sh can build the
    # google-api-python-client venv.
    - apt-get update -qq && apt-get install -y -qq python3-venv python3-pip
    # Build the google-api-python-client venv, then upload the prebuilt signed AAB.
    - bash scripts/venv-playstore.sh
    - . .venv-playstore/bin/activate
    - |
      set +e
      python scripts/publish_playstore.py --sa /tmp/play-sa.json --package com.futo.notes --aab "$AAB" --track internal --status completed > playstore-publish.log 2>&1
      PUBLISH_STATUS=$?
      set -e
      cat playstore-publish.log
      if [ "$PUBLISH_STATUS" -ne 0 ]; then
        if grep -q "Your scoped storage permission declaration needs to be updated" playstore-publish.log; then
          echo "ERROR: Google Play rejected the upload — the MANAGE_EXTERNAL_STORAGE" >&2
          echo "('All files access') permission declaration has not been completed/approved" >&2
          echo "in Play Console, so nothing was published. The signed AAB was built and" >&2
          echo "archived by build:android-native; complete the declaration in Play Console," >&2
          echo "then retry this job (no rebuild needed)." >&2
        fi
        exit "$PUBLISH_STATUS"
      fi
  rules:
    - if: $CI_COMMIT_TAG

release:
  stage: release
  interruptible: false
  needs:
    - job: release:gate
    - job: build:linux-packages
      artifacts: true
    - job: build:linux-appimage
      artifacts: true
    - job: build:android-native
      artifacts: true
    - job: build:ios-native
      artifacts: true
    - job: build:macos
      artifacts: true
    - job: windows:sign
      artifacts: true
  script:
    - VERSION="${CI_COMMIT_TAG#v}"
    - REGISTRY_URL="${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/futo-notes/${CI_COMMIT_TAG}"
    # Linux
    - |
      for f in target/release/bundle/deb/*.deb; do
        [ -f "$f" ] || continue
        NAME="futo-notes_${VERSION}_amd64.deb"
        echo "Uploading $NAME"
        curl --fail -H "JOB-TOKEN: $CI_JOB_TOKEN" --upload-file "$f" "${REGISTRY_URL}/${NAME}"
      done
    - |
      for f in target/release/bundle/rpm/*.rpm; do
        [ -f "$f" ] || continue
        NAME="futo-notes-${VERSION}-1.x86_64.rpm"
        echo "Uploading $NAME"
        curl --fail -H "JOB-TOKEN: $CI_JOB_TOKEN" --upload-file "$f" "${REGISTRY_URL}/${NAME}"
      done
    - |
      for f in target/release/bundle/appimage/*.AppImage; do
        [ -f "$f" ] || continue
        NAME="FUTO-Notes-${VERSION}-x86_64.AppImage"
        echo "Uploading $NAME"
        curl --fail -H "JOB-TOKEN: $CI_JOB_TOKEN" --upload-file "$f" "${REGISTRY_URL}/${NAME}"
      done
    # Android APK
    - |
      APK=$(find apps/android/app/build/outputs/apk/release -name "*release*.apk" -type f 2>/dev/null | head -1)
      if [ -n "$APK" ]; then
        NAME="futo-notes-${VERSION}.apk"
        echo "Uploading $NAME"
        curl --fail -H "JOB-TOKEN: $CI_JOB_TOKEN" --upload-file "$APK" "${REGISTRY_URL}/${NAME}"
      fi
    # iOS IPA
    - |
      IPA=$(find buildFutoNotesIOSNative -name "*.ipa" -type f 2>/dev/null | head -1)
      if [ -n "$IPA" ]; then
        NAME="FUTO-Notes-${VERSION}.ipa"
        echo "Uploading $NAME"
        curl --fail -H "JOB-TOKEN: $CI_JOB_TOKEN" --upload-file "$IPA" "${REGISTRY_URL}/${NAME}"
      fi
    # macOS DMG (first-install download)
    - |
      DMG=$(find buildFutoNotesMacOS -name "*.dmg" -type f 2>/dev/null | head -1)
      if [ -n "$DMG" ]; then
        NAME="FUTO-Notes-${VERSION}-universal.dmg"
        echo "Uploading $NAME"
        curl --fail -H "JOB-TOKEN: $CI_JOB_TOKEN" --upload-file "$DMG" "${REGISTRY_URL}/${NAME}"
      fi
    # macOS updater artifact (.app.tar.gz — what the self-updater downloads).
    # Universal (x86_64 + arm64), same as the DMG — one tarball serves both arches.
    - |
      TARGZ=$(find buildFutoNotesMacOS/updater -name "*.app.tar.gz" -type f 2>/dev/null | head -1)
      if [ -n "$TARGZ" ]; then
        NAME="FUTO-Notes-${VERSION}-universal.app.tar.gz"
        echo "Uploading $NAME"
        curl --fail -H "JOB-TOKEN: $CI_JOB_TOKEN" --upload-file "$TARGZ" "${REGISTRY_URL}/${NAME}"
      fi
    # Windows NSIS installer
    - |
      NSIS=$(find windows-artifacts -name "*.exe" -type f 2>/dev/null | head -1)
      if [ -n "$NSIS" ]; then
        NAME="FUTO-Notes-${VERSION}-x64-setup.exe"
        echo "Uploading $NAME"
        curl --fail -H "JOB-TOKEN: $CI_JOB_TOKEN" --upload-file "$NSIS" "${REGISTRY_URL}/${NAME}"
      fi
    # ── Desktop self-update manifest (latest.json) ──
    # Assemble the multi-platform Tauri updater manifest from each desktop OS's
    # signed artifact + its .sig, with URLs pointing at the package-registry
    # uploads above. Embeds the .sig CONTENTS (clients verify the download against
    # them — the .sig files themselves are not published). The baked endpoint in
    # tauri.conf.json is the "latest" release permalink, which resolves to the
    # release asset whose filepath is /latest.json (added to release-cli below).
    - |
      APPIMAGE_SIG=$(find target/release/bundle/appimage -name "*.AppImage.sig" -type f | head -1)
      MAC_SIG=$(find buildFutoNotesMacOS/updater -name "*.app.tar.gz.sig" -type f | head -1)
      WIN_SIG=$(find windows-artifacts -name "*.exe.sig" -type f | head -1)
      # Hard-abort (release:gate already guards this, but don't assemble a partial
      # manifest if a .sig is somehow absent — no `set -e` is active here).
      if [ -z "$APPIMAGE_SIG" ] || [ -z "$MAC_SIG" ] || [ -z "$WIN_SIG" ]; then
        echo "missing updater .sig (linux=$APPIMAGE_SIG mac=$MAC_SIG win=$WIN_SIG)"; exit 1
      fi
      # Verify each artifact's .sig against the PROD pubkey baked in tauri.conf.json
      # BEFORE assembling the manifest. This is the only place that catches a
      # signing-key/baked-pubkey mismatch (which would brick auto-update for every
      # client — the pubkey can't be rotated on shipped installs) and a stale .sig
      # left from before the OS-signing step (Authenticode/notarize/mesa) rewrote
      # the bytes. The artifact path is the .sig path minus the suffix. No `set -e`
      # here, so abort explicitly on a non-zero exit.
      node scripts/verify-updater-signature.mjs \
        --artifact "${APPIMAGE_SIG%.sig}" --sig "$APPIMAGE_SIG" \
        --artifact "${MAC_SIG%.sig}"      --sig "$MAC_SIG" \
        --artifact "${WIN_SIG%.sig}"      --sig "$WIN_SIG" \
        || { echo "updater signature verification FAILED — refusing to publish"; exit 1; }
      node -e "
        const fs = require('fs');
        const [v, reg, ls, ms, ws] = process.argv.slice(1);
        // The macOS .app.tar.gz is a universal (x86_64 + arm64) bundle, so both
        // darwin keys point at the SAME artifact + signature — Intel and Apple
        // Silicon clients each match their own key and download the one tarball.
        const macUrl = reg + '/FUTO-Notes-' + v + '-universal.app.tar.gz';
        fs.writeFileSync('updater-spec.json', JSON.stringify({
          version: v,
          notes: 'FUTO Notes ' + v,
          platforms: [
            { platform: 'linux-x86_64',   url: reg + '/FUTO-Notes-' + v + '-x86_64.AppImage', sig: ls },
            { platform: 'darwin-aarch64', url: macUrl,                                        sig: ms },
            { platform: 'darwin-x86_64',  url: macUrl,                                        sig: ms },
            { platform: 'windows-x86_64', url: reg + '/FUTO-Notes-' + v + '-x64-setup.exe',   sig: ws },
          ],
        }));
      " "$VERSION" "$REGISTRY_URL" "$APPIMAGE_SIG" "$MAC_SIG" "$WIN_SIG"
      node scripts/build-updater-manifest.mjs --spec updater-spec.json --out latest.json
      echo "=== latest.json ==="; cat latest.json
      echo "Uploading latest.json"
      curl --fail -H "JOB-TOKEN: $CI_JOB_TOKEN" --upload-file latest.json "${REGISTRY_URL}/latest.json"
    # Create GitLab release
    - |
      curl -sL "https://gitlab.com/api/v4/projects/gitlab-org%2Frelease-cli/packages/generic/release-cli/latest/release-cli-linux-amd64" \
        -o /usr/local/bin/release-cli && chmod +x /usr/local/bin/release-cli
    # Retag-same-version is the standing release policy (a not-yet-published
    # tag is deleted and re-pushed at the fix commit). release-cli create is
    # not idempotent — it 409s when a Release for the tag already exists from
    # a prior attempt — so drop any existing Release for this tag first.
    - |
      curl -s -X DELETE -H "JOB-TOKEN: $CI_JOB_TOKEN" \
        "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/releases/${CI_COMMIT_TAG}" || true
    - |
      release-cli create \
        --name "FUTO Notes ${CI_COMMIT_TAG}" \
        --tag-name "${CI_COMMIT_TAG}" \
        --description "FUTO Notes release ${CI_COMMIT_TAG}" \
        --assets-link "{\"name\":\"futo-notes_${VERSION}_amd64.deb\",\"url\":\"${REGISTRY_URL}/futo-notes_${VERSION}_amd64.deb\",\"link_type\":\"package\"}" \
        --assets-link "{\"name\":\"futo-notes-${VERSION}-1.x86_64.rpm\",\"url\":\"${REGISTRY_URL}/futo-notes-${VERSION}-1.x86_64.rpm\",\"link_type\":\"package\"}" \
        --assets-link "{\"name\":\"FUTO-Notes-${VERSION}-x86_64.AppImage\",\"url\":\"${REGISTRY_URL}/FUTO-Notes-${VERSION}-x86_64.AppImage\",\"link_type\":\"package\"}" \
        --assets-link "{\"name\":\"futo-notes-${VERSION}.apk\",\"url\":\"${REGISTRY_URL}/futo-notes-${VERSION}.apk\",\"link_type\":\"package\"}" \
        --assets-link "{\"name\":\"FUTO-Notes-${VERSION}.ipa\",\"url\":\"${REGISTRY_URL}/FUTO-Notes-${VERSION}.ipa\",\"link_type\":\"package\"}" \
        --assets-link "{\"name\":\"FUTO-Notes-${VERSION}-universal.dmg\",\"url\":\"${REGISTRY_URL}/FUTO-Notes-${VERSION}-universal.dmg\",\"link_type\":\"package\"}" \
        --assets-link "{\"name\":\"FUTO-Notes-${VERSION}-x64-setup.exe\",\"url\":\"${REGISTRY_URL}/FUTO-Notes-${VERSION}-x64-setup.exe\",\"link_type\":\"package\"}" \
        --assets-link "{\"name\":\"FUTO-Notes-${VERSION}-universal.app.tar.gz\",\"url\":\"${REGISTRY_URL}/FUTO-Notes-${VERSION}-universal.app.tar.gz\",\"link_type\":\"package\"}" \
        --assets-link "{\"name\":\"latest.json\",\"url\":\"${REGISTRY_URL}/latest.json\",\"filepath\":\"/latest.json\",\"link_type\":\"other\"}"
  rules:
    # STABLE tags only (vX.Y.Z — no -rc/-nightly suffix). The updater endpoint is
    # the "latest release" permalink, which GitLab resolves by release DATE, so a
    # published prerelease would become "latest" and be served to stable clients.
    # Gating publish to stable tags keeps the channel stable-only; the Tauri
    # client never downgrades (semver compare), so clients only move UP to the
    # newest stable. (Prerelease tags still run the build jobs for validation;
    # they just don't publish a release. A future nightly channel = a second
    # fixed manifest + a client channel setting.)
    - if: $CI_COMMIT_TAG =~ /^v[0-9]+\.[0-9]+\.[0-9]+$/

# ─────────────────────────────────────────────────────────────
# Publish to the FUTO F-Droid repo (app.futo.org/fdroid)
# ─────────────────────────────────────────────────────────────
# After `release` uploads the signed APK to the generic package registry,
# add/update this tag's entry in fdroid/repo-v2 (apps/Notes/index.yml). The
# entry's URL is the version-pinned package asset; pushing to repo-v2 master
# triggers ITS pipeline to download the APK, verify the sha256, and rebuild
# the signed F-Droid index. Requires a CI variable FDROID_DEPLOY_KEY: a
# base64-encoded SSH private key (single line so it can be masked, matching
# the KEYSTORE_BASE64 convention) whose public half is a WRITE deploy key on
# fdroid/repo-v2.
# The APK must be release-signed (i.e. KEYSTORE_BASE64 set) — F-Droid pins
# the signer, so an unsigned/debug-signed build would break updates.
update-fdroid:
  stage: trigger
  image: alpine:latest
  interruptible: false
  needs:
    - job: release # ensure the package asset is uploaded first
    - job: build:android-native # the signed APK, to compute its sha256
      artifacts: true
  before_script:
    - apk add --no-cache python3 git openssh-client
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    - eval $(ssh-agent -s)
    - printf '%s' "$FDROID_DEPLOY_KEY" | base64 -d > ~/.ssh/id_ed25519
    - chmod 600 ~/.ssh/id_ed25519
    - ssh-add ~/.ssh/id_ed25519
    - ssh-keyscan -t rsa,ecdsa,ed25519 gitlab.futo.org >> ~/.ssh/known_hosts 2>/dev/null
  script:
    - python3 scripts/update-fdroid-index.py
  rules:
    - if: $CI_COMMIT_TAG

# ─────────────────────────────────────────────────────────────
# Publish to the FUTO Linux package repo (pkg.futoinfra.com)
# ─────────────────────────────────────────────────────────────
# After `release` has uploaded the .deb/.rpm to the GitLab generic package
# registry, hand the same URLs off to the FUTO packaging pipeline so it can
# ingest them into the apt/yum repo. Two jobs: a prep job that computes the
# version + the exact registry URLs (matching `release`'s NAME scheme) and
# emits them as dotenv, and a multi-project trigger that passes them to
# devops/cloudflare/pkg.futoinfra.com on main. The trigger keyword
# authenticates via CI_JOB_TOKEN; the target project allowlists this project.

pkg-futoinfra:prep:
  stage: trigger
  needs:
    - job: release
  before_script: []
  script:
    - |
      VERSION="${CI_COMMIT_TAG#v}"
      REGISTRY_URL="${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/futo-notes/${CI_COMMIT_TAG}"
      {
        echo "PKG_VERSION=${VERSION}"
        echo "PKG_DEB_URLS=${REGISTRY_URL}/futo-notes_${VERSION}_amd64.deb"
        echo "PKG_RPM_URLS=${REGISTRY_URL}/futo-notes-${VERSION}-1.x86_64.rpm"
      } > pkg.env
      echo "=== pkg.futoinfra.com trigger vars ==="
      cat pkg.env
  artifacts:
    reports:
      dotenv: pkg.env
  rules:
    - if: $CI_COMMIT_TAG

pkg-futoinfra:trigger:
  stage: trigger
  needs:
    - job: pkg-futoinfra:prep
      artifacts: true
  variables:
    BINARY: futo-notes
    VERSION: $PKG_VERSION
    DEB_URLS: $PKG_DEB_URLS
    RPM_URLS: $PKG_RPM_URLS
  trigger:
    project: devops/cloudflare/pkg.futoinfra.com
    branch: main
  rules:
    - if: $CI_COMMIT_TAG
