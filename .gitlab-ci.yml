default:
  tags:
    - futocore_dind
  image: gitlab.futo.org:5050/futocore/ci/kitchensink:latest
  before_script:
    - . $HOME/.nvm/nvm.sh

variables:
  ANDROID_HOME: /opt/android-sdk

workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG

stages:
  - build
  - upload_assets
  - create_release

# ─────────────────────────────────────────────────────────────
# Android Build
# ─────────────────────────────────────────────────────────────

build-android:
  stage: build
  script:
    - git submodule update --init --recursive
    - yarn install
    - rm -rf react-native-live-markdown/node_modules/{react-native-reanimated,react-native-worklets,react,react-native}
    - echo "$KEYSTORE_BASE64" | base64 -d > android/app/release.keystore
    - cd android && ./gradlew assembleRelease
  artifacts:
    paths:
      - android/app/build/outputs/apk/release/app-release.apk
    expire_in: 1 week
  rules:
    - if: $CI_COMMIT_TAG
      when: always

# ─────────────────────────────────────────────────────────────
