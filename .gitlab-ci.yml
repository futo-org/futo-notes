default:
  tags:
    - dind
  image: gitlab.futo.org:5050/futocore/ci/kitchensink:latest
  before_script:
    - . $HOME/.nvm/nvm.sh

variables:
  ANDROID_HOME: /opt/android-sdk

workflow:
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_MERGE_REQUEST_IID
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

stages:
  - test
  - build
  - upload_assets
  - create_release

# ─────────────────────────────────────────────────────────────
# Lint & Test
# ─────────────────────────────────────────────────────────────

lint:
  stage: test
  script:
    - npm ci
    - npm run lint
    - npm run lint:platform

test:unit:
  stage: test
  script:
    - npm ci
    - npm run test:unit

test:e2e:
  stage: test
  script:
    - npm ci
    - npx playwright install --with-deps chromium
    - npm test

test:server:
  stage: test
  script:
    - npm ci
    - npm run server:test

docker:build:
  stage: test
  script:
    - docker build -f apps/server/Dockerfile -t futo-notes-server:ci .
    - |
      # Smoke test: start the container and verify it boots (uses docker exec to avoid dind networking issues)
      docker run --rm -d --name fn-smoke futo-notes-server:ci
      for i in $(seq 1 10); do
        docker exec fn-smoke node -e "fetch('http://localhost:3005/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))" && break
        echo "Waiting for server... ($i/10)"
        sleep 2
      done
      docker exec fn-smoke node -e "fetch('http://localhost:3005/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))" || (docker logs fn-smoke && docker stop fn-smoke && exit 1)
      docker stop fn-smoke
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_MERGE_REQUEST_IID
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - exists:
        - apps/server/Dockerfile

docker:publish:
  stage: build
  needs: [lint, test:unit, test:e2e, test:server, docker:build]
  script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
    - docker run --rm --privileged multiarch/qemu-user-static --reset -p yes
    - docker buildx create --use --name multiarch
    - export IMAGE="$CI_REGISTRY_IMAGE/server"
    - docker buildx build -f apps/server/Dockerfile --platform linux/amd64,linux/arm64 -t "$IMAGE:latest" --push .
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: always

# ─────────────────────────────────────────────────────────────
# Android Build
# ─────────────────────────────────────────────────────────────

build-android:
  stage: build
  needs: [lint, test:unit, test:e2e, test:server]
  before_script:
    - . $HOME/.nvm/nvm.sh
    - |
      # Install JDK 21 (required by Capacitor 8)
      if [ ! -d "/opt/jdk-21" ]; then
        curl -sL https://download.oracle.com/java/21/latest/jdk-21_linux-x64_bin.tar.gz | tar xz -C /opt
        mv /opt/jdk-21* /opt/jdk-21
      fi
      export JAVA_HOME=/opt/jdk-21
      export PATH="$JAVA_HOME/bin:$PATH"
      java -version
  variables:
    JAVA_HOME: /opt/jdk-21
  script:
    - npm ci
    - npm run build
    - cd apps/mobile && npx cap sync android && cd ../..
    - |
      if [ -n "$KEYSTORE_BASE64" ]; then
        echo "Using release keystore from CI variables"
        echo "$KEYSTORE_BASE64" | base64 -d > apps/mobile/android/app/release.keystore
      else
        echo "No keystore configured - using debug signing"
      fi
    - |
      # Derive version from git tag (v0.0.7 → 0.0.7)
      VERSION_NAME="${CI_COMMIT_TAG#v}"
      # Compute version code: major*10000 + minor*100 + patch
      IFS='.' read -r major minor patch <<< "$VERSION_NAME"
      VERSION_CODE=$((major * 10000 + minor * 100 + patch))
      echo "Building version $VERSION_NAME (code: $VERSION_CODE)"
      export PATH="$JAVA_HOME/bin:$PATH"
      cd apps/mobile/android && ./gradlew assembleRelease \
        -PVERSION_NAME="$VERSION_NAME" \
        -PVERSION_CODE="$VERSION_CODE"
  artifacts:
    paths:
      - apps/mobile/android/app/build/outputs/apk/release/app-release.apk
    expire_in: 1 week
  rules:
    - if: $CI_COMMIT_TAG
      when: always

# ─────────────────────────────────────────────────────────────
# iOS Build
# ─────────────────────────────────────────────────────────────

build-ios:
  stage: build
  needs: [lint, test:unit, test:e2e, test:server]
  image: ghcr.io/cirruslabs/macos-sequoia-xcode:26.2
  tags:
    - macscript
  variables:
    GIT_STRATEGY: clone
  before_script:
    - env | grep -E '^(CI_|IOS_|ASC_)' > .cienv
  script:
    - cirrus run buildFutoNotesIOS --artifacts-dir . --env-file .cienv
  artifacts:
    paths:
      - buildFutoNotesIOS/binary/*.ipa
    expire_in: 1 week
  rules:
    - if: $CI_COMMIT_TAG
      when: always

# ─────────────────────────────────────────────────────────────
# Upload APK to Package Registry
# ─────────────────────────────────────────────────────────────

upload-apk:
  stage: upload_assets
  needs:
    - job: build-android
      artifacts: true
    - job: build-ios
      artifacts: true
  script:
    - export APK_NAME="futo-notes-${CI_COMMIT_TAG}.apk"
    - export APK_PATH="apps/mobile/android/app/build/outputs/apk/release/app-release.apk"
    - export PACKAGE_REGISTRY_URL="${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/futo-notes/${CI_COMMIT_TAG}"
    - export APK_ASSET_URL="${PACKAGE_REGISTRY_URL}/${APK_NAME}"
    - 'echo "Uploading ${APK_PATH} to ${APK_ASSET_URL}"'
    - 'curl --fail --header "JOB-TOKEN: ${CI_JOB_TOKEN}" --upload-file "${APK_PATH}" "${APK_ASSET_URL}"'
    - echo "APK_ASSET_NAME=${APK_NAME}" >> release_vars.env
    - echo "APK_ASSET_URL=${APK_ASSET_URL}" >> release_vars.env
  artifacts:
    reports:
      dotenv: release_vars.env
  rules:
    - if: $CI_COMMIT_TAG
      when: always

# ─────────────────────────────────────────────────────────────
# Create GitLab Release
# ─────────────────────────────────────────────────────────────

create-release:
  stage: create_release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  needs:
    - job: upload-apk
      artifacts: true
  before_script: []
  script:
    - |
      echo "Creating release for tag ${CI_COMMIT_TAG}"
      echo "APK: ${APK_ASSET_NAME} at ${APK_ASSET_URL}"

      release-cli create --name "Futo Notes ${CI_COMMIT_TAG}" \
        --tag-name "${CI_COMMIT_TAG}" \
        --description "Futo Notes release ${CI_COMMIT_TAG}" \
        --assets-link "{\"name\":\"${APK_ASSET_NAME}\",\"url\":\"${APK_ASSET_URL}\",\"link_type\":\"other\"}"
  rules:
    - if: $CI_COMMIT_TAG
      when: always
