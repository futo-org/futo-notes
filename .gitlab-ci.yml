default:
  tags:
    - dind
  image: gitlab.futo.org:5050/futocore/ci/kitchensink:latest
  before_script:
    - . $HOME/.nvm/nvm.sh

variables:
  ANDROID_HOME: /opt/android-sdk

workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG

stages:
  - build
  - upload_assets
  - create_release

# ─────────────────────────────────────────────────────────────
# Android Build
# ─────────────────────────────────────────────────────────────

build-android:
  stage: build
  script:
    - git submodule update --init --recursive
    - yarn install
    - rm -rf react-native-live-markdown/node_modules/{react-native-reanimated,react-native-worklets,react,react-native}
    - |
      if [ -n "$KEYSTORE_BASE64" ]; then
        echo "Using release keystore from CI variables"
        echo "$KEYSTORE_BASE64" | base64 -d > android/app/release.keystore
      else
        echo "No keystore configured - using debug signing"
      fi
    - |
      # Derive version from git tag (v0.0.7 → 0.0.7)
      VERSION_NAME="${CI_COMMIT_TAG#v}"
      # Compute version code: major*10000 + minor*100 + patch
      IFS='.' read -r major minor patch <<< "$VERSION_NAME"
      VERSION_CODE=$((major * 10000 + minor * 100 + patch))
      echo "Building version $VERSION_NAME (code: $VERSION_CODE)"
      cd android && ./gradlew assembleRelease \
        -PVERSION_NAME="$VERSION_NAME" \
        -PVERSION_CODE="$VERSION_CODE" \
        -PreactNativeArchitectures=arm64-v8a,armeabi-v7a \
        -x lintVitalAnalyzeRelease -x lintVitalRelease
  artifacts:
    paths:
      - android/app/build/outputs/apk/release/app-release.apk
    expire_in: 1 week
  rules:
    - if: $CI_COMMIT_TAG
      when: always

# ─────────────────────────────────────────────────────────────
# iOS Build
# ─────────────────────────────────────────────────────────────

build-ios:
  stage: build
  image: ghcr.io/cirruslabs/macos-ventura-xcode:14.3.1
  tags:
    - macscript
  before_script:
    - env | grep -E '^(CI_|IOS_|ASC_)' > .cienv
  script:
    - cirrus run buildFutoNotesIOS --artifacts-dir . --env-file .cienv
  artifacts:
    paths:
      - buildFutoNotesIOS/binary/*.ipa
    expire_in: 1 week
  rules:
    - if: $CI_COMMIT_TAG
      when: always

# ─────────────────────────────────────────────────────────────
# Upload APK to Package Registry
# ─────────────────────────────────────────────────────────────

upload-apk:
  stage: upload_assets
  needs:
    - job: build-android
      artifacts: true
    - job: build-ios
      artifacts: true
      optional: true
  script:
    - export APK_NAME="futo-notes-${CI_COMMIT_TAG}.apk"
    - export APK_PATH="android/app/build/outputs/apk/release/app-release.apk"
    - export PACKAGE_REGISTRY_URL="${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/futo-notes/${CI_COMMIT_TAG}"
    - export APK_ASSET_URL="${PACKAGE_REGISTRY_URL}/${APK_NAME}"
    - 'echo "Uploading ${APK_PATH} to ${APK_ASSET_URL}"'
    - 'curl --fail --header "JOB-TOKEN: ${CI_JOB_TOKEN}" --upload-file "${APK_PATH}" "${APK_ASSET_URL}"'
    - echo "APK_ASSET_NAME=${APK_NAME}" >> release_vars.env
    - echo "APK_ASSET_URL=${APK_ASSET_URL}" >> release_vars.env
  artifacts:
    reports:
      dotenv: release_vars.env
  rules:
    - if: $CI_COMMIT_TAG
      when: always

# ─────────────────────────────────────────────────────────────
# Create GitLab Release
# ─────────────────────────────────────────────────────────────

create-release:
  stage: create_release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  needs:
    - job: upload-apk
      artifacts: true
  before_script: []
  script:
    - |
      echo "Creating release for tag ${CI_COMMIT_TAG}"
      echo "APK: ${APK_ASSET_NAME} at ${APK_ASSET_URL}"

      release-cli create --name "Futo Notes ${CI_COMMIT_TAG}" \
        --tag-name "${CI_COMMIT_TAG}" \
        --description "Futo Notes release ${CI_COMMIT_TAG}" \
        --assets-link "{\"name\":\"${APK_ASSET_NAME}\",\"url\":\"${APK_ASSET_URL}\",\"link_type\":\"other\"}"
  rules:
    - if: $CI_COMMIT_TAG
      when: always
